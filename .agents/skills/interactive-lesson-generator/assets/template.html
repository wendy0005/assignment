<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Fundamentals — Interactive Lessons</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0f172a; --slate: #334155; --slate-light: #64748b;
    --blue: #3b82f6; --blue-light: #eff6ff; --blue-dark: #1e40af;
    --teal: #14b8a6; --teal-light: #f0fdfa;
    --amber: #f59e0b; --amber-light: #fffbeb;
    --rose: #f43f5e; --rose-light: #fff1f2;
    --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);

    --radius: 12px; --radius-sm: 8px;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-serif: 'Merriweather', Georgia, serif;
    --transition: .25s cubic-bezier(.4,0,.2,1);

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans); background: var(--bg); color: var(--slate);
    line-height: 1.7; -webkit-font-smoothing: antialiased;
  }
  /* ---- Header ---- */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, #1e293b 100%);
    color: #fff; padding: 28px 40px 24px; position: sticky; top: 0;
    z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.15);
  }
  header h1 {
    font-size: 22px; font-weight: 800; letter-spacing: -.5px;
  }
  header p {
    font-size: 13px; color: #94a3b8; margin-top: 4px; font-weight: 500;
  }
  .header-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.1); padding: 4px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 600; margin-top: 10px; letter-spacing: .3px;
  }
  .header-badge span { color: var(--teal); }

  /* ---- Tabs ---- */
  .tabs {
    display: flex; background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 40px; position: sticky; top: 108px; z-index: 99;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);

  .tab-btn {
    padding: 14px 24px; font-family: var(--font-sans); font-size: 13px;
    font-weight: 600; border: none; background: none; cursor: pointer;

  .tab-btn:hover { color: var(--slate); }
  .tab-btn.active { color: var(--navy); }
  .tab-btn.active::after {
    content: ''; position: absolute; bottom: 0; left: 24px; right: 24px;
    height: 3px; background: var(--blue); border-radius: 3px 3px 0 0;
  }
  .tab-badge {
    display: inline-block; background: var(--border); padding: 0 8px;
    border-radius: 10px; font-size: 10px; font-weight: 700;
    margin-left: 6px; color: var(--slate-light);
  }
  .tab-btn.active .tab-badge { background: var(--blue-light); color: var(--blue); }

  /* ---- Layout ---- */
  .app-layout {
    display: flex; max-width: 1400px; margin: 0 auto;
    min-height: calc(100vh - 170px);
  }
  .sidebar {
    width: 280px; flex-shrink: 0; background: #fff;
    border-right: 1px solid var(--border); padding: 20px 16px;
    position: sticky; top: 170px; height: calc(100vh - 170px);
    overflow-y: auto;
  }
  .sidebar h3 {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--slate-light); margin-bottom: 12px;
    padding: 0 8px;
  }
  .sidebar-list { list-style: none; }
  .sidebar-list li { margin-bottom: 2px; }
  .sidebar-list a {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; color: var(--slate);
    text-decoration: none; transition: all var(--transition);
    cursor: pointer;
  }
  .sidebar-list a:hover { background: var(--bg); }
  .sidebar-list a.active {
    background: var(--blue-light); color: var(--blue); font-weight: 600;
  }
  .sidebar-list a .q-num {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    background: var(--bg); color: var(--slate-light);
    transition: all var(--transition);
  }
  .sidebar-list a.active .q-num {
    background: var(--blue); color: #fff;
  }
  .sidebar-list a.done .q-num {
    background: #d1fae5; color: #065f46;
  }
  .sidebar-list a.done::after {
    content: '✓'; margin-left: auto; font-size: 13px; color: #059669;
  }

  /* ---- Main Content ---- */
  .main-content {
    flex: 1; padding: 32px 48px; min-width: 0;
  }

  /* ---- Lesson Card ---- */
  .lesson-card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
    animation: fadeIn .4s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .lesson-header {
    padding: 28px 32px 0;
  }
  .lesson-header .q-label {
    display: inline-block; background: var(--blue-light); color: var(--blue);
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px;
    text-transform: uppercase; letter-spacing: .3px; margin-bottom: 10px;
  }
  .lesson-header h2 {
    font-family: var(--font-serif); font-weight: 700;
    font-size: 22px; color: var(--navy); line-height: 1.3;
  }
  .lesson-intro {
    margin-top: 14px; padding: 16px 20px; background: var(--amber-light);
    border-left: 3px solid var(--amber); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 14px; color: var(--slate); line-height: 1.7;
  }
  .lesson-intro::before {
    content: '🧑‍🏫 '; font-size: 16px;
  }

  /* ---- Steps ---- */
  .steps-container { padding: 24px 32px 32px; }
  .steps-progress {
    display: flex; align-items: center; gap: 8px; margin-bottom: 24px;
  }
  .step-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--border);
    transition: all var(--transition);
  }
  .step-dot.active { background: var(--blue); transform: scale(1.3); }
  .step-dot.done { background: var(--teal); }
  .step-dot.current ~ .step-dot { opacity: .4; }
  .step-label {
    font-size: 11px; font-weight: 600; color: var(--slate-light);
    margin-left: auto; text-transform: uppercase; letter-spacing: .3px;
  }

  .step-content {
    animation: fadeIn .35s ease-out;
  }
  .step-content h3 {
    font-family: var(--font-serif); font-size: 17px; color: var(--navy);
    margin-bottom: 14px; font-weight: 700;
  }
  .step-content p {
    font-size: 15px; line-height: 1.8; margin-bottom: 14px;
    color: var(--slate);
  }
  .step-content p:last-child { margin-bottom: 0; }
  .step-content ul, .step-content ol {
    margin: 10px 0 14px; padding-left: 22px;
  }
  .step-content li {
    font-size: 15px; line-height: 1.7; margin-bottom: 6px;
  }
  .step-content strong {
    color: var(--navy); font-weight: 600;
  }
  .step-content .highlight-box {
    background: var(--teal-light); border-left: 3px solid var(--teal);
    padding: 14px 18px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin: 14px 0; font-size: 14px;
  }
  .step-content .example-box {
    background: var(--blue-light); border-left: 3px solid var(--blue);
    padding: 14px 18px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin: 14px 0; font-size: 14px;
  }
  .step-content .example-box::before {
    content: '💡 Example: '; font-weight: 600; color: var(--blue-dark);
    font-size: 13px;
  }
  .step-content table {
    width: 100%; border-collapse: collapse; margin: 14px 0;
    font-size: 14px; border-radius: var(--radius-sm); overflow: hidden;
  }
  .step-content th {
    background: var(--bg); font-weight: 600; text-align: left;
    padding: 10px 14px; color: var(--navy); font-size: 12px;
    text-transform: uppercase; letter-spacing: .3px;
  }
  .step-content td {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .step-content tr:last-child td { border-bottom: none; }

  /* Glossary term */
  .glossary-term {
    color: var(--blue); cursor: pointer; border-bottom: 1px dashed var(--blue);
    font-weight: 500; transition: all var(--transition);
    position: relative;
  }
  .glossary-term:hover { background: var(--blue-light); }

  /* Diagram container */
  .diagram-box {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 20px; margin: 18px 0;
    overflow-x: auto;
  }
  .diagram-box .mermaid { display: flex; justify-content: center; }

  /* Step nav buttons */
  .step-nav {
    display: flex; gap: 10px; margin-top: 28px; padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .step-nav button {
    padding: 10px 24px; font-family: var(--font-sans); font-size: 13px;
    font-weight: 600; border: none; border-radius: var(--radius-sm);
    cursor: pointer; transition: all var(--transition);
  }
  .step-nav .btn-prev {
    background: var(--bg); color: var(--slate);
  }
  .step-nav .btn-prev:hover { background: var(--border); }
  .step-nav .btn-next {
    background: var(--blue); color: #fff; margin-left: auto;
  }
  .step-nav .btn-next:hover { background: var(--blue-dark); transform: translateY(-1px); }
  .step-nav .btn-next:disabled {
    opacity: .5; cursor: default; transform: none;
  }
  .step-nav .btn-finish {
    background: #059669; color: #fff; margin-left: auto;
  }
  .step-nav .btn-finish:hover { background: #047857; }

  /* ---- Recap ---- */
  .recap-box {
    margin: 18px 0 0; padding: 20px 24px;
    background: linear-gradient(135deg, #f0fdf4, #f0fdfa);
    border: 1px solid #bbf7d0; border-radius: var(--radius-sm);
  }
  .recap-box h4 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
    color: #059669; margin-bottom: 10px; font-weight: 700;
  }
  .recap-box ul { list-style: none; padding: 0; margin: 0; }
  .recap-box li {
    padding: 6px 0; font-size: 14px; font-weight: 500;
    color: #065f46;
  }
  .recap-box li::before { content: '✓ '; font-weight: 700; }

  /* ---- Glossary Modal ---- */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(15,23,42,.6); backdrop-filter: blur(4px);
    justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff; border-radius: var(--radius);
    padding: 32px; max-width: 480px; width: 90%;
    box-shadow: var(--shadow-lg); animation: fadeIn .2s ease-out;
  }
  .modal-box h3 {
    font-size: 18px; font-weight: 700; color: var(--navy);
    margin-bottom: 10px;
  }
  .modal-box p {
    font-size: 15px; line-height: 1.7; color: var(--slate);
  }
  .modal-close {
    margin-top: 20px; padding: 8px 20px;
    font-family: var(--font-sans); font-size: 13px; font-weight: 600;
    border: none; border-radius: var(--radius-sm); cursor: pointer;
    background: var(--bg); color: var(--slate); transition: background var(--transition);
  }
  .modal-close:hover { background: var(--border); }

  /* ---- Empty State ---- */
  .empty-state {
    text-align: center; padding: 60px 40px; color: var(--slate-light);
  }
  .empty-state h2 {
    font-size: 20px; color: var(--slate); margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; }

  /* ---- Responsive ---- */
  @media (max-width: 900px) {
    header { padding: 20px 20px 16px; }
    .tabs { padding: 0 20px; top: 96px; }
    .sidebar { display: none; }
    .main-content { padding: 20px; }
    .lesson-header { padding: 20px 20px 0; }
    .steps-container { padding: 16px 20px 24px; }
    .step-nav { flex-wrap: wrap; }
    .step-nav .btn-prev { order: 1; flex: 1; }
    .step-nav .btn-next, .step-nav .btn-finish { order: 2; flex: 1; }
    .app-layout { min-height: auto; }
  }
  @media (max-width: 600px) {
    header h1 { font-size: 18px; }
    .tab-btn { padding: 12px 14px; font-size: 12px; }
    .tab-btn.active::after { left: 14px; right: 14px; }
    .lesson-header h2 { font-size: 18px; }
    .step-content p { font-size: 14px; }
    .modal-box { padding: 24px; }
  }
</style>
</head>

<script>
const glossary = {
  'Data': 'Raw, unprocessed facts and figures that carry no meaning on their own &mdash; e.g., the value <strong>150</strong> or the string <strong>RM45.00</strong>.',
  'Information': 'Data that has been processed, organized, and contextualized to make it meaningful and useful for decision-making.',
  'Database': 'A shared, integrated collection of logically related data structured to support efficient retrieval and modification.',
  'DBMS': 'Database Management System &mdash; the software layer that manages, stores, retrieves, and manipulates data within a database.',
  'Data Independence': 'The separation of logical and physical schemas, meaning changes to storage structures do not affect application programs.',
  'Data Redundancy': 'The unnecessary duplication of the same data values across multiple files or tables within a system.',
  'Data Inconsistency': 'A condition where different copies of the same data hold conflicting values, often caused by uncontrolled redundancy.',
  'Data Anomaly': 'Irregularities or inconsistencies that arise in a database due to poor design, particularly from uncontrolled data redundancy.',
  'Update Anomaly': "An anomaly where changing a redundant fact requires updating multiple rows &mdash; a missed update creates inconsistency.",
  'Insertion Anomaly': "An anomaly where adding a new record is impossible without attaching it to another unrelated record.",
  'Deletion Anomaly': "An anomaly where deleting a record unintentionally removes other facts stored alongside it.",
  'Normalization': 'A technique that decomposes large, denormalized tables into smaller, well-structured relations to eliminate redundancy and anomalies.',
  'Conceptual Model': 'The highest-level data model that represents what data exists and how entities relate, using Entity-Relationship (ER) diagrams.',
  'Logical Model': 'A middle-level data model that maps the conceptual model to a specific data paradigm (e.g., relational), defining tables, columns, keys, and constraints.',
  'Physical Model': 'The lowest-level data model describing how data is actually stored &mdash; file organization, indexes, partitions, compression, and access paths.',
  'Data Dictionary': 'A centralized metadata repository that stores descriptions of all database objects &mdash; table definitions, column names, data types, constraints, indexes, views, and permissions.',
  'Metadata': 'Data about data &mdash; information that describes the structure, constraints, and properties of database objects.',
  'Relation': 'A two-dimensional table in the relational model, composed of tuples (rows) and attributes (columns).',
  'Tuple': 'A single row in a relation, representing one record or entity instance.',
  'Attribute': 'A named column in a relation, representing a property of the entity.',
  'Domain': 'The set of permissible values for an attribute.',
  'Functional Dependency': "A constraint where attribute X functionally determines attribute Y if each value of X is associated with exactly one value of Y (denoted X &rarr; Y).",
  'Superkey': 'A set of attributes that uniquely identifies every tuple in a relation.',
  'Candidate Key': 'A minimal superkey &mdash; a superkey with no proper subset that is itself a superkey.',
  'Primary Key': 'The candidate key chosen by the database designer as the main identifier for a relation.',
  'Composite Key': 'A primary key consisting of two or more attributes.',
  'Foreign Key': 'An attribute in one table that references the primary key in another table, used to establish relationships.',
  'Referential Integrity': 'A constraint ensuring that every foreign key value must match a primary key value in the referenced table or be NULL.',
  'SELECT (relational algebra)': 'The SELECT operation (&sigma;) filters rows (tuples) based on a predicate condition.',
  'PROJECT (relational algebra)': 'The PROJECT operation (&pi;) filters columns (attributes), retaining only those specified.',
  'Index': 'An auxiliary data structure (commonly a B&sup1;-tree) that provides fast access paths to rows based on column values.',
  'Fault Tolerance': 'The ability of a system to continue operating properly even when one or more of its components fail. In distributed databases, if one site fails, other sites keep running.',
  'Replication': 'A data distribution strategy where the same data is copied to all sites in a distributed database. Ensures high availability but makes writes slower.',
  'Partitioning': 'A data distribution strategy (also called sharding) where data is split across sites based on a rule &mdash; e.g., Site A stores Region 1 data, Site B stores Region 2 data.',
};

const tutorials = [
  {
    id: 'tutorial1',
    title: 'Tutorial 1 — Database Concepts',
    short: 'Database Concepts',
    questions: [
      {
        number: 1, title: 'Data & Information',
        intro: "Before we dive into databases, we need to understand the most fundamental building blocks. Let's start by looking at what data actually is, how it transforms into information, and why this distinction matters in the real world.",
        steps: [
          {
            title: 'What is Data?',
            body: `<strong>Data</strong> refers to <strong>raw, unprocessed facts and figures</strong> that carry no meaning on their own. Think of it as the ingredients before they are cooked.

Examples of data:
<ul>
  <li>The number <strong>150</strong> &mdash; just a number</li>
  <li>The string <strong>"RM45.00"</strong> &mdash; characters with no context</li>
  <li>A timestamp like <strong>"2026-01-10 14:30:00"</strong> &mdash; just a point in time</li>
</ul>

By itself, data tells us nothing. It needs to be processed and given context before it becomes useful.`
          },
          {
            title: 'What is Information?',
            body: `<strong>Information</strong> is data that has been <strong>processed, organized, and contextualized</strong> to make it meaningful and useful for decision-making.

The same examples, now as information:
<ul>
  <li><strong>150</strong> becomes "150 units of Product A were sold today"</li>
  <li><strong>"RM45.00"</strong> becomes "RM45.00 is the average transaction value for this customer segment"</li>
  <li>The timestamp becomes "The peak sales hour on Friday was 2:30 PM"</li>
</ul>

The key difference: <strong>Data</strong> is raw material; <strong>Information</strong> is the finished product.`,
            diagram: `flowchart LR
              D[Raw Data] --> P[Processing<br/>+ Context]
              P --> I[Information]
              I --> D1[Decision Making]
              style D fill:#eff6ff,stroke:#3b82f6,stroke-width:2px
              style I fill:#f0fdf4,stroke:#059669,stroke-width:2px
              style D1 fill:#fffbeb,stroke:#f59e0b,stroke-width:2px`
          },
          {
            title: 'The Relationship: A Business Example',
            body: `Let's look at a <strong>retail store</strong> to see this in action:

<div class="example-box">A retail store processes thousands of transactions every day. Each sale generates <strong>raw transaction records</strong> &mdash; product IDs, quantities, prices, and timestamps. These individual records are <strong>data</strong>.

When the store's system <strong>aggregates</strong> these records into a <strong>weekly sales report</strong> showing total revenue by product category, the result becomes <strong>information</strong> that managers can act upon.</div>

Data serves as the raw material. The process of <strong>selection, aggregation, and formatting</strong> transforms it into information.`
          },
          {
            title: 'Why Accuracy & Timeliness Matter',
            body: `<strong>Accurate information</strong> ensures that decisions rest on facts rather than guesswork.

<div class="highlight-box"><strong>🏥 Hospital example:</strong> A hospital relying on an inaccurate patient record system might administer incorrect treatments &mdash; the wrong dosage, the wrong medication, or the wrong procedure.</div>

<strong>Timely information</strong> ensures that decisions are made while they are still relevant.

<div class="highlight-box"><strong>📈 Stock trader example:</strong> A stock trader receiving price updates five minutes late cannot execute profitable trades &mdash; the market has already moved.</div>

<strong>Takeaway:</strong> Poor-quality information (inaccurate, delayed, or incomplete) leads directly to poor decisions, financial losses, and missed strategic opportunities.`
          }
        ],
        recap: [
          'Data is raw, unprocessed facts; Information is data made meaningful through processing and context.',
          'Accurate and timely information is critical for effective decision-making in any organization.'
        ]
      },
      {
        number: 2, title: 'Database & DBMS',
        intro: "Now that we understand data and information, the next question is: how do we store and manage all this data effectively? That's where databases and DBMS come in.",
        steps: [
          {
            title: 'What is a Database?',
            body: `A <strong>database</strong> is a <strong>shared, integrated collection</strong> of logically related data structured to support efficient retrieval and modification.

Think of it as a highly organized digital filing cabinet:
<ul>
  <li><strong>Shared</strong> &mdash; multiple users and applications can access it simultaneously</li>
  <li><strong>Integrated</strong> &mdash; data is stored in a way that shows relationships between different pieces of information</li>
  <li><strong>Structured</strong> &mdash; data follows a predefined schema with rules and constraints</li>
</ul>

Unlike a simple file or spreadsheet, a database ensures <strong>consistency, security, and efficiency</strong> even with millions of records.`
          },
          {
            title: 'What is a DBMS?',
            body: `A <strong>Database Management System (DBMS)</strong> is the <strong>software layer</strong> that manages, stores, retrieves, and manipulates data within a database. It provides an interface between users and the underlying data.

<div class="diagram-box"><pre class="mermaid">
flowchart LR
  U[Users / Applications] --> Q[Queries]
  Q --> DBMS[DBMS Layer]
  DBMS --> S[Security<br/>Management]
  DBMS --> CC[Concurrency<br/>Control]
  DBMS --> IC[Integrity<br/>Constraints]
  DBMS --> D[Database]
  D --> Storage[(Physical Storage)]
  style DBMS fill:#3b82f6,color:#fff,stroke:#1e40af,stroke-width:2px
  style D fill:#059669,color:#fff,stroke:#047857,stroke-width:2px
</pre></div>

The DBMS hides the complexity of how data is physically stored. Users just submit queries &mdash; the DBMS handles the rest.`
          },
          {
            title: 'DBMS as Intermediary',
            body: `The DBMS acts as <strong>middleware</strong> between users and the database. Here's what happens when you submit a query:

<div class="highlight-box"><strong>Step-by-step:</strong>
<ol>
  <li>You submit a query (e.g., SQL <code>SELECT</code> statement)</li>
  <li>The DBMS <strong>parses and validates</strong> your query</li>

<p><strong>M:N — Student and Course:</strong> A student enrolls in multiple courses, and each course contains many students. This requires a <strong>junction table</strong> to resolve.</p>`
          },
          {
            title: 'Why M:N Needs a Junction Table',
            body: `<p>M:N relationships <strong>cannot be directly implemented</strong> in a relational database. Here's why:</p>

<div class="highlight-box">Relational tables store data as rows with <strong>fixed attribute sets</strong>. An M:N relationship implies that one row in table A can be associated with an <strong>arbitrary number</strong> of rows in table B &mdash; storing this directly would require a variable-length attribute, which violates the <strong>atomicity rule of First Normal Form (1NF)</strong>.</div>

<p>The solution is to introduce a <strong>bridge (junction) table</strong> that decomposes the M:N relationship into <strong>two 1:M relationships</strong>:</p>

<p><code>Student <strong>1:M</strong> Enrolment <strong>M:1</strong> Course</code></p>

<p>The junction table <code>Enrolment(StudentID, CourseID)</code> has a composite primary key of both foreign keys, resolving the many-to-many.</p>`
          }
        ],
        recap: [
          'Three relationship types: 1:1 (Person↔Passport), 1:M (Department↔Employee), M:N (Student↔Course).',
          'M:N relationships require a junction table to break them into two 1:M relationships.'
        ]
      },
      {
        number: 8, title: 'Data Dictionary & Metadata',
        intro: "Every database needs a way to describe itself. That's the job of the data dictionary and metadata.",
        steps: [
          {
            title: 'What is a Data Dictionary?',
            body: `<p>A <strong>data dictionary</strong> (also called a <em>system catalog</em>) is a centralized repository of metadata that describes the structure, constraints, and properties of all database objects.</p>

<p>It stores information such as:</p>
<ul>
  <li><strong>Table names</strong> and their owners</li>
  <li><strong>Column definitions</strong> &mdash; names, data types, sizes</li>
  <li><strong>Primary and foreign keys</strong></li>
  <li><strong>Indexes</strong> and their structure</li>
  <li><strong>Views</strong> (saved queries)</li>
  <li><strong>User permissions</strong> and roles</li>
  <li><strong>Storage parameters</strong></li>
</ul>`
          },
          {
            title: 'The Role of Metadata',
            body: `<strong>Metadata</strong> provides the DBMS with a <strong>self-describing framework</strong> for managing data. Without it, the DBMS would have no knowledge of the database's own structure.

<div class="highlight-box">When a query is submitted, the DBMS <strong>consults the metadata</strong> to:
<ul>
  <li>Resolve table and column names</li>
  <li>Verify access rights</li>
  <li>Check constraint compliance</li>
  <li>Retrieve statistics for query optimization</li>
</ul></div>

<p>Think of metadata as the <strong>table of contents</strong> for your database &mdash; without it, you'd have to search through every page to find anything.</p>`
          },
          {
            title: 'Three Benefits of a System Catalog',
            body: `<ol>
  <li><strong>Data Consistency & Standardization:</strong> The catalog enforces uniform naming conventions and data-type rules across all tables. Changes to a column definition are immediately visible to all users and applications.</li>
  <li><strong>Access Control & Security:</strong> The catalog stores user privileges at the table, column, and operation levels. The DBMS checks these permissions on every query, ensuring only authorized users can access sensitive data.</li>
  <li><strong>Query Optimization:</strong> The catalog maintains statistics &mdash; row counts, index selectivity, data distribution &mdash; that the query optimizer uses to choose efficient execution plans, like index scans versus full table scans.</li>
</ol>`
          }
        ],
        recap: [
          'Data dictionary = centralized metadata repository describing all database objects.',

        ]
      },
      {
        number: 9, title: 'Relational Algebra (SELECT & PROJECT)',
        intro: "Relational algebra is the theoretical foundation of SQL. Two of its most important operations are SELECT and PROJECT &mdash; let's understand the difference.",
        steps: [
          {
            title: 'SELECT vs PROJECT: The Core Difference',
            body: `<p>Given the relation: <code>STUDENT(StudentID, StudentName, Programme)</code></p>

<table>
  <tr><th>Operation</th><th>Symbol</th><th>What it does</th><th>Example</th></tr>
  <tr><td><strong>SELECT</strong></td><td>&sigma;</td><td>Filters <strong>rows</strong> based on a condition<br/>Reduces <em>cardinality</em> (# of tuples)</td><td>Get all CS students</td></tr>
  <tr><td><strong>PROJECT</strong></td><td>&pi;</td><td>Filters <strong>columns</strong>, keeps only named attributes<br/>Reduces <em>degree</em> (# of attributes)</td><td>Show only names and IDs</td></tr>
</table>

<div class="highlight-box"><strong>Easy way to remember:</strong> SELECT = SELECT rows (like SQL WHERE). PROJECT = PROJECT columns (like SQL SELECT clause).</div>`
          },
          {
            title: 'Writing Relational Algebra Expressions',
            body: `<p><strong>Example 1:</strong> Retrieve all students from the "Computer Science" programme:</p>

<div class="highlight-box" style="font-size: 16px; text-align: center;">
  &sigma;<sub>Programme = "Computer Science"</sub>(STUDENT)
</div>

<p><strong>Example 2:</strong> Display only StudentID and StudentName for CS students:</p>

<div class="highlight-box" style="font-size: 16px; text-align: center;">
  &pi;<sub>StudentID, StudentName</sub>(&sigma;<sub>Programme = "Computer Science"</sub>(STUDENT))
</div>

<p>Notice how operations can be <strong>composed</strong> &mdash; we first SELECT the rows, then PROJECT the columns. This compositional nature is a key strength of relational algebra.</p>`
          },
          {
            title: 'UNION vs INTERSECT',
            body: `<table>
  <tr><th>Op</th><th>Result</th><th>Example</th></tr>
  <tr><td><strong>UNION</strong> (R &cup; S)</td><td>All tuples in R <strong>or</strong> S (or both), duplicates removed</td><td><code>&pi;<sub>Programme</sub>(STUDENT) &cup; &pi;<sub>Programme</sub>(STAFF)</code> returns all unique programmes across both</td></tr>
  <tr><td><strong>INTERSECT</strong> (R &cap; S)</td><td>Only tuples <strong>in both</strong> R and S</td><td><code>&pi;<sub>Programme</sub>(STUDENT) &cap; &pi;<sub>Programme</sub>(STAFF)</code> returns only programmes that exist in both</td></tr>
</table>

<p>Both operations require the operand relations to be <strong>union-compatible</strong> &mdash; same number of attributes with compatible data types.</p>`
          }
        ],

          'SELECT (σ) filters rows; PROJECT (π) filters columns — they are often composed together.',

<div class="highlight-box">While <strong>controlled redundancy</strong> (like foreign keys) is essential for representing relationships, <strong>uncontrolled redundancy</strong> wastes storage and leads to maintenance problems.</div>

<p>Two anomalies from excessive redundancy:</p>
<ul>
  <li><strong>Update Anomaly:</strong> Changing a student's address stored in both ENROLMENT and STUDENT tables requires updating multiple rows &mdash; miss one and the database is inconsistent.</li>
  <li><strong>Deletion Anomaly:</strong> If course details are stored redundantly within enrolment records, deleting the last enrolment for a course also deletes the course information.</li>
</ul>`

<div class="diagram-box"><pre class="mermaid">
flowchart TD
  Q[Query:<br/>WHERE Name = 'Ali'] --> IDX[Index]
  IDX --> Found[Find 'Ali' in B+-tree<br/>O(log n) comparisons]
  Found --> Pages[Locate exact disk page]
  Pages --> Row[Return matching row]
  style IDX fill:#dbeafe,stroke:#3b82f6,stroke-width:2px
  style Row fill:#f0fdf4,stroke:#059669,stroke-width:2px
</pre></div>

<p>Indexes sacrifice <strong>write performance</strong> (inserts/updates become slower because the index must be maintained) and <strong>storage space</strong> to accelerate <strong>read operations</strong>.</p>`
          },

            body: `<p>Without an index, the DBMS must perform a <strong>full table scan</strong> &mdash; reading every row sequentially from disk.</p>

<div class="highlight-box">An index allows the DBMS to navigate directly to the relevant disk pages using <strong>balanced-tree search</strong>, reducing the search from <strong>O(n)</strong> to <strong>O(log n)</strong> comparisons. For large tables, this means orders-of-magnitude fewer disk I/O operations.</div>

<p>Indexes also help with:</p>
<ul>
  <li><strong>JOIN operations</strong> &mdash; fast lookup of matching foreign keys</li>
  <li><strong>ORDER BY and GROUP BY</strong> &mdash; scan the index in sorted order instead of sorting the entire result set</li>
</ul>`
          }

        ]
      }
    ]
  }

const tabsContainer = document.getElementById('tabsContainer');
const sidebarList = document.getElementById('sidebarList');
const mainContent = document.getElementById('mainContent');
const glossaryModal = document.getElementById('glossaryModal');
const glossaryTermTitle = document.getElementById('glossaryTermTitle');
const glossaryTermDef = document.getElementById('glossaryTermDef');

let currentTutorialIdx = 0;
let currentLessonIdx = 0;
let currentStepIdx = 0;

function renderTabs() {
  tabsContainer.innerHTML = tutorials.map((t, i) =>
    `<button class="tab-btn ${i === currentTutorialIdx ? 'active' : ''}" onclick="switchTutorial(${i})">
      ${t.title}
      <span class="tab-badge">${t.questions.length} lessons</span>
    </button>`
  ).join('');
}

function switchTutorial(idx) {
  currentTutorialIdx = idx;
  currentLessonIdx = 0;
  currentStepIdx = 0;
  renderTabs();
  renderSidebar();
  renderLesson();
}

function renderSidebar() {
  const t = tutorials[currentTutorialIdx];
  sidebarList.innerHTML = t.questions.map((q, i) => {
    const isActive = i === currentLessonIdx;
    const cls = isActive ? 'active' : '';
    return `<li><a class="${cls}" onclick="switchLesson(${i})">
      <span class="q-num">Q${q.number}</span> ${q.title}
    </a></li>`;
  }).join('');
}

function switchLesson(idx) {
  currentLessonIdx = idx;
  currentStepIdx = 0;
  renderSidebar();
  renderLesson();
}

function renderLesson() {
  const t = tutorials[currentTutorialIdx];
  const q = t.questions[currentLessonIdx];
  if (!q) {
    mainContent.innerHTML = `<div class="empty-state"><h2>Select a lesson</h2><p>Choose a lesson from the sidebar.</p></div>`;
    return;
  }

  const step = q.steps[currentStepIdx];
  const totalSteps = q.steps.length;
  const isLastStep = currentStepIdx === totalSteps - 1;

  const stepDots = q.steps.map((_, i) =>
    `<span class="step-dot ${i === currentStepIdx ? 'current active' : i < currentStepIdx ? 'done' : ''}"></span>`
  ).join('');

  const bodyHtml = processBody(step.body);

  let diagramHtml = '';
  if (step.diagram) {
    diagramHtml = `<div class="diagram-box"><pre class="mermaid">${escapeHtml(step.diagram)}</pre></div>`;
  }

  let recapHtml = '';
  if (isLastStep && q.recap) {
    recapHtml = `<div class="recap-box">
      <h4>📝 Lesson Summary</h4>
      <ul>${q.recap.map(r => `<li>${r}</li>`).join('')}</ul>
    </div>`;
  }

  mainContent.innerHTML = `
    <div class="lesson-card">
      <div class="lesson-header">
        <span class="q-label">Question ${q.number}</span>
        <h2>${q.title}</h2>
        <div class="lesson-intro">${q.intro}</div>
      </div>
      <div class="steps-container">
        <div class="steps-progress">
          ${stepDots}
          <span class="step-label">${currentStepIdx + 1} / ${totalSteps}</span>
        </div>
        <div class="step-content">
          <h3>${step.title}</h3>
          ${bodyHtml}
          ${diagramHtml}
          ${recapHtml}
        </div>
        <div class="step-nav">
          <button class="btn-prev" onclick="prevStep()" ${currentStepIdx === 0 ? 'disabled' : ''}>
            ← Previous
          </button>
          ${isLastStep
            ? `<button class="btn-finish" onclick="nextLesson()">Next Lesson →</button>`
            : `<button class="btn-next" onclick="nextStep()">Continue →</button>`
          }
        </div>
      </div>
    </div>
  `;

  initMermaid();
  attachGlossaryListeners();
  updateSidebarProgress();
}

function nextStep() {
  const q = tutorials[currentTutorialIdx].questions[currentLessonIdx];
  if (currentStepIdx < q.steps.length - 1) {
    currentStepIdx++;
    renderLesson();
  }
}

function prevStep() {
  if (currentStepIdx > 0) {
    currentStepIdx--;
    renderLesson();
  }
}

function nextLesson() {
  const t = tutorials[currentTutorialIdx];
  if (currentLessonIdx < t.questions.length - 1) {
    currentLessonIdx++;
    currentStepIdx = 0;
    renderSidebar();
    renderLesson();
  }
}

function updateSidebarProgress() {
  const t = tutorials[currentTutorialIdx];
  const links = sidebarList.querySelectorAll('a');
  links.forEach((a, i) => {
    a.classList.remove('done');
  });
  if (currentStepIdx === 0) return; // hasn't completed any step yet
  links.forEach((a, i) => {
    if (i < currentLessonIdx) a.classList.add('done');
  });
  // Mark current lesson as done only if we're past step 0
  if (currentStepIdx > 0) {
    links[currentLessonIdx]?.classList.add('done');
  }
}

function processBody(html) {
  return html.replace(/\{\{(.+?)\}\}/g, (_, term) => {
    const key = Object.keys(glossary).find(k => k.toLowerCase() === term.toLowerCase());
    if (key) {
      return `<span class="glossary-term" data-term="${key}">${key}</span>`;
    }
    return term;
  });
}

function attachGlossaryListeners() {
  document.querySelectorAll('.glossary-term').forEach(el => {
    el.addEventListener('click', () => {
      const term = el.dataset.term;
      if (glossary[term]) {
        glossaryTermTitle.textContent = term;
        glossaryTermDef.innerHTML = glossary[term];
        glossaryModal.classList.add('show');
      }
    });
  });
}

function closeGlossary() {
  glossaryModal.classList.remove('show');
}

function initMermaid() {
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', fontSize: 14 });
    mermaid.run({ querySelector: '.mermaid' }).catch(() => {});
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

glossaryModal.addEventListener('click', (e) => {
  if (e.target === glossaryModal) closeGlossary();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeGlossary();
  if (e.key === 'ArrowRight') nextStep();
  if (e.key === 'ArrowLeft') prevStep();
});

renderTabs();
renderSidebar();
switchLesson(0);
</script>
</body>
</html>
