<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ course_name }} — Practice Quiz</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0f172a; --slate: #334155; --slate-light: #64748b;
    --blue: #3b82f6; --blue-light: #eff6ff; --blue-dark: #1e40af;
    --teal: #14b8a6; --teal-light: #f0fdfa; --teal-dark: #0f766e;
    --green: #10b981; --green-light: #d1fae5; --green-dark: #047857;
    --red: #ef4444; --red-light: #fef2f2; --red-dark: #b91c1c;
    --bg: #f8fafc; --card: #fff; --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.08); --shadow-lg: 0 10px 25px rgba(0,0,0,.08);
    --radius: 12px; --radius-sm: 8px; --font: 'Inter', sans-serif;
    --transition: .25s cubic-bezier(.4,0,.2,1);
  }
  body { font-family: var(--font); background: var(--bg); color: var(--slate); line-height: 1.6; }
  header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 20px; font-weight: 800; }
  header .sub { font-size: 12px; color: #94a3b8; }
  .header-link { color: #94a3b8; text-decoration: none; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 8px; margin-left: auto; transition: all var(--transition); }
  .header-link:hover { background: rgba(255,255,255,.1); color: #fff; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; background: var(--card); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); }
  .controls label { font-size: 13px; font-weight: 600; }
  .controls select, .controls button { font-family: var(--font); font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--slate); transition: all var(--transition); }
  .controls select:hover, .controls button:hover { border-color: var(--blue); }
  .controls .btn-primary { background: var(--blue); color: #fff; border: none; }
  .controls .btn-primary:hover { background: var(--blue-dark); }
  .controls .btn-outline { border: 1px solid var(--border); }
  .controls .btn-outline:hover { background: var(--bg); }
  .stats { display: flex; gap: 16px; margin-left: auto; font-size: 13px; font-weight: 600; }
  .stats .correct { color: var(--green); }
  .stats .wrong { color: var(--red); }
  .q-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; animation: fadeIn .3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .q-header { padding: 24px 28px 0; }
  .q-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .q-chapter { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: .3px; }
  .q-num { font-size: 12px; font-weight: 600; color: var(--slate-light); }
  .q-text { font-size: 16px; font-weight: 600; color: var(--navy); line-height: 1.5; margin-bottom: 20px; }
  .q-options { padding: 0 28px 24px; }
  .q-option { display: block; width: 100%; text-align: left; padding: 12px 16px; margin-bottom: 8px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: #fff; font-family: var(--font); font-size: 14px; font-weight: 500; color: var(--slate); cursor: pointer; transition: all var(--transition); }
  .q-option:hover:not(.disabled) { border-color: var(--blue); background: var(--blue-light); }
  .q-option .letter { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 6px; background: var(--bg); font-size: 12px; font-weight: 700; color: var(--slate-light); margin-right: 10px; transition: all var(--transition); }
  .q-option:hover:not(.disabled) .letter { background: var(--blue); color: #fff; }
  .q-option.selected { border-color: var(--blue); background: var(--blue-light); }
  .q-option.selected .letter { background: var(--blue); color: #fff; }
  .q-option.correct { border-color: var(--green); background: var(--green-light); }
  .q-option.correct .letter { background: var(--green); color: #fff; }
  .q-option.wrong { border-color: var(--red); background: var(--red-light); }
  .q-option.wrong .letter { background: var(--red); color: #fff; }
  .q-option.disabled { cursor: default; opacity: .85; }
  .q-option.show-correct { border-color: var(--green); background: var(--green-light); }
  .q-option.show-correct .letter { background: var(--green); color: #fff; }
  .feedback { padding: 0 28px 24px; display: none; }
  .feedback.show { display: block; }
  .feedback-inner { padding: 14px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; }
  .feedback-inner.correct { background: var(--green-light); color: var(--green-dark); }
  .feedback-inner.wrong { background: var(--red-light); color: var(--red-dark); }
  .q-nav { display: flex; gap: 10px; padding: 20px 28px 24px; border-top: 1px solid var(--border); align-items: center; }
  .q-nav button { padding: 10px 24px; font-family: var(--font); font-size: 13px; font-weight: 600; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition); }
  .q-nav .btn-prev { background: var(--bg); color: var(--slate); }
  .q-nav .btn-prev:hover { background: var(--border); }
  .q-nav .btn-next { background: var(--blue); color: #fff; }
  .q-nav .btn-next:hover { background: var(--blue-dark); }
  .q-nav .btn-check { background: var(--green); color: #fff; }
  .q-nav .btn-check:hover { background: var(--green-dark); }
  .q-nav .btn-check:disabled { opacity: .5; cursor: default; }
  .q-nav .q-counter { font-size: 13px; font-weight: 600; color: var(--slate-light); margin-right: auto; }
  .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .4s ease-out; }
  .results { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 40px; text-align: center; animation: fadeIn .4s ease-out; }
  .results .score { font-size: 64px; font-weight: 800; color: var(--navy); }
  .results .score-label { font-size: 14px; color: var(--slate-light); margin-bottom: 8px; }
  .results .score-bar { width: 100%; height: 10px; background: var(--border); border-radius: 5px; margin: 16px 0; overflow: hidden; }
  .results .score-fill { height: 100%; border-radius: 5px; transition: width 1s ease-out; background: linear-gradient(90deg, var(--red), #f59e0b, var(--green)); }
  .empty { text-align: center; padding: 60px 40px; color: var(--slate-light); }
  .empty h2 { font-size: 20px; color: var(--slate); margin-bottom: 8px; }
  @media (max-width: 600px) {
    .container { padding: 16px 12px 40px; }
    .controls { padding: 12px 16px; }
    .q-header { padding: 16px 16px 0; }
    .q-options { padding: 0 16px 16px; }
    .feedback { padding: 0 16px 16px; }
    .q-nav { padding: 16px; flex-wrap: wrap; }
    .results { padding: 24px; }
    .results .score { font-size: 48px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📝 CompTIA Security+ Practice Quiz</h1>
    <div class="sub">Exam SY0-701 — 327 questions from all 18 chapters</div>
  </div>
  <a class="header-link" href="/course/secplus/lessons">📖 Study Slides</a>
  <a class="header-link" href="/">📚 Home</a>
</header>

<div class="container" id="app">
  <div class="controls">
    <label>Chapter:</label>
    <select id="chapterSelect" onchange="changeChapter()"></select>
    <button class="btn-outline" onclick="shuffle()">🔀 Shuffle</button>
    <button class="btn-primary" onclick="resetAll()">🔄 Reset Progress</button>
    <div class="stats">
      <span class="correct" id="correctCount">0 ✓</span>
      <span class="wrong" id="wrongCount">0 ✗</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="quizContent">
    <div class="empty"><h2>Loading questions...</h2></div>
  </div>
</div>

<script>
const CH_NAMES = {{ chapters_json | safe }};
const ALL_QUESTIONS = {{ questions_json | safe }};

// State
let currentQuestions = [];
let currentIdx = 0;
let results = {}; // idx -> 'correct' | 'wrong'
let shuffled = false;
let chapterFilter = 'all';

function init() {
  const sel = document.getElementById('chapterSelect');
  sel.innerHTML = '<option value="all">All Chapters</option>' +
    CH_NAMES.map((n, i) => `<option value="${i}">Ch ${i+1} — ${n}</option>`).join('');
  loadQuestions();
}

function loadQuestions() {
  if (chapterFilter === 'all') {
    currentQuestions = ALL_QUESTIONS.slice();
  } else {
    currentQuestions = ALL_QUESTIONS.filter(q => q.c === parseInt(chapterFilter));
  }
  if (shuffled) shuffle();
  currentIdx = 0;
  render();
}

function shuffle() {
  shuffled = !shuffled;
  if (shuffled) {
    for (let i = currentQuestions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
    }
  } else {
    // Restore original order if all questions
    if (chapterFilter === 'all') {
      currentQuestions = ALL_QUESTIONS.slice();
    }
  }
  currentIdx = 0;
  render();
}

function changeChapter() {
  chapterFilter = document.getElementById('chapterSelect').value;
  shuffled = false;
  loadQuestions();
}

function resetAll() {
  if (!confirm('Reset all progress? This will clear correct/wrong marks.')) return;
  results = {};
  currentIdx = 0;
  render();
}

function render() {
  const container = document.getElementById('quizContent');
  const qs = currentQuestions;
  
  if (!qs.length) {
    container.innerHTML = '<div class="empty"><h2>No questions match</h2></div>';
    updateStats();
    return;
  }

  const q = qs[currentIdx];
  const total = qs.length;
  const letters = ['A', 'B', 'C', 'D'];
  
  const answered = results[currentQuestions.indexOf(q)] !== undefined;
  const isCorrect = results[currentQuestions.indexOf(q)] === 'correct';
  const selectedOpt = results[currentQuestions.indexOf(q) + '_sel'];
  
  const progressPct = ((currentIdx + 1) / total) * 100;

  const optsHtml = q.o.map((opt, i) => {
    let cls = '';
    if (answered) {
      cls = 'disabled';
      if (i === q.a) cls += ' correct';
      else if (i === selectedOpt) cls += ' wrong';
    }
    return `<button class="q-option ${cls}" onclick="selectAnswer(${i})" ${answered ? 'disabled' : ''}>
      <span class="letter">${letters[i]}</span>${opt}
    </button>`;
  }).join('');

  const feedbackHtml = answered
    ? `<div class="feedback show"><div class="feedback-inner ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ Correct!' : '✗ Incorrect. The correct answer was: ' + q.o[q.a]}</div></div>`
    : '';

  container.innerHTML = `
    <div class="q-card">
      <div class="progress-bar" style="margin:0;border-radius:0;height:3px"><div class="progress-fill" style="width:${progressPct}%;background:var(--teal)"></div></div>
      <div class="q-header">
        <div class="q-meta">
          <span class="q-chapter">Ch ${q.c + 1} — ${CH_NAMES[q.c]}</span>
          <span class="q-num">Question ${currentIdx + 1} of ${total}</span>
        </div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="q-options">${optsHtml}</div>
      ${feedbackHtml}
      <div class="q-nav">
        <button class="btn-prev" onclick="prevQ()" ${currentIdx === 0 ? 'disabled style=opacity:.5' : ''}>← Previous</button>
        <button class="btn-check" id="checkBtn" onclick="revealAnswer()" ${answered ? 'disabled' : ''}>Check Answer</button>
        <button class="btn-next" onclick="nextQ()">${currentIdx === total - 1 ? 'Done' : 'Next →'}</button>
      </div>
    </div>
  `;

  updateStats();
}

function selectAnswer(idx) {
  // Just style the selected option
  document.querySelectorAll('.q-option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('checkBtn').disabled = false;
}

function revealAnswer() {
  const q = currentQuestions[currentIdx];
  const selected = document.querySelector('.q-option.selected');
  if (!selected) return;
  const idx = Array.from(document.querySelectorAll('.q-option')).indexOf(selected);
  const key = currentQuestions.indexOf(q);
  
  results[key] = idx === q.a ? 'correct' : 'wrong';
  results[key + '_sel'] = idx;
  render();
}

function nextQ() {
  if (currentIdx < currentQuestions.length - 1) {
    currentIdx++;
    render();
  }
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    render();
  }
}

function updateStats() {
  const correct = Object.keys(results).filter(k => !k.includes('_') && results[k] === 'correct').length;
  const wrong = Object.keys(results).filter(k => !k.includes('_') && results[k] === 'wrong').length;
  document.getElementById('correctCount').textContent = correct + ' ✓';
  document.getElementById('wrongCount').textContent = wrong + ' ✗';
}

init();
</script>
</body>
</html>
