<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ course_name }}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Merriweather', 'Times New Roman', serif;
    font-size: 11pt;
    line-height: 1.6;
    color: #1a1a1a;
    padding: 50px 70px;
    max-width: 210mm;
    margin: 0 auto;
    background: #fff;
  }
  .header-container {
    border-bottom: 3px double #1a1a2e;
    padding-bottom: 15px;
    margin-bottom: 25px;
  }
  h1 {
    font-family: 'Open Sans', Arial, sans-serif;
    font-size: 20pt;
    font-weight: 700;
    margin-bottom: 4px;
    color: #1a1a2e;
  }
  .subtitle {
    font-family: 'Open Sans', Arial, sans-serif;
    font-size: 11pt;
    color: #555;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .student-info {
    font-family: 'Open Sans', Arial, sans-serif;
    font-size: 10pt;
    color: #333;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    row-gap: 6px;
    column-gap: 12px;
    margin-top: 10px;
    background: #f8f9fa;
    padding: 12px 18px;
    border-left: 4px solid #1a1a2e;
    border-radius: 0 4px 4px 0;
  }
  .student-info span strong {
    color: #1a1a2e;
  }
  h2 {
    font-family: 'Open Sans', Arial, sans-serif;
    font-size: 14pt;
    font-weight: 600;
    margin-top: 30px;
    margin-bottom: 12px;
    color: #1a1a2e;
    border-bottom: 1.5px solid #1a1a2e;
    padding-bottom: 4px;
    page-break-after: avoid;
  }
  h3 {
    font-family: 'Open Sans', Arial, sans-serif;
    font-size: 11pt;
    font-weight: 600;
    margin-top: 20px;
    margin-bottom: 8px;
    color: #333;
    page-break-after: avoid;
  }
  p { margin-bottom: 12px; text-align: justify; }
  ul, ol {
    margin-left: 24px;
    margin-bottom: 12px;
  }
  li {
    margin-bottom: 6px;
    text-align: justify;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 10pt;
    page-break-inside: avoid;
  }
  th, td {
    border: 1px solid #aaa;
    padding: 8px 12px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: #f4f5f7;
    font-weight: 600;
    font-family: 'Open Sans', Arial, sans-serif;
    color: #1a1a2e;
  }
  pre {
    background-color: #f4f5f7;
    border-left: 4px solid #1a1a2e;
    padding: 12px;
    overflow-x: auto;
    margin: 14px 0;
    border-radius: 0 4px 4px 0;
    page-break-inside: avoid;
  }
  code {
    font-family: 'Courier New', Courier, monospace;
    font-size: 9.5pt;
    background-color: #f4f5f7;
    padding: 2px 4px;
    border-radius: 3px;
  }
  pre code {
    background-color: transparent;
    padding: 0;
    border-radius: 0;
  }
  .mermaid {
    margin: 20px 0;
    text-align: center;
    background: #fff;
    padding: 10px;
    border: 1px solid #eee;
    border-radius: 4px;
    page-break-inside: avoid;
  }
  hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 25px 0;
  }
  @media print {
    body {
      padding: 15mm 20mm;
      font-size: 11pt;
    }
    .student-info {
      background: none;
      border: 1px solid #ccc;
      border-left: 4px solid #1a1a2e;
    }
  }
</style>
</head>
<body>

{{ content_html | safe }}

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({ startOnLoad: true, theme: 'default', securityLevel: 'loose' });
</script>
</body>
</html>
