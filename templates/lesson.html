<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ course_name }} — Interactive Lessons</title>
<link rel="icon" type="image/png" href="/favicon.png">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0f172a; --slate: #334155; --slate-light: #64748b;
    --blue: #3b82f6; --blue-light: #eff6ff; --blue-dark: #1e40af;
    --teal: #14b8a6; --teal-light: #f0fdfa;
    --amber: #f59e0b; --amber-light: #fffbeb;
    --rose: #f43f5e; --rose-light: #fff1f2;
    --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.08);
    --radius: 12px; --radius-sm: 8px;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-serif: 'Merriweather', Georgia, serif;
    --transition: .25s cubic-bezier(.4,0,.2,1);
  }
  body.dark {
    color-scheme: dark;
    --navy: #e2e8f0; --slate: #94a3b8; --slate-light: #64748b;
    --blue-light: rgba(59,130,246,.18); --blue-dark: #60a5fa;
    --teal-light: rgba(20,184,166,.18);
    --amber-light: rgba(245,158,11,.18);
    --rose-light: rgba(244,63,94,.18);
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --shadow: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.25);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.35);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans); background: var(--bg); color: var(--slate);
    line-height: 1.7; -webkit-font-smoothing: antialiased;
  }
  header {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #fff; padding: 20px 40px; position: sticky; top: 0;
    z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.15);
    display: flex; align-items: center; gap: 24px;
  }
  .theme-toggle {
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
    color: #fff; border-radius: 8px; padding: 8px 12px; cursor: pointer;
    font-size: 14px; transition: background var(--transition);
  }
  .theme-toggle:hover { background: rgba(255,255,255,.2); }
  header .header-left { flex-shrink: 0; }
  header h1 { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
  header p { font-size: 13px; color: #94a3b8; margin-top: 2px; font-weight: 500; }
  .header-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.1); padding: 4px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 600; margin-top: 6px; letter-spacing: .3px;
  }
  .header-badge span { color: var(--teal); }
  .header-link {
    color: #94a3b8; text-decoration: none; font-size: 13px; font-weight: 500;
    margin-left: auto; padding: 6px 14px; border-radius: 8px;
    transition: all var(--transition); white-space: nowrap;
  }
  .header-link:hover { background: rgba(255,255,255,.1); color: #fff; }

  .search-wrapper { position: relative; flex-shrink: 0; min-width: 200px; }
  .search-input {
    width: 100%; padding: 10px 16px 10px 38px;
    border: 1px solid rgba(255,255,255,.2); border-radius: 10px;
    background: rgba(255,255,255,.1); color: #fff;
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
    outline: none; transition: all var(--transition);
  }
  .search-input::placeholder { color: rgba(255,255,255,.4); font-weight: 400; }
  .search-input:focus { border-color: var(--blue); background: rgba(255,255,255,.15); }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: .5; pointer-events: none; }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(255,255,255,.4);
    font-size: 16px; cursor: pointer; display: none; padding: 2px;
    line-height: 1; border-radius: 4px;
  }
  .search-clear:hover { color: #fff; }
  .search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--card); border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg); max-height: 380px; overflow-y: auto;
    display: none; z-index: 200;
  }
  .search-results.show { display: block; }
  .search-result-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background var(--transition); }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover, .search-result-item.highlighted { background: var(--blue-light); }
  .search-result-item .sr-path { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; color: var(--blue); margin-bottom: 2px; }
  .search-result-item .sr-title { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 3px; }
  .search-result-item .sr-preview { font-size: 12px; color: var(--slate-light); line-height: 1.4; }
  .search-result-item .sr-preview em { background: var(--amber-light); font-style: normal; padding: 0 2px; color: var(--amber); font-weight: 600; }
  .search-empty { padding: 20px; text-align: center; color: var(--slate-light); font-size: 13px; }

  .tabs {
    display: flex; background: var(--card); border-bottom: 1px solid var(--border);
    padding: 0 40px; position: sticky; top: 110px; z-index: 99;
    box-shadow: 0 1px 2px rgba(0,0,0,.04); overflow-x: auto;
  }
  .tab-btn {
    padding: 14px 20px; font-family: var(--font-sans); font-size: 13px;
    font-weight: 600; border: none; background: none; cursor: pointer;
    color: var(--slate-light); position: relative; white-space: nowrap;
    transition: color var(--transition);
  }
  .tab-btn:hover { color: var(--slate); }
  .tab-btn.active { color: var(--navy); }
  .tab-btn.active::after {
    content: ''; position: absolute; bottom: 0; left: 20px; right: 20px;
    height: 3px; background: var(--blue); border-radius: 3px 3px 0 0;
  }
  .tab-badge {
    display: inline-block; background: var(--border); padding: 0 8px;
    border-radius: 10px; font-size: 10px; font-weight: 700;
    margin-left: 5px; color: var(--slate-light);
  }
  .tab-btn.active .tab-badge { background: var(--blue-light); color: var(--blue); }

  .app-layout { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 170px); }
  .sidebar {
    width: 280px; flex-shrink: 0; background: var(--card);
    border-right: 1px solid var(--border); padding: 20px 16px;
    position: sticky; top: 170px; height: calc(100vh - 170px); overflow-y: auto;
  }
  .sidebar h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--slate-light); margin-bottom: 12px; padding: 0 8px; }
  .sidebar-list { list-style: none; }
  .sidebar-list li { margin-bottom: 2px; }
  .sidebar-list a {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; color: var(--slate);
    text-decoration: none; transition: all var(--transition); cursor: pointer;
  }
  .sidebar-list a:hover { background: var(--bg); }
  .sidebar-list a.active { background: var(--blue-light); color: var(--blue); font-weight: 600; }
  .sidebar-list a .q-num {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    background: var(--bg); color: var(--slate-light);
    transition: all var(--transition);
  }
  .sidebar-list a.active .q-num { background: var(--blue); color: #fff; }
  .sidebar-list a.done .q-num { background: #d1fae5; color: #065f46; }
  .sidebar-list a.done::after { content: '✓'; margin-left: auto; font-size: 13px; color: #059669; }

  .main-content { flex: 1; padding: 32px 48px; min-width: 0; }
  .lesson-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; animation: fadeIn .4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .lesson-header { padding: 28px 32px 0; }
  .lesson-header .q-label { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 10px; }
  .lesson-header h2 { font-family: var(--font-serif); font-weight: 700; font-size: 22px; color: var(--navy); line-height: 1.3; }
  .lesson-intro { margin-top: 14px; padding: 16px 20px; background: var(--amber-light); border-left: 3px solid var(--amber); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 14px; color: var(--slate); line-height: 1.7; }
  .lesson-intro::before { content: '🧑‍🏫 '; font-size: 16px; }
  .steps-container { padding: 24px 32px 32px; }
  .steps-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
  .step-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: all var(--transition); }
  .step-dot.active { background: var(--blue); transform: scale(1.3); }
  .step-dot.done { background: var(--teal); }
  .step-dot.current ~ .step-dot { opacity: .4; }
  .step-label { font-size: 11px; font-weight: 600; color: var(--slate-light); margin-left: auto; text-transform: uppercase; letter-spacing: .3px; }
  .step-content { animation: fadeIn .35s ease-out; }
  .step-content h3 { font-family: var(--font-serif); font-size: 17px; color: var(--navy); margin-bottom: 14px; font-weight: 700; }
  .step-content p { font-size: 15px; line-height: 1.8; margin-bottom: 14px; color: var(--slate); }
  .step-content p:last-child { margin-bottom: 0; }
  .step-content ul, .step-content ol { margin: 10px 0 14px; padding-left: 22px; }
  .step-content li { font-size: 15px; line-height: 1.7; margin-bottom: 6px; }
  .step-content strong { color: var(--navy); font-weight: 600; }
  .step-content .highlight-box { background: var(--teal-light); border-left: 3px solid var(--teal); padding: 14px 18px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin: 14px 0; font-size: 14px; }
  .step-content .example-box { background: var(--blue-light); border-left: 3px solid var(--blue); padding: 14px 18px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin: 14px 0; font-size: 14px; }
  .step-content .example-box::before { content: '💡 '; font-weight: 600; color: var(--blue-dark); font-size: 13px; }
  .step-content table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 14px; border-radius: var(--radius-sm); overflow: hidden; }
  .step-content th { background: var(--bg); font-weight: 600; text-align: left; padding: 10px 14px; color: var(--navy); font-size: 12px; text-transform: uppercase; letter-spacing: .3px; }
  .step-content td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .step-content tr:last-child td { border-bottom: none; }
  .glossary-term { color: var(--blue); cursor: pointer; border-bottom: 1px dashed var(--blue); font-weight: 500; transition: all var(--transition); }
  .glossary-term:hover { background: var(--blue-light); }
  .diagram-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px; margin: 18px 0; overflow-x: auto; }
  .diagram-box .mermaid { display: flex; justify-content: center; }
  .img-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin: 18px 0; text-align: center; }
  .img-box img { max-width: 100%; height: auto; border-radius: 4px; }
  .img-box .img-caption { font-size: 12px; color: var(--slate-light); margin-top: 8px; font-style: italic; }
  .interactive-lab {
    margin: 20px 0; border: 1px solid color-mix(in srgb, var(--blue) 35%, var(--border));
    border-radius: var(--radius); overflow: hidden; background: var(--card);
    box-shadow: 0 8px 24px rgba(59,130,246,.08);
  }
  .lab-heading { padding: 18px 20px; background: linear-gradient(135deg, var(--blue-light), var(--teal-light)); border-bottom: 1px solid var(--border); }
  .lab-heading h4 { font-size: 17px; color: var(--navy); margin: 5px 0 4px; }
  .lab-heading p { margin: 0; font-size: 13px; line-height: 1.55; }
  .lab-badge { display: inline-flex; padding: 3px 9px; border-radius: 999px; background: var(--blue); color: #fff; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }
  .lab-stage { padding: 20px; }
  .lab-progress { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; font-size: 12px; font-weight: 700; color: var(--slate-light); }
  .lab-progress-track { flex: 1; max-width: 220px; height: 7px; border-radius: 999px; background: var(--border); overflow: hidden; }
  .lab-progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--teal)); transition: width var(--transition); }
  .lab-card { padding: 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); margin-bottom: 12px; }
  .lab-card-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: var(--navy); font-weight: 700; font-size: 14px; margin-bottom: 10px; }
  .lab-card code { font-size: 13px; }
  .lab-options { display: flex; flex-wrap: wrap; gap: 8px; }
  .lab-option, .lab-action, .lab-reset, .lab-zone, .lab-chip {
    font: 600 13px var(--font-sans); border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--slate); padding: 8px 12px; cursor: pointer;
    transition: border-color var(--transition), background var(--transition), color var(--transition), transform var(--transition);
  }
  .lab-option:hover, .lab-zone:hover, .lab-chip:hover { border-color: var(--blue); transform: translateY(-1px); }
  .lab-option.selected, .lab-chip.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue-dark); }
  .lab-option.correct { border-color: #10b981; background: #ecfdf5; color: #047857; }
  .lab-option.incorrect { border-color: var(--rose); background: var(--rose-light); color: #be123c; }
  .lab-action { background: var(--blue); border-color: var(--blue); color: #fff; }
  .lab-action:hover { background: var(--blue-dark); }
  .lab-action:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  .lab-reset { background: transparent; }
  .lab-toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 14px; }
  .lab-feedback { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
  .lab-feedback.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
  .lab-feedback.error { background: var(--rose-light); color: #9f1239; border: 1px solid #fecdd3; }
  .lab-feedback.info { background: var(--blue-light); color: var(--blue-dark); border: 1px solid #bfdbfe; }
  .lab-relation { text-align: center; padding: 16px; border-radius: 10px; background: var(--navy); color: var(--card); font-weight: 800; letter-spacing: .2px; margin: 12px 0; overflow-x: auto; }
  body.dark .lab-relation { background: #0f172a; color: #f8fafc; }
  .lab-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .lab-field label { display: block; color: var(--slate-light); font-size: 11px; font-weight: 700; margin-bottom: 5px; }
  .lab-field select { width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--navy); font: 600 13px var(--font-sans); }
  .lab-dnd { display: grid; grid-template-columns: minmax(180px, .8fr) minmax(0, 2fr); gap: 14px; }
  .lab-palette, .lab-zones { padding: 12px; border: 1px dashed var(--border); border-radius: 10px; }
  .lab-palette h5, .lab-zones h5 { margin-bottom: 10px; color: var(--navy); font-size: 12px; }
  .lab-palette-list { display: flex; flex-wrap: wrap; gap: 7px; }
  .lab-chip { padding: 7px 9px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .lab-chip.placed { opacity: .45; }
  .lab-zone { display: block; width: 100%; text-align: left; margin-bottom: 7px; min-height: 43px; }
  .lab-zone.drag-over { border-color: var(--blue); background: var(--blue-light); }
  .lab-zone-items { display: inline-flex; flex-wrap: wrap; gap: 5px; margin-left: 7px; }
  .lab-zone-token { padding: 2px 6px; background: var(--blue-light); color: var(--blue-dark); border-radius: 5px; font: 600 11px ui-monospace, monospace; }
  .lab-table-wrap { overflow-x: auto; margin: 12px 0; }
  .lab-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .lab-table th, .lab-table td { padding: 8px 10px; border: 1px solid var(--border); white-space: nowrap; }
  .lab-table th { background: var(--bg); }
  .lab-key { background: var(--amber-light); color: var(--navy); font-weight: 700; }
  .lab-facts { margin: 8px 0 0; padding-left: 18px; font-size: 13px; }
  .lab-complete { display: inline-flex; align-items: center; gap: 5px; color: #047857; font-size: 12px; font-weight: 800; }
  .interactive-lab.erd-expanded { background: #020617; border-color: #1e293b; color: #cbd5e1; box-shadow: 0 20px 55px rgba(2,6,23,.3); }
  .interactive-lab.erd-expanded .lab-heading { background: linear-gradient(135deg, #0f172a, #111827); border-color: #1e293b; }
  .interactive-lab.erd-expanded .lab-heading h4 { color: #f8fafc; }
  .interactive-lab.erd-expanded .lab-heading p { color: #94a3b8; }
  .interactive-lab.erd-expanded .lab-badge { background: rgba(99,102,241,.18); color: #a5b4fc; border: 1px solid rgba(129,140,248,.3); }
  .interactive-lab.erd-expanded .lab-stage { padding: 0; }
  .interactive-lab.erd-expanded:fullscreen,
  .interactive-lab.erd-expanded.erd-maximized {
    width: 100vw; height: 100vh; max-width: none; margin: 0; border: 0; border-radius: 0;
    background: #020617; display: flex; flex-direction: column;
  }
  .interactive-lab.erd-expanded.erd-maximized { position: fixed; inset: 0; z-index: 1000; }
  .interactive-lab.erd-expanded:fullscreen .lab-heading,
  .interactive-lab.erd-expanded.erd-maximized .lab-heading { flex: 0 0 auto; }
  .interactive-lab.erd-expanded:fullscreen .lab-stage,
  .interactive-lab.erd-expanded.erd-maximized .lab-stage { flex: 1 1 auto; min-height: 0; overflow: hidden; }
  .interactive-lab.erd-expanded:fullscreen .erd-shell,
  .interactive-lab.erd-expanded.erd-maximized .erd-shell { height: 100%; display: flex; flex-direction: column; }
  .interactive-lab.erd-expanded:fullscreen .erd-workspace,
  .interactive-lab.erd-expanded.erd-maximized .erd-workspace { flex: 1 1 auto; min-height: 0; }
  .interactive-lab.erd-expanded:fullscreen .erd-inspector,
  .interactive-lab.erd-expanded.erd-maximized .erd-inspector { max-height: none; }
  body.erd-modal-open { overflow: hidden; }
  .erd-shell { background: #020617; color: #cbd5e1; font-family: var(--font-sans); }
  .erd-topbar { padding: 16px 18px; border-bottom: 1px solid #1e293b; background: rgba(15,23,42,.92); }
  .erd-topbar-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .erd-kicker { color: #818cf8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; }
  .erd-title { color: #fff; font-size: 18px; font-weight: 800; line-height: 1.25; margin: 3px 0; }
  .erd-subtitle { color: #94a3b8; font-size: 12px; line-height: 1.5; max-width: 720px; }
  .erd-controls, .erd-presets, .erd-legend { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; }
  .erd-controls { justify-content: flex-end; flex-shrink: 0; }
  .erd-control, .erd-preset {
    border: 1px solid #334155; background: #0f172a; color: #cbd5e1; border-radius: 8px;
    padding: 7px 10px; font: 700 11px var(--font-sans); cursor: pointer; transition: all var(--transition);
  }
  .erd-control:hover, .erd-preset:hover { border-color: #6366f1; color: #fff; background: #1e293b; }
  .erd-control:disabled { opacity: .4; cursor: default; }
  .erd-preset.active { border-color: #818cf8; color: #fff; background: #4f46e5; box-shadow: 0 6px 18px rgba(79,70,229,.25); }
  .erd-presets { margin-top: 13px; padding-top: 13px; border-top: 1px solid #1e293b; }
  .erd-presets-label { color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; margin-right: 3px; }
  .erd-workspace { display: grid; grid-template-columns: minmax(0, 1fr) 300px; min-height: 690px; }
  .erd-viewport { position: relative; overflow: auto; min-width: 0; background-color: #020617; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 22px 22px; border-right: 1px solid #1e293b; }
  .erd-board-wrap { width: 1720px; min-height: 720px; transform-origin: 0 0; transition: transform .18s ease; }
  .erd-board { width: 1720px; min-height: 720px; position: relative; display: grid; grid-template-columns: repeat(4, 260px); gap: 180px; padding: 28px 50px 60px; }
  .erd-lines { position: absolute; inset: 0; width: 1720px; height: 720px; z-index: 3; overflow: visible; pointer-events: none; }
  .erd-labels { position: absolute; inset: 0; width: 1720px; height: 720px; z-index: 3; overflow: visible; pointer-events: none; }
  .erd-line-visible { fill: none; stroke: #64748b; stroke-width: 2.4; filter: drop-shadow(0 0 1px rgba(165,180,252,.4)); transition: opacity .2s ease, stroke .2s ease, stroke-width .2s ease; pointer-events: none; }

  .erd-inspector-title { color: #fff; font-size: 17px; line-height: 1.25; font-weight: 800; margin: 9px 0 7px; }

  .erd-inspector-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid #1e293b; }

  .erd-notation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .erd-notation-card { padding: 10px; border: 1px solid #1e293b; border-radius: 8px; background: #020617; }
  .erd-notation-card h6 { color: #e0e7ff; font: 800 10px/1.4 ui-monospace, monospace; margin-bottom: 6px; }
  .erd-notation-line { display: flex; justify-content: space-between; gap: 8px; padding: 3px 0; color: #94a3b8; font-size: 10px; }
  .erd-notation-line strong { color: #cbd5e1; text-align: right; }
  .erd-constraint { margin-top: 9px; color: #fbbf24; font: 600 10px/1.5 ui-monospace, monospace; overflow-wrap: anywhere; }
  .erd-shell strong { color: #fff; font-weight: 700; }

  .erd-legend-symbol { color: #a5b4fc; font: 900 12px ui-monospace, monospace; }
  .step-nav { display: flex; gap: 10px; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
  .step-nav button { padding: 10px 24px; font-family: var(--font-sans); font-size: 13px; font-weight: 600; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition); }

  .step-nav .btn-next:disabled { opacity: .5; cursor: default; transform: none; }

  .recap-box h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: #059669; margin-bottom: 10px; font-weight: 700; }
  .recap-box ul { list-style: none; padding: 0; margin: 0; }
  .recap-box li { padding: 6px 0; font-size: 14px; font-weight: 500; color: #065f46; }
  .recap-box li::before { content: '✓ '; font-weight: 700; }

  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(15,23,42,.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }

  .modal-close { margin-top: 20px; padding: 8px 20px; font-family: var(--font-sans); font-size: 13px; font-weight: 600; border: none; border-radius: var(--radius-sm); cursor: pointer; background: var(--bg); color: var(--slate); transition: background var(--transition); }
  .modal-close:hover { background: var(--border); }

  @media (max-width: 900px) {
    header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }

    .tab-btn { padding: 12px 14px; font-size: 12px; }

    .modal-box { padding: 24px; }
