<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camu LMS Scraper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Camu LMS Scraper</h1>

    <div id="status">Ready</div>

    <div id="topic-selection" class="hidden">
      <div class="topic-header">
        <span class="topic-title">Topics to scrape:</span>
        <button id="toggle-all-topics" class="btn-link">Select All</button>
      </div>
      <div id="topic-list"></div>
      <div id="topic-loading">Loading topics...</div>
    </div>

    <button id="scrape-btn" class="btn btn-primary btn-full" disabled>Loading topics...</button>

    <div id="progress" class="hidden">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="progress-text">Scraping...</p>
    </div>

    <div id="result" class="hidden">
      <div class="btn-group">
        <button id="export-json" class="btn btn-small">Export JSON</button>
        <button id="export-markdown" class="btn btn-small">Export Markdown</button>
        <button id="copy-btn" class="btn btn-small">Copy to Clipboard</button>
      </div>
      <pre id="output"></pre>
    </div>

    <div id="error" class="hidden error-box"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
