<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Foundations — Practice Quiz</title>
<link rel="icon" type="image/png" href="../favicon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0b0f19;
    --card: #151d30;
    --card-hover: #1e2942;
    --border: rgba(255, 255, 255, 0.08);
    --border-hover: rgba(255, 255, 255, 0.15);
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --blue: #3b82f6;
    --blue-glow: rgba(59, 130, 246, 0.15);
    --green: #10b981;
    --green-glow: rgba(16, 185, 129, 0.15);
    --red: #ef4444;
    --red-glow: rgba(239, 68, 68, 0.15);
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: radial-gradient(circle at top, #1e2942 0%, var(--bg) 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: rgba(11, 15, 25, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header .sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .header-link {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: all var(--transition);
    background: rgba(255, 255, 255, 0.02);
  }

  .header-link:hover {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    border-color: var(--border-hover);
  }

  .profile-status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 13px;
    font-weight: 600;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #64748b;
  }

  .status-dot.online {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }

  .status-dot.offline {
    background: #f59e0b;
    box-shadow: 0 0 8px #f59e0b;
  }

  .container {
    max-width: 850px;
    margin: 0 auto;
    padding: 32px 20px 80px;
    width: 100%;
    flex-grow: 1;
  }

  .controls {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
  }

  .controls label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .controls select, .controls button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
    transition: all var(--transition);
  }

  .controls select {
    background-image: linear-gradient(45deg, transparent 50%, var(--text-muted) 50%), linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
    background-position: calc(100% - 20px) calc(1em + 2px), calc(100% - 15px) calc(1em + 2px);
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    padding-right: 30px;
    appearance: none;
  }

  .controls select:hover, .controls button:hover {
    border-color: var(--border-hover);
    background: rgba(255, 255, 255, 0.08);
  }

  .controls .btn-primary {
    background: var(--blue);
    color: #fff;
    border: none;
  }

  .controls .btn-primary:hover {
    background: #2563eb;
    box-shadow: 0 0 15px var(--blue-glow);
  }

  .stats {
    display: flex;
    gap: 16px;
    margin-left: auto;
    font-size: 14px;
    font-weight: 700;
  }

  .stats .correct { color: var(--green); }
  .stats .wrong { color: var(--red); }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--green));
    border-radius: 10px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
  }

  .q-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .q-domain {
    display: inline-block;
    background: var(--blue-glow);
    color: #60a5fa;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 1px solid rgba(59, 130, 246, 0.2);
  }

  .q-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .q-text {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
  }

  .q-options {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .q-option {
    display: flex;
    align-items: center;
    width: 100%;
    text-align: left;
    padding: 14px 20px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.01);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all var(--transition);
  }

  .q-option:hover:not(.disabled) {
    border-color: var(--blue);
    background: rgba(59, 130, 246, 0.05);
    transform: translateX(4px);
  }

  .q-option .letter {
    display: inline-block;
    width: 28px;
    height: 28px;
    line-height: 28px;
    text-align: center;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    margin-right: 14px;
    flex-shrink: 0;
    transition: all var(--transition);
  }

  .q-option:hover:not(.disabled) .letter {
    background: var(--blue);
    color: #fff;
  }

  .q-option.selected {
    border-color: var(--blue);
    background: rgba(59, 130, 246, 0.08);
  }

  .q-option.selected .letter {
    background: var(--blue);
    color: #fff;
  }

  .q-option.correct {
    border-color: var(--green);
    background: rgba(16, 185, 129, 0.08);
  }

  .q-option.correct .letter {
    background: var(--green);
    color: #fff;
  }

  .q-option.wrong {
    border-color: var(--red);
    background: rgba(239, 68, 68, 0.08);
  }

  .q-option.wrong .letter {
    background: var(--red);
    color: #fff;
  }

  .q-option.disabled {
    cursor: default;
    opacity: 0.7;
  }

  .q-option.show-correct {
    border-color: var(--green);
    background: rgba(16, 185, 129, 0.08);
  }

  .q-option.show-correct .letter {
    background: var(--green);
    color: #fff;
  }

  .feedback {
    padding: 0 32px 28px;
    display: none;
  }

  .feedback.show {
    display: block;
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .feedback-inner {
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 14px;
    border: 1px solid var(--border);
  }

  .feedback-inner.correct {
    background: var(--green-glow);
    border-color: rgba(16, 185, 129, 0.2);
  }

  .feedback-inner.wrong {
    background: var(--red-glow);
    border-color: rgba(239, 68, 68, 0.2);
  }

  .feedback-title {
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .feedback-explanation {
    color: var(--text-muted);
    font-weight: 400;
    line-height: 1.6;
    margin-top: 8px;
  }

  .q-nav {
    display: flex;
    gap: 12px;
    padding: 24px 32px;
    border-top: 1px solid var(--border);
    align-items: center;
  }

  .q-nav button {
    padding: 12px 24px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all var(--transition);
    background: rgba(255, 255, 255, 0.02);
    color: var(--text);
  }

  .q-nav button:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--border-hover);
  }

  .q-nav button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .q-nav .btn-check {
    background: var(--blue);
    color: #fff;
    border: none;
  }

  .q-nav .btn-check:hover:not(:disabled) {
    background: #2563eb;
    box-shadow: 0 0 15px var(--blue-glow);
  }

  .q-nav .q-counter {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-right: auto;
  }

  .results {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.3);
    animation: slideUp 0.5s ease-out;
  }

  .results h2 {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 24px;
  }

  .results .score {
    font-size: 72px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    background: linear-gradient(90deg, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .results .score-label {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .domain-breakdown {
    text-align: left;
    margin: 32px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .domain-score-row {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    padding: 14px 18px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .domain-score-name {
    font-size: 13px;
    font-weight: 600;
  }

  .domain-score-val {
    font-size: 14px;
    font-weight: 700;
    color: #60a5fa;
    white-space: nowrap;
  }

  .domain-score-val.pass { color: var(--green); }
  .domain-score-val.fail { color: var(--red); }

  .empty {
    text-align: center;
    padding: 60px 40px;
    color: var(--text-muted);
  }

  .empty h2 {
    font-size: 20px;
    color: var(--text);
    margin-bottom: 8px;
  }

  /* Profile Modal Styles */
  .modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(11, 15, 25, 0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 1000;
  }

  .modal.show {
    opacity: 1;
    pointer-events: auto;
  }

  .modal-content {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 440px;
    padding: 32px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    transform: scale(0.95);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .modal.show .modal-content {
    transform: scale(1);
  }

  .modal h3 {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 16px;
  }

  .profile-list {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-right: 4px;
  }

  .profile-list::-webkit-scrollbar {
    width: 6px;
  }

  .profile-list::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }

  .profile-item {
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all var(--transition);
  }

  .profile-item:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--border-hover);
  }

  .profile-item.active {
    border-color: var(--blue);
    background: var(--blue-glow);
  }

  .create-profile-box {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: flex;
    gap: 10px;
  }

  .create-profile-box input {
    flex-grow: 1;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
  }

  .create-profile-box input:focus {
    outline: none;
    border-color: var(--blue);
  }

  .create-profile-box button {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition);
  }

  .create-profile-box button:hover {
    background: #2563eb;
  }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .container { padding: 16px 12px 40px; }
    .controls { padding: 12px 16px; }
    .q-header { padding: 20px 20px 14px; }
    .q-options { padding: 20px 20px; }
    .feedback { padding: 0 20px 20px; }
    .q-nav { padding: 20px; }
    .results { padding: 32px 20px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🐙 GitHub Foundations Practice Quiz</h1>
    <div class="sub">Validate your foundational Git and GitHub knowledge</div>
  </div>
  <button class="header-link" id="profileBtn" onclick="openProfileModal()">👤 Select Profile</button>
  <a class="header-link" href="../index.html">📚 Course Hub</a>
  
  <div class="profile-status">
    <span id="activeUserLabel" style="color: var(--text-muted)">Guest User</span>
    <span class="status-dot" id="syncStatusDot"></span>
  </div>
</header>

<div class="container" id="app">
  <div class="controls">
    <label for="domainSelect">Domain:</label>
    <select id="domainSelect" onchange="changeDomain()"></select>
    <button class="btn-outline" id="shuffleBtn" onclick="toggleShuffle()">🔀 Shuffle: Off</button>
    <button class="btn-primary" onclick="resetAllProgress()">🔄 Reset Progress</button>
    
    <div class="stats">
      <span class="correct" id="correctCount">0 ✓</span>
      <span class="wrong" id="wrongCount">0 ✗</span>
    </div>
  </div>
  
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  
  <div id="quizContent">
    <div class="empty"><h2>Loading questions...</h2></div>
  </div>
</div>

<!-- Profile Modal -->
<div class="modal" id="profileModal">
  <div class="modal-content">
    <h3>Switch User Profile</h3>
    <div class="profile-list" id="profileList"></div>
    <div class="create-profile-box">
      <input type="text" id="newProfileInput" placeholder="Enter new profile name..." onkeydown="if(event.key === 'Enter') handleCreateProfile()">
      <button onclick="handleCreateProfile()">Create</button>
    </div>
  </div>
</div>

<script>
const DOMAINS = [
  "Introduction to Git and GitHub",
  "Working with GitHub Repositories",
  "Collaboration Features",
  "Modern Development",
  "Project Management",
  "Privacy, Security, and Administration",
  "Benefits of the GitHub Community"
];

const ALL_QUESTIONS = [
  // DOMAIN 1: Introduction to Git and GitHub (c: 0)
  {
    c: 0,
    q: "What is the key difference between Git and GitHub?",
    o: [
      "Git is a cloud hosting provider, while GitHub is a command-line utility.",
      "Git is a local, distributed version control tool, while GitHub is a cloud-based service that hosts Git repositories.",
      "Git is only for open-source software, while GitHub is designed exclusively for private corporate code.",
      "Git requires a paid commercial license, while GitHub is open-source and always free."
    ],
    a: 1,
    e: "Git is the underlying version control command-line engine that runs locally on your workstation. GitHub is a remote web-based platform built around Git that adds rich team collaboration, hosting, and project management tools."
  },
  {
    c: 0,
    q: "Which property of a Distributed Version Control System (DVCS) like Git provides safety against server failures?",
    o: [
      "The server restricts files so only one person can check out files at a time.",
      "Files are stored in a centralized database that cannot be duplicated.",
      "Every developer's local clone contains a full copy of the project history and all files.",
      "It requires a real-time connection to lock and unlock files on the main branch."
    ],
    a: 2,
    e: "In Git, every clone is a complete backup of the repository, including all files and the entire commit logs database. If the central server crashes, any developer's local repo can be used to restore the remote server."
  },
  {
    c: 0,
    q: "In Git terminology, what does the term 'remote' represent?",
    o: [
      "A physical backup drive directly plugged into your computer.",
      "A connection configuration to a version of your repository hosted on the internet or a network.",
      "A script that deletes local repository records.",
      "An editor plugin used to compile code."
    ],
    a: 1,
    e: "A 'remote' in Git refers to a hosted version of the repository (e.g., on GitHub) that collaborators use to share changes by pushing commits or pulling updates."
  },
  {
    c: 0,
    q: "What are the three primary types of accounts that can be created on GitHub?",
    o: [
      "Standard, Premium, and Business",
      "Personal, Organization, and Enterprise",
      "Free, Pro, and Team",
      "Developer, Manager, and Owner"
    ],
    a: 1,
    e: "GitHub provides Personal accounts (for individuals), Organization accounts (for groups/teams sharing repos), and Enterprise accounts (allowing central control over multiple organizations)."
  },
  {
    c: 0,
    q: "If an enterprise wants to use GitHub but needs all infrastructure, servers, and updates fully hosted and managed by GitHub, which deployment option should they choose?",
    o: [
      "GitHub Enterprise Server (GHES)",
      "GitHub Enterprise Cloud (GHEC)",
      "GitHub Enterprise Local (GHEL)",
      "GitHub Personal Pro"
    ],
    a: 1,
    e: "GitHub Enterprise Cloud (GHEC) is fully hosted and managed by GitHub. GitHub Enterprise Server (GHES) is self-hosted on-premise or within a private cloud (AWS, Azure, GCP)."
  },
  {
    c: 0,
    q: "Which GitHub Flavored Markdown (GFM) code creates an interactive task list containing one completed and one incomplete item?",
    o: [
      "[x] Item A\n[ ] Item B",
      "- [x] Item A\n- [ ] Item B",
      "* (x) Item A\n* ( ) Item B",
      "# [x] Item A\n# [ ] Item B"
    ],
    a: 1,
    e: "GFM task lists are written using list markers (`-` or `*`) followed by `[x]` for completed tasks or `[ ]` for incomplete tasks. Note that spacing within the brackets is mandatory."
  },
  {
    c: 0,
    q: "How can you trigger the autocomplete slash commands menu in a GitHub issue comment editor?",
    o: [
      "Type `cmd/` in the text area",
      "Press `Ctrl + Space` on your keyboard",
      "Type `/` at the beginning of a new line",
      "Double-click inside the comment field"
    ],
    a: 2,
    e: "Typing `/` on a new empty line in a GitHub markdown editor triggers the slash commands menu, offering shortcuts for inserting templates, task lists, code blocks, and references."
  },
  {
    c: 0,
    q: "Which of the following is a key feature of the GitHub Mobile app?",
    o: [
      "It compiles and builds mobile apps locally on your smartphone.",
      "It lets you triage notifications, review code, submit comments, and merge pull requests on the go.",
      "It runs local self-hosted Actions runners directly on mobile processors.",
      "It acts as a replacement for standard local Git CLI clients."
    ],
    a: 1,
    e: "GitHub Mobile is designed for portability, letting you review pull request diffs, reply to discussions, manage issues, triage notifications, and approve/merge pull requests from your mobile phone."
  },

  // DOMAIN 2: Working with GitHub Repositories (c: 1)
  {
    c: 1,
    q: "Which repository file is recommended for specifying who is automatically requested to review pull requests that affect particular paths?",
    o: [
      "LICENSE",
      "CONTRIBUTING.md",
      "CODEOWNERS",
      "README.md"
    ],
    a: 2,
    e: "The `CODEOWNERS` file defines which users or teams own specific files/folders in the repository. When a PR is created that alters those paths, the matching owners are automatically added as reviewers."
  },
  {
    c: 1,
    q: "What is the primary function of a `CONTRIBUTING.md` file in a public GitHub repository?",
    o: [
      "It specifies the software license parameters and legal guidelines.",
      "It guides potential contributors on how to set up the environment, write tests, and submit patches.",
      "It locks write permissions on public repositories.",
      "It lists the financial sponsors of the repository."
    ],
    a: 1,
    e: "A `CONTRIBUTING.md` file outlines the rules, conventions, and guidelines for open-source contributors, explaining how to report bugs, request features, and submit pull requests."
  },

// State variables
let currentQuestions = [];
let currentIdx = 0;
let results = {}; // key: "domainIndex_qIndex" -> { answered: true, correct: boolean, selectedOpt: number }
let isShuffled = false;
let selectedDomain = 'all';
let activeUser = null;
let isOfflineMode = false;

// Initialize connection check and setup
async function init() {
  // Populates the domain dropdown
  const sel = document.getElementById('domainSelect');
  sel.innerHTML = '<option value="all">All Domains</option>' +
    DOMAINS.map((n, i) => `<option value="${i}">Domain ${i+1}: ${n}</option>`).join('');

  await checkServerConnection();
  await initProfile();
  loadQuestions();
}

async function checkServerConnection() {
  try {
    const res = await fetch('/api/users', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
    isOfflineMode = !res.ok;
  } catch(e) {
    isOfflineMode = true;
  }
  
  const dot = document.getElementById('syncStatusDot');
  if (isOfflineMode) {
    dot.className = 'status-dot offline';
    dot.title = "Offline Mode (saving locally)";
  } else {
    dot.className = 'status-dot online';
    dot.title = "Connected to local server";
  }
}

// Profile management
async function fetchUsers() {
  if (isOfflineMode) {
    return JSON.parse(localStorage.getItem('gh_study_users') || '[]');
  } else {
    try {
      const res = await fetch('/api/users', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
      const data = await res.json();
      return data.users || [];
    } catch(e) {
      console.warn("Backend fetch failed, falling back to local storage", e);
      return JSON.parse(localStorage.getItem('gh_study_users') || '[]');
    }
  }
}

async function saveProgress(username, key, answerData) {
  if (!username) return;
  
  // Load existing progress to merge properly without erasing other chapters
  let progress = null;
  if (!isOfflineMode) {
    try {
      const res = await fetch('/api/load', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username })
      });
      const data = await res.json();
      if (data.success) progress = data;
    } catch(e) {
      console.warn("Failed to load existing progress before save, falling back to local storage merging", e);
    }
  }

  if (!progress) {
    const stored = localStorage.getItem(`progress_${username}`);
    if (stored) progress = JSON.parse(stored);
  }

  const existingQuizStates = progress && progress.quiz_states ? progress.quiz_states : {};
  
  // Update the quiz_states map. 
  // We use key format e.g. "gh_domainIdx" so it doesn't conflict with Security+ (integers 0-15)
  if (!existingQuizStates[key]) {
    existingQuizStates[key] = {
      answers: {},
      results: {}
    };
  }
  
  // Update this specific answer in the key
  existingQuizStates[key].answers[answerData.qIdx] = answerData.selectedOpt;
  existingQuizStates[key].results[answerData.qIdx] = answerData.isCorrect ? 'correct' : 'wrong';

  const payload = {
    username: username,
    last_chapter: selectedDomain === 'all' ? 0 : parseInt(selectedDomain),
    last_card: currentIdx,
    last_step: 0,
    viewing_quiz: true,
    quiz_states: existingQuizStates
  };

  localStorage.setItem(`progress_${username}`, JSON.stringify(payload));

  if (!isOfflineMode) {
    try {
      await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch(e) {
      console.warn("API save progress failed", e);
    }
  }
}

async function loadProgress(username) {
  let progress = null;
  if (!isOfflineMode) {
    try {
      const res = await fetch('/api/load', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username })
      });
      const data = await res.json();
      if (data.success) progress = data;
    } catch(e) {
      console.warn("API load progress failed", e);
    }
  }
  if (!progress) {
    const stored = localStorage.getItem(`progress_${username}`);
    if (stored) progress = JSON.parse(stored);
  }
  return progress;
}

async function openProfileModal() {
  const modal = document.getElementById('profileModal');
  const listContainer = document.getElementById('profileList');
  listContainer.innerHTML = '<div style="color: var(--text-muted); font-size: 13px;">Loading profiles...</div>';
  modal.classList.add('show');
  
  await checkServerConnection();
  const users = await fetchUsers();
  listContainer.innerHTML = '';
  
  if (users.length === 0) {
    listContainer.innerHTML = '<div style="color: var(--text-muted); padding: 8px 0; font-size: 13px;">No profiles found. Create one below to begin!</div>';
  } else {
    users.forEach(u => {
      const isCurrent = (u === activeUser);
      const activeCls = isCurrent ? 'active' : '';
      const badge = isCurrent ? '<span style="font-size: 11px; background: var(--blue); color: #fff; padding: 2px 8px; border-radius: 10px;">Active</span>' : '';
      listContainer.innerHTML += `
        <div class="profile-item ${activeCls}" onclick="selectProfile('${u.replace(/'/g, "\\'")}')">
          <span>👤 ${u}</span>
          ${badge}
        </div>
      `;
    });
  }
}

async function selectProfile(username) {
  activeUser = username;
  localStorage.setItem('active_study_user', username);
  
  const labelEl = document.getElementById('activeUserLabel');
  labelEl.textContent = isOfflineMode ? `${username} (Offline)` : username;
  
  document.getElementById('profileModal').classList.remove('show');
  document.getElementById('profileBtn').textContent = `👤 ${username}`;

  // Load progress into UI state
  results = {};
  const progress = await loadProgress(username);
  if (progress && progress.quiz_states) {
    for (let k in progress.quiz_states) {
      if (k.startsWith('gh_')) {
        const storedState = progress.quiz_states[k];
        const domainIdx = k.replace('gh_', '');
        
        if (storedState.answers) {
          for (let qIdx in storedState.answers) {
            const isCorrect = storedState.results[qIdx] === 'correct';
            results[`${domainIdx}_${qIdx}`] = {
              answered: true,
              correct: isCorrect,
              selectedOpt: parseInt(storedState.answers[qIdx])
            };
          }
        }
      }
    }
  }
  
  loadQuestions();
}

async function handleCreateProfile() {
  const input = document.getElementById('newProfileInput');
  const username = input.value.trim();
  if (!username) {
    alert("Please enter a profile name.");
    return;
  }
  
  const users = await fetchUsers();
  if (users.includes(username)) {
    alert("This profile name already exists.");
    return;
  }
  
  if (isOfflineMode) {
    users.push(username);
    localStorage.setItem('gh_study_users', JSON.stringify(users));
  } else {
    try {
      await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, last_chapter: 0, last_card: 0, last_step: 0, viewing_quiz: true })
      });
      users.push(username);
      localStorage.setItem('gh_study_users', JSON.stringify(users));
    } catch(e) {
      console.error(e);
      users.push(username);
      localStorage.setItem('gh_study_users', JSON.stringify(users));
    }
  }
  
  input.value = '';
  await selectProfile(username);
}

async function initProfile() {
  const savedUser = localStorage.getItem('active_study_user');
  if (savedUser) {
    await selectProfile(savedUser);
  } else {
    openProfileModal();
  }
}

// Question loading and filtering
function loadQuestions() {
  // Store reference to original index in ALL_QUESTIONS
  const mapped = ALL_QUESTIONS.map((q, idx) => ({ ...q, originalIdx: idx }));
  
  if (selectedDomain === 'all') {
    currentQuestions = mapped.slice();
  } else {
    currentQuestions = mapped.filter(q => q.c === parseInt(selectedDomain));
  }
  
  if (isShuffled) {
    shuffleArray(currentQuestions);
  }
  
  // Find first unanswered question in the active list
  const firstUnanswered = currentQuestions.findIndex(q => {
    const stateKey = `${q.c}_${q.originalIdx}`;
    return !results[stateKey] || !results[stateKey].answered;
  });
  
  currentIdx = firstUnanswered !== -1 ? firstUnanswered : currentQuestions.length;
  render();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function toggleShuffle() {
  isShuffled = !isShuffled;
  document.getElementById('shuffleBtn').textContent = isShuffled ? "🔀 Shuffle: On" : "🔀 Shuffle: Off";
  document.getElementById('shuffleBtn').classList.toggle('btn-primary', isShuffled);
  loadQuestions();
}

function changeDomain() {
  selectedDomain = document.getElementById('domainSelect').value;
  loadQuestions();
}

function resetAllProgress() {
  if (!confirm('Are you sure you want to reset all your answers for GitHub Foundations? This will clear all correct/incorrect flags.')) return;
  
  results = {};
  if (activeUser) {
    saveResetProgress('all');
  } else {
    loadQuestions();
  }
}

async function saveResetProgress(domainToClear = 'all') {
  let progress = await loadProgress(activeUser);
  if (progress && progress.quiz_states) {
    if (domainToClear === 'all') {
      for (let k in progress.quiz_states) {
        if (k.startsWith('gh_')) {
          delete progress.quiz_states[k];
        }
      }
    } else {
      delete progress.quiz_states[`gh_${domainToClear}`];
    }
  }
  
  const payload = {
    username: activeUser,
    last_chapter: selectedDomain === 'all' ? 0 : parseInt(selectedDomain),
    last_card: 0,
    last_step: 0,
    viewing_quiz: true,
    quiz_states: progress ? progress.quiz_states : {}
  };
  
  localStorage.setItem(`progress_${activeUser}`, JSON.stringify(payload));
  if (!isOfflineMode) {
    try {
      await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch(e) {
      console.error(e);
    }
  }
  loadQuestions();
}

// Rendering Quiz Core
function render() {
  const container = document.getElementById('quizContent');
  
  if (!currentQuestions.length) {
    container.innerHTML = '<div class="empty"><h2>No questions match.</h2></div>';
    updateStats();
    return;
  }

  // If past the last question, show the results page!
  if (currentIdx >= currentQuestions.length) {
    renderResults();
    return;
  }

  const q = currentQuestions[currentIdx];
  const total = currentQuestions.length;
  const letters = ['A', 'B', 'C', 'D'];
  const stateKey = `${q.c}_${q.originalIdx}`;
  
  const state = results[stateKey];
  const answered = state && state.answered;
  const isCorrect = state && state.correct;
  const selectedOpt = state && state.selectedOpt;
  
  const progressPct = ((currentIdx) / total) * 100;
  document.getElementById('progressFill').style.width = `${progressPct}%`;

  const optsHtml = q.o.map((opt, i) => {
    let cls = '';
    let disabledAttr = answered ? 'disabled' : '';
    
    if (answered) {
      cls += ' disabled';
      if (i === q.a) cls += ' correct';
      else if (i === selectedOpt) cls += ' wrong';
    } else {
      if (selectedOpt === i) cls += ' selected';
    }
    
    return `<button class="q-option ${cls}" onclick="selectOption(${i})" ${disabledAttr}>
      <span class="letter">${letters[i]}</span>
      <span class="opt-text">${escapeHtml(opt)}</span>
    </button>`;
  }).join('');

  const feedbackHtml = answered
    ? `<div class="feedback show">
        <div class="feedback-inner ${isCorrect ? 'correct' : 'wrong'}">
          <div class="feedback-title">
            <span>${isCorrect ? '✓ Correct' : '✗ Incorrect'}</span>
          </div>
          <div class="feedback-explanation">${escapeHtml(q.e)}</div>
        </div>
      </div>`
    : '';

  container.innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-meta">
          <span class="q-domain">Domain ${q.c + 1} — ${DOMAINS[q.c]}</span>
          <span class="q-num">Question ${currentIdx + 1} of ${total}</span>
        </div>
        <div class="q-text">${escapeHtml(q.q)}</div>
      </div>
      <div class="q-options">${optsHtml}</div>
      ${feedbackHtml}
      <div class="q-nav">
        <span class="q-counter">Question ${currentIdx + 1} / ${total}</span>
        <button onclick="prevQ()" ${currentIdx === 0 ? 'disabled' : ''}>← Back</button>
        <button class="btn-check" id="checkBtn" onclick="checkAnswer()" ${answered || selectedOpt === undefined ? 'disabled' : ''}>Check Answer</button>
        <button class="btn-next" onclick="nextQ()">${currentIdx === total - 1 ? 'Finish →' : 'Next →'}</button>
      </div>
    </div>
  `;

  updateStats();
}

function selectOption(idx) {
  // Store temporarily selected index in our results tracking
  const q = currentQuestions[currentIdx];
  const stateKey = `${q.c}_${q.originalIdx}`;
  
  if (!results[stateKey]) {
    results[stateKey] = {};
  }
  
  results[stateKey].selectedOpt = idx;
  
  // Toggle selection classes in DOM
  document.querySelectorAll('.q-option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  
  document.getElementById('checkBtn').disabled = false;
}

async function checkAnswer() {
  const q = currentQuestions[currentIdx];
  const stateKey = `${q.c}_${q.originalIdx}`;
  const state = results[stateKey];
  if (!state || state.selectedOpt === undefined) return;
  
  const isCorrect = state.selectedOpt === q.a;
  state.answered = true;
  state.correct = isCorrect;
  
  render();
  
  if (activeUser) {
    const key = `gh_${q.c}`;
    await saveProgress(activeUser, key, {
      qIdx: q.originalIdx,
      selectedOpt: state.selectedOpt,
      isCorrect: isCorrect
    });
  }
}

function nextQ() {
  currentIdx++;
  render();
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    render();
  }
}

function updateStats() {
  let correct = 0;
  let wrong = 0;
  
  // Calculate statistics based only on questions inside currentQuestions
  currentQuestions.forEach(q => {
    const stateKey = `${q.c}_${q.originalIdx}`;
    const state = results[stateKey];
    if (state && state.answered) {
      if (state.correct) correct++;
      else wrong++;
    }
  });

  document.getElementById('correctCount').textContent = correct + ' ✓';
  document.getElementById('wrongCount').textContent = wrong + ' ✗';
}

function renderResults() {
  const container = document.getElementById('quizContent');
  document.getElementById('progressFill').style.width = '100%';
  
  let totalCorrect = 0;
  let totalAnswered = 0;
  
  // Calculate breakdown per domain
  const domainStats = DOMAINS.map((name, i) => {
    return { name: name, correct: 0, total: 0 };
  });
  
  currentQuestions.forEach(q => {
    const stateKey = `${q.c}_${q.originalIdx}`;
    const state = results[stateKey];
    domainStats[q.c].total++;
    if (state && state.answered) {
      totalAnswered++;
      if (state.correct) {
        totalCorrect++;
        domainStats[q.c].correct++;
      }
    }
  });

  const finalPct = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  const passRequirement = 70; // typical passing score
  const passed = finalPct >= passRequirement;

  let breakdownHtml = domainStats.map((stat, i) => {
    if (stat.total === 0) return '';
    const pct = Math.round((stat.correct / stat.total) * 100);
    const passClass = pct >= passRequirement ? 'pass' : 'fail';
    return `
      <div class="domain-score-row">
        <span class="domain-score-name">Domain ${i+1}: ${stat.name}</span>
        <span class="domain-score-val ${passClass}">${stat.correct} / ${stat.total} (${pct}%)</span>
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div class="results">
      <h2>Quiz Completed!</h2>
      <div class="score">${finalPct}%</div>
      <div class="score-label">Correct answers: ${totalCorrect} of ${totalAnswered} questions answered.</div>
      
      <p style="font-size:15px; font-weight:600; color: ${passed ? 'var(--green)' : 'var(--red)'}; margin-bottom: 24px;">
        ${passed ? '🎉 Congratulations! You met the target passing score of 70%.' : '⚠️ You scored below the target passing score of 70%. We recommend reviewing the domains below.'}
      </p>

      <h3 style="text-align: left; font-size:16px; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom:8px;">Domain Performance Breakdown</h3>
      <div class="domain-breakdown">
        ${breakdownHtml}
      </div>

      <button class="btn-primary" onclick="restartQuiz()" style="padding: 12px 30px; font-size:14px; font-weight:700; border-radius: 8px;">Try Again</button>
    </div>
  `;
}

function restartQuiz() {
  if (confirm('Retake this quiz? This will reset your answers for the current selection.')) {
    if (selectedDomain === 'all') {
      results = {};
      if (activeUser) {
        saveResetProgress('all');
      } else {
        loadQuestions();
      }
    } else {
      const domainIdx = parseInt(selectedDomain);
      for (let k in results) {
        if (k.startsWith(`${domainIdx}_`)) {
          delete results[k];
        }
      }
      if (activeUser) {
        saveResetProgress(domainIdx);
      } else {
        loadQuestions();
      }
    }
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
}

init();
</script>
