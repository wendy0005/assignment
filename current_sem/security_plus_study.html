<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ — Interactive Study Slides</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0f172a; --slate: #334155; --slate-light: #64748b;
    --blue: #3b82f6; --blue-light: #eff6ff; --blue-dark: #1e40af;
    --teal: #14b8a6; --teal-light: #f0fdfa;
    --amber: #f59e0b; --amber-light: #fffbeb;
    --rose: #f43f5e; --rose-light: #fff1f2;
    --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.08);
    --radius: 12px; --radius-sm: 8px;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-serif: 'Merriweather', Georgia, serif;
    --transition: .25s cubic-bezier(.4,0,.2,1);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans); background: var(--bg); color: var(--slate);
    line-height: 1.7; -webkit-font-smoothing: antialiased;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fff; padding: 20px 40px; position: sticky; top: 0;
    z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.15);
    display: flex; align-items: center; gap: 24px;
  }
  header .header-left { flex-shrink: 0; }
  header h1 { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
  header p { font-size: 13px; color: #94a3b8; margin-top: 2px; font-weight: 500; }
  .header-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.1); padding: 4px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 600; margin-top: 6px; letter-spacing: .3px;
  }
  .header-badge span { color: var(--teal); }
  .header-link {
    color: #94a3b8; text-decoration: none; font-size: 13px; font-weight: 500;
    padding: 6px 14px; border-radius: 8px; margin-left: 16px;
    transition: all var(--transition); white-space: nowrap;
  }
  .header-link:hover { background: rgba(255,255,255,.1); color: #fff; }
  .search-wrapper {
    position: relative; margin-left: auto; flex-shrink: 0;
    min-width: 260px;
  }
  .search-input {
    width: 100%; padding: 10px 16px 10px 40px;
    border: 1px solid rgba(255,255,255,.2); border-radius: 10px;
    background: rgba(255,255,255,.1); color: #fff;
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
    outline: none; transition: all var(--transition);
    backdrop-filter: blur(4px);
  }
  .search-input::placeholder { color: rgba(255,255,255,.5); font-weight: 400; }
  .search-input:focus {
    border-color: var(--blue); background: rgba(255,255,255,.15);
    box-shadow: 0 0 0 3px rgba(59,130,246,.2);
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 15px; opacity: .6; pointer-events: none;
  }
  .search-clear {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(255,255,255,.4);
    font-size: 18px; cursor: pointer; display: none; padding: 2px;
    line-height: 1; border-radius: 4px; transition: color var(--transition);
  }
  .search-clear:hover { color: #fff; }
  .search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: #fff; border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg); max-height: 400px; overflow-y: auto;
    display: none; z-index: 200;
  }
  .search-results.show { display: block; }
  .search-result-item {
    padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background var(--transition);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover, .search-result-item.highlighted { background: var(--blue-light); }
  .search-result-item .sr-path {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .3px; color: var(--blue); margin-bottom: 2px;
  }
  .search-result-item .sr-title {
    font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 3px;
  }
  .search-result-item .sr-preview {
    font-size: 12px; color: var(--slate-light); line-height: 1.4;
  }
  .search-result-item .sr-preview em {
    background: #fef3c7; font-style: normal; padding: 0 2px;
    color: #92400e; font-weight: 600;
  }
  .search-empty {
    padding: 20px; text-align: center; color: var(--slate-light);
    font-size: 13px;
  }
  .tabs {
    display: flex; background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 40px; position: sticky; top: 108px; z-index: 99;
    box-shadow: 0 1px 2px rgba(0,0,0,.04); overflow-x: auto;
  }
  .tab-btn {
    padding: 14px 24px; font-family: var(--font-sans); font-size: 13px;
    font-weight: 600; border: none; background: none; cursor: pointer;
    color: var(--slate-light); position: relative; white-space: nowrap;
    transition: color var(--transition);
  }
  .tab-btn:hover { color: var(--slate); }
  .tab-btn.active { color: var(--navy); }
  .tab-btn.active::after {
    content: ''; position: absolute; bottom: 0; left: 24px; right: 24px;
    height: 3px; background: var(--blue); border-radius: 3px 3px 0 0;
  }
  .tab-badge {
    display: inline-block; background: var(--border); padding: 0 8px;
    border-radius: 10px; font-size: 10px; font-weight: 700;
    margin-left: 6px; color: var(--slate-light);
  }
  .tab-btn.active .tab-badge { background: var(--blue-light); color: var(--blue); }
  .app-layout {
    display: flex; max-width: 1400px; margin: 0 auto;
    min-height: calc(100vh - 170px);
  }
  .sidebar {
    width: 280px; flex-shrink: 0; background: #fff;
    border-right: 1px solid var(--border); padding: 20px 16px;
    position: sticky; top: 170px; height: calc(100vh - 170px);
    overflow-y: auto;
  }
  .sidebar h3 {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--slate-light); margin-bottom: 12px;
    padding: 0 8px;
  }
  .sidebar-list { list-style: none; }
  .sidebar-list li { margin-bottom: 2px; }
  .sidebar-list a {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; color: var(--slate);
    text-decoration: none; transition: all var(--transition);
    cursor: pointer;
  }
  .sidebar-list a:hover { background: var(--bg); }
  .sidebar-list a.active {
    background: var(--blue-light); color: var(--blue); font-weight: 600;
  }
  .sidebar-list a .q-num {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    background: var(--bg); color: var(--slate-light);
    transition: all var(--transition);
  }
  .sidebar-list a.active .q-num { background: var(--blue); color: #fff; }
  .sidebar-list a.done .q-num { background: #d1fae5; color: #065f46; }
  .sidebar-list a.done::after { content: '✓'; margin-left: auto; font-size: 13px; color: #059669; }
  .main-content { flex: 1; padding: 32px 48px; min-width: 0; }
  .lesson-card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
    animation: fadeIn .4s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .lesson-header { padding: 28px 32px 0; }
  .lesson-header .q-label {
    display: inline-block; background: var(--blue-light); color: var(--blue);
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px;
    text-transform: uppercase; letter-spacing: .3px; margin-bottom: 10px;
  }
  .lesson-header h2 {
    font-family: var(--font-serif); font-weight: 700;
    font-size: 22px; color: var(--navy); line-height: 1.3;
  }
  .lesson-intro {
    margin-top: 14px; padding: 16px 20px; background: var(--amber-light);
    border-left: 3px solid var(--amber); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 14px; color: var(--slate); line-height: 1.7;
  }
  .lesson-intro::before { content: '🧑‍🏫 '; font-size: 16px; }
  .steps-container { padding: 24px 32px 32px; }
  .steps-progress {
    display: flex; align-items: center; gap: 8px; margin-bottom: 24px;
  }
  .step-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--border);
    transition: all var(--transition);
  }
  .step-dot.active { background: var(--blue); transform: scale(1.3); }
  .step-dot.done { background: var(--teal); }
  .step-dot.current ~ .step-dot { opacity: .4; }
  .step-label {
    font-size: 11px; font-weight: 600; color: var(--slate-light);
    margin-left: auto; text-transform: uppercase; letter-spacing: .3px;
  }
  .step-content { animation: fadeIn .35s ease-out; }
  .step-content h3 {
    font-family: var(--font-serif); font-size: 17px; color: var(--navy);
    margin-bottom: 14px; font-weight: 700;
  }
  .step-content p {
    font-size: 15px; line-height: 1.8; margin-bottom: 14px;
    color: var(--slate);
  }
  .step-content p:last-child { margin-bottom: 0; }
  .step-content ul, .step-content ol { margin: 10px 0 14px; padding-left: 22px; }
  .step-content li { font-size: 15px; line-height: 1.7; margin-bottom: 6px; }
  .step-content strong { color: var(--navy); font-weight: 600; }
  .step-content .highlight-box {
    background: var(--teal-light); border-left: 3px solid var(--teal);
    padding: 14px 18px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin: 14px 0; font-size: 14px;
  }
  .step-content .example-box {
    background: var(--blue-light); border-left: 3px solid var(--blue);
    padding: 14px 18px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin: 14px 0; font-size: 14px;
  }
  .step-content .example-box::before {
    content: '💡 Example: '; font-weight: 600; color: var(--blue-dark);
    font-size: 13px;
  }
  .step-content .warn-box {
    background: var(--rose-light); border-left: 3px solid var(--rose);
    padding: 14px 18px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin: 14px 0; font-size: 14px;
  }
  .step-content .exam-note {
    background: #fef3c7; border-left: 3px solid var(--amber);
    padding: 12px 16px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin: 14px 0; font-size: 13px; font-weight: 500;
  }
  .step-content .exam-note::before { content: '📝 Exam Tip: '; color: #92400e; font-weight: 700; }
  .step-content table {
    width: 100%; border-collapse: collapse; margin: 14px 0;
    font-size: 14px; border-radius: var(--radius-sm); overflow: hidden;
  }
  .step-content th {
    background: var(--bg); font-weight: 600; text-align: left;
    padding: 10px 14px; color: var(--navy); font-size: 12px;
    text-transform: uppercase; letter-spacing: .3px;
  }
  .step-content td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .step-content tr:last-child td { border-bottom: none; }
  .glossary-term {
    color: var(--blue); cursor: pointer; border-bottom: 1px dashed var(--blue);
    font-weight: 500; transition: all var(--transition); position: relative;
  }
  .glossary-term:hover { background: var(--blue-light); }
  .diagram-box {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 20px; margin: 18px 0;
    overflow-x: auto;
  }
  .diagram-box .mermaid { display: flex; justify-content: center; }
  .step-nav { display: flex; gap: 10px; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
  .step-nav button {
    padding: 10px 24px; font-family: var(--font-sans); font-size: 13px;
    font-weight: 600; border: none; border-radius: var(--radius-sm);
    cursor: pointer; transition: all var(--transition);
  }
  .step-nav .btn-prev { background: var(--bg); color: var(--slate); }
  .step-nav .btn-prev:hover { background: var(--border); }
  .step-nav .btn-next { background: var(--blue); color: #fff; margin-left: auto; }
  .step-nav .btn-next:hover { background: var(--blue-dark); transform: translateY(-1px); }
  .step-nav .btn-next:disabled { opacity: .5; cursor: default; transform: none; }
  .step-nav .btn-finish { background: #059669; color: #fff; margin-left: auto; }
  .step-nav .btn-finish:hover { background: #047857; }
  .recap-box {
    margin: 18px 0 0; padding: 20px 24px;
    background: linear-gradient(135deg, #f0fdf4, #f0fdfa);
    border: 1px solid #bbf7d0; border-radius: var(--radius-sm);
  }
  .recap-box h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: #059669; margin-bottom: 10px; font-weight: 700; }
  .recap-box ul { list-style: none; padding: 0; margin: 0; }
  .recap-box li { padding: 6px 0; font-size: 14px; font-weight: 500; color: #065f46; }
  .recap-box li::before { content: '✓ '; font-weight: 700; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(15,23,42,.6); backdrop-filter: blur(4px);
    justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff; border-radius: var(--radius);
    padding: 32px; max-width: 480px; width: 90%;
    box-shadow: var(--shadow-lg); animation: fadeIn .2s ease-out;
  }
  .modal-box h3 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
  .modal-box p { font-size: 15px; line-height: 1.7; color: var(--slate); }
  .modal-close {
    margin-top: 20px; padding: 8px 20px;
    font-family: var(--font-sans); font-size: 13px; font-weight: 600;
    border: none; border-radius: var(--radius-sm); cursor: pointer;
    background: var(--bg); color: var(--slate); transition: background var(--transition);
  }
  .modal-close:hover { background: var(--border); }
  .empty-state { text-align: center; padding: 60px 40px; color: var(--slate-light); }
  .empty-state h2 { font-size: 20px; color: var(--slate); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }
  @media (max-width: 900px) {
    header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
    .search-wrapper { min-width: 0; width: 100%; order: 3; }
    .tabs { padding: 0 20px; top: 96px; }
    .sidebar { display: none; }
    .main-content { padding: 20px; }
    .lesson-header { padding: 20px 20px 0; }
    .steps-container { padding: 16px 20px 24px; }
    .step-nav { flex-wrap: wrap; }
    .step-nav .btn-prev { order: 1; flex: 1; }
    .step-nav .btn-next, .step-nav .btn-finish { order: 2; flex: 1; }
    .app-layout { min-height: auto; }
  }
  @media (max-width: 600px) {
    header h1 { font-size: 18px; }
    .tab-btn { padding: 12px 14px; font-size: 12px; }
    .tab-btn.active::after { left: 14px; right: 14px; }
    .lesson-header h2 { font-size: 18px; }
    .step-content p { font-size: 14px; }
    .modal-box { padding: 24px; }
  }

  /* ---- Quiz Styling ---- */
  .q-options { padding: 0; }
  .q-option { 
    display: block; width: 100%; text-align: left; padding: 12px 16px; margin-bottom: 8px; 
    border: 2px solid var(--border); border-radius: var(--radius-sm); background: #fff; 
    font-family: var(--font-sans); font-size: 14px; font-weight: 500; color: var(--slate); 
    cursor: pointer; transition: all var(--transition); 
  }
  .q-option:hover:not(.disabled) { border-color: var(--blue); background: var(--blue-light); }
  .q-option .letter { 
    display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; 
    border-radius: 6px; background: var(--bg); font-size: 12px; font-weight: 700; 
    color: var(--slate-light); margin-right: 10px; transition: all var(--transition); 
  }
  .q-option:hover:not(.disabled) .letter { background: var(--blue); color: #fff; }
  .q-option.selected { border-color: var(--blue); background: var(--blue-light); }
  .q-option.selected .letter { background: var(--blue); color: #fff; }
  .q-option.correct { border-color: var(--teal); background: var(--teal-light); }
  .q-option.correct .letter { background: var(--teal); color: #fff; }
  .q-option.wrong { border-color: var(--rose); background: var(--rose-light); }
  .q-option.wrong .letter { background: var(--rose); color: #fff; }
  .q-option.disabled { cursor: default; opacity: .85; }
  .feedback { display: none; }
  .feedback.show { display: block; }
  .feedback-inner { padding: 14px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; }
  .feedback-inner.correct { background: var(--teal-light); color: #0f766e; }
  .feedback-inner.wrong { background: var(--rose-light); color: #9f1239; }
  
  .results { text-align: center; }
  .results .score { font-size: 64px; font-weight: 800; color: var(--navy); }
  .results .score-label { font-size: 14px; color: var(--slate-light); margin-bottom: 8px; }
  .results .score-bar { width: 100%; height: 10px; background: var(--border); border-radius: 5px; margin: 16px 0; overflow: hidden; }
  .results .score-fill { height: 100%; border-radius: 5px; transition: width 1s ease-out; background: linear-gradient(90deg, var(--rose), var(--amber), var(--teal)); }

  /* Explanation Box Styling */
  .explanation-box {
    margin-top: 15px;
    padding: 16px 20px;
    background: #f8fafc;
    border: 1px solid var(--border);
    border-left: 4px solid var(--blue);
    border-radius: var(--radius-sm);
    text-align: left;
  }
  .explanation-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .explanation-text {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--slate);
    margin-bottom: 12px;
  }
  .recommended-reading {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--blue-light);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    cursor: pointer;
    transition: all var(--transition);
    border: 1px solid transparent;
  }
  .recommended-reading:hover {
    background: var(--blue);
    color: #fff;
  }
  .recommended-reading-missing {
    font-size: 12px;
    color: var(--slate-light);
    font-style: italic;
  }
  /* ---- Profiles / SQLite Memory ---- */
  .user-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.08); padding: 8px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 600; color: #fff; cursor: pointer;
    transition: all var(--transition); border: 1px solid rgba(255,255,255,.1);
    margin-left: 16px; white-space: nowrap;
  }
  .user-badge:hover {
    background: rgba(255,255,255,.15);
    box-shadow: 0 0 10px rgba(59,130,246,.25);
  }
  .user-icon {
    font-size: 14px;
  }
  .profile-item {
    padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    color: var(--slate); text-align: left; cursor: pointer;
    transition: all var(--transition); display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .profile-item:hover {
    border-color: var(--blue); background: var(--blue-light); color: var(--navy);
  }
  .profile-item.active {
    border-color: var(--blue); background: var(--blue-light); color: var(--navy);
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🔐 CompTIA Security+</h1>
    <p>Exam SY0-701 — Interactive Study Slides</p>
    <div class="header-badge">
      🧑‍🏫 <span>Study Mode</span> — Step-by-step, like a classroom lesson
    </div>
  </div>
  <div class="search-wrapper" id="searchWrapper">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Search study slides..." autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="user-badge" id="userBadge" onclick="openProfileModal()">
    <span class="user-icon">👤</span>
    <span id="activeUserLabel">Guest</span>
  </div>
  <a class="header-link" href="../index.html">📚 All Courses</a>
</header>

<div class="tabs" id="tabsContainer"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <h3>Study Cards</h3>
    <ul class="sidebar-list" id="sidebarList"></ul>
  </aside>
  <main class="main-content" id="mainContent">
    <div class="empty-state">
      <h2>Select a chapter to begin</h2>
      <p>Choose a chapter tab above, then click a study card from the sidebar.</p>
    </div>
  </main>
</div>

<div class="modal-overlay" id="glossaryModal">
  <div class="modal-box">
    <h3 id="glossaryTermTitle"></h3>

  <li>Implement strict access controls to the SCADA console</li>
  <li>Monitor network traffic to/from the SCADA system for anomalies</li>

<ul>
  <li>They must be <strong>"above and beyond"</strong> other requirements — a control used to meet one requirement cannot also compensate for another</li>

<div class="highlight-box"><strong>Why not just use the root CA directly?</strong> Security and operational flexibility. The root CA's private key is kept offline in a secure vault. Intermediate CAs can be rotated or revoked without rebuilding trust in the root.</div>

            body: `<strong>MAC (Mandatory Access Control):</strong> Every user and object gets a security label (e.g., Top Secret, Secret, Confidential). A user can only access objects at or below their clearance level. Users <strong>cannot</strong> override these controls — even the owner of a file cannot change its permissions if the label prohibits it. Used in military and government environments.

<strong>DAC (Discretionary Access Control):</strong> The <strong>owner</strong> of a resource controls access to it. In Windows, if you create a file, you can set its permissions — who can read, write, or execute it. Each file has an ACL (Access Control List). Common in everyday OS file systems.

<strong>RBAC (Role-Based Access Control):</strong> Permissions are assigned to <strong>roles</strong>, and users are assigned to roles. A user's permissions = the sum of all their roles' permissions. Example: An "Accountant" role might have access to financial systems. Assign a new accountant to the role, and they automatically get the right access.

<script>
const tabsContainer = document.getElementById('tabsContainer');
const sidebarList = document.getElementById('sidebarList');
const mainContent = document.getElementById('mainContent');
const glossaryModal = document.getElementById('glossaryModal');
const glossaryTermTitle = document.getElementById('glossaryTermTitle');
const glossaryTermDef = document.getElementById('glossaryTermDef');

let viewingQuiz = false;
let quizStates = {};

const ALL_QUESTIONS = [
  {c: 0, q: "Matt is updating the organization's threat assessment process. What category of control is Matt implementing?", o: ["Operational", "Technical", "Corrective", "Managerial"], a: 3, exp: "Managerial controls are procedural mechanisms that focus on the mechanics of the risk management process. Threat assessment is an example of one of these activities.", card: 3},
  {c: 0, q: "Jade's organization recently suffered a security breach that affected stored credit card data. Jade's primary concern is the fact that the organization is subject to sanctions for violating the provisions of the Payment Card Industry Data Security Standard. What category of risk is concerning Jade?", o: ["Strategic", "Compliance", "Operational", "Financial"], a: 1, exp: "The breach of credit card information may cause many different impacts on the organization, including compliance, operational, and financial risks. However, in this scenario, Jade's primary concern is violating PCI DSS, making his concern a compliance risk.", card: 2},
  {c: 0, q: "Chris is responding to a security incident that compromised one of his organization's web servers. He believes that the attackers defaced one or more pages on the website. What cybersecurity objective did this attack violate?", o: ["Confidentiality", "Nonrepudiation", "Integrity", "Availability"], a: 2, exp: "The defacement of a website alters content without authorization and is, therefore, a violation of the integrity objective. The attackers may also have breached the confidentiality or availability of the website, but the scenario does not provide us with enough information to draw those conclusions.", card: 1},
  {c: 0, q: "Gwen is exploring a customer transaction reporting system and discovers the table shown here. What type of data minimization has most likely been used on this table?", o: ["Destruction", "Masking", "Tokenization", "Hashing"], a: 1, exp: "In this case, the first 12 digits of the credit card have been removed and replaced with asterisks. This is an example of data masking.", card: 5},
  {c: 0, q: "Tonya is concerned about the risk that an attacker will attempt to gain access to her organization's database server. She is searching for a control that would discourage the attacker from attempting to gain access. What type of security control is she seeking to implement?", o: ["Preventive", "Detective", "Corrective", "Deterrent"], a: 3, exp: "Deterrent controls are designed to prevent an attacker from attempting to violate security policies in the first place. Preventive controls would attempt to block an attack that was about to take place. Corrective controls would remediate the issues that arose during an attack. Detective controls detect issues or indicators of issues.", card: 4},
  {c: 0, q: "Greg is implementing a data loss prevention system. He would like to ensure that it protects against transmissions of sensitive information by guests on his wireless network. What DLP technology would best meet this goal?", o: ["Watermarking", "Pattern recognition", "Host-based", "Network-based"], a: 3, exp: "In this case, Greg must use a network-based DLP system. Host-based DLP requires the use of agents, which would not be installed on guest systems. Greg may use watermarking and/or pattern recognition to identify the sensitive information, but he must use network-based DLP to meet his goal.", card: 4},
  {c: 0, q: "What term best describes data that is being sent between two systems over a network connection?", o: ["Data at rest", "Data in transit", "Data in processing", "Data in use"], a: 1, exp: "Data being sent over a network is data in transit. Data at rest is stored data that resides on hard drives, tapes, in the cloud, or on other storage media. Data in processing, or data in use, is data that is actively in use by a computer system.", card: 1},
  {c: 0, q: "Tina is tuning her organization's intrusion prevention system to prevent false positive alerts. What type of control is Tina implementing?", o: ["Technical control", "Physical control", "Managerial control", "Operational control"], a: 0, exp: "Technical controls enforce confidentiality, integrity, and availability in the digital space. Examples of technical security controls include firewall rules, access control lists, intrusion prevention systems, and encryption.", card: 4},
  {c: 0, q: "Which one of the following is not a common goal of a cybersecurity attacker?", o: ["Disclosure", "Denial", "Alteration", "Allocation"], a: 3, exp: "The three primary goals of cybersecurity attackers are disclosure, alteration, and denial. These map directly to the three objectives of cybersecurity professionals: confidentiality, integrity, and availability.", card: 1},
  {c: 0, q: "Tony is reviewing the status of his organization's defenses against a breach of their file server. He believes that a compromise of the file server could reveal information that would prevent the company from continuing to do business. What term best describes the risk that Tony is considering?", o: ["Strategic", "Reputational", "Financial", "Operational"], a: 0, exp: "The risk that Tony is contemplating could fit any one of these categories. However, his primary concern is that the company may no longer be able to do business if the risk materializes. This is a strategic risk.", card: 2},
  {c: 0, q: "Which one of the following data elements is not commonly associated with identity theft?", o: ["Social Security number", "Driver's license number", "Frequent flyer number", "Passport number"], a: 2, exp: "Although it is possible that a frequent flyer account number, or any other account number for that matter, could be used in identity theft, it is far more likely that identity thieves would use core identity documents. These include drivers' licenses, passports, and Social Security numbers.", card: 1},
  {c: 0, q: "What term best describes an organization's desired security state?", o: ["Control objectives", "Security priorities", "Strategic goals", "Best practices"], a: 0, exp: "As an organization analyzes its risk environment, technical and business leaders determine the level of protection required to preserve the confidentiality, integrity, and availability of their information and systems. They express these requirements by writing the control objectives that the organization wishes to achieve. These control objectives are statements of a desired security state.", card: 1},
  {c: 0, q: "Lou mounted the sign below on the fence surrounding his organization's datacenter. What control type best describes this control?", o: ["Source: Gabriel Cassan / Adobe Stock", "Compensating", "Detective", "Physical"], a: 3, exp: "This question is a little tricky. The use of an actual guard dog could be considered a deterrent, physical, or detective control. It could even be a compensating control in some circumstances. However, the question asks about the presence of a sign and does not state that an actual dog is used. The sign only has value as a deterrent control. Be careful when facing exam questions like this to read the details of the question.", card: 4},
  {c: 0, q: "What technology uses mathematical algorithms to render information unreadable to those lacking the required key?", o: ["Data loss prevention", "Data obfuscation", "Data minimization", "Data encryption"], a: 3, exp: "Encryption technology uses mathematical algorithms to protect information from prying eyes, both while it is in transit over a network and while it resides on systems. Encrypted data is unintelligible to anyone who does not have access to the appropriate decryption key, making it safe to store and transmit encrypted data over otherwise insecure means.", card: 1},
  {c: 0, q: "Greg recently conducted an assessment of his organization's security controls and discovered a potential gap: the organization does not use full-disk encryption on laptops. What type of control gap exists in this case?", o: ["Detective", "Corrective", "Deterrent", "Preventive"], a: 3, exp: "The use of full-disk encryption is intended to prevent a security incident from occurring if a device is lost or stolen. Therefore, this is a preventive control gap.", card: 5},
  {c: 0, q: "What compliance regulation most directly affects the operations of a health-care provider?", o: ["HIPAA", "PCI DSS", "GLBA", "SOX"], a: 0, exp: "Although a health-care provider may be impacted by any of these regulations, the Health Insurance Portability and Accountability Act (HIPAA) provides direct regulations for the security and privacy of protected health information and would have the most direct impact on a health-care provider.", card: 1},
  {c: 0, q: "Nolan is writing an after action report on a security breach that took place in his organization. The attackers stole thousands of customer records from the organization's database. What cybersecurity principle was most impacted in this breach?", o: ["Availability", "Nonrepudiation", "Confidentiality", "Integrity"], a: 2, exp: "The disclosure of sensitive information to unauthorized individuals is a violation of the principle of confidentiality.", card: 2},
  {c: 0, q: "Which one of the following objectives is not one of the three main objectives that information security professionals must achieve to protect their organizations against cybersecurity threats?", o: ["Integrity", "Nonrepudiation", "Availability", "Confidentiality"], a: 1, exp: "The three primary objectives of cybersecurity professionals are confidentiality, integrity, and availability.", card: 1},
  {c: 0, q: "Which one of the following data protection techniques is reversible when conducted properly?", o: ["Tokenization", "Masking", "Hashing", "Shredding"], a: 0, exp: "Tokenization techniques use a lookup table and are designed to be reversible. Masking and hashing techniques replace the data with values that can't be reversed back to the original data if performed properly. Shredding, when conducted properly, physically destroys data so that it may not be recovered.", card: 5},
  {c: 0, q: "Which one of the following statements is not true about compensating controls under PCI DSS?", o: ["Controls used to fulfill one PCI DSS requirement may be used to compensate for the absence of a control needed to meet another requirement.", "Controls must meet the intent of the original requirement.", "Controls must meet the rigor of the original requirement.", "Compensating controls must provide a similar level of defense as the original requirement."], a: 0, exp: "PCI DSS compensating controls must be “above and beyond” other PCI DSS requirements. This specifically bans the use of a control used to meet one requirement as a compensating control for another requirement.", card: 4},
  {c: 1, q: "Which of the following measures is not commonly used to assess threat intelligence?", o: ["Timeliness", "Detail", "Accuracy", "Relevance"], a: 1, exp: "Although higher levels of detail can be useful, they aren't a common measure used to assess threat intelligence. Instead, the timeliness, accuracy, and relevance of the information are considered critical to determining whether you should use the threat information.", card: 3},
  {c: 1, q: "Which one of the following motivations is most commonly attributed to hacktivists?", o: ["War", "Financial gain", "Political/philosophical beliefs", "Ethical"], a: 2, exp: "Hacktivists are defined by the motivation behind their actions—advancing their political or philosophical beliefs. They engage in cyberattacks that they believe will advance their causes.", card: 1},
  {c: 1, q: "Kolin is a penetration tester who works for a cybersecurity company. His firm was hired to conduct a penetration test against a health-care system, and Kolin is working to gain access to the systems belonging to a hospital in that system. What term best describes Kolin's work?", o: ["Authorized attacker", "Unauthorized attacker", "Unknown attacker", "Semi-authorized attacker"], a: 0, exp: "Attacks that are conducted as part of an authorized penetration test are white-hat hacking attacks, regardless of whether they are conducted by internal employees or an external firm. Kolin is, therefore, engaged in white-hat hacking. If he were acting on his own, without authorization, his status would depend on his intent. If he had malicious intent, his activity would be considered black-hat hacking. If he simply intended to report vulnerabilities to the hospital, his attack would be considered gray hat and he would likely be semi-authorized.", card: 1},
  {c: 1, q: "Which one of the following attackers is most likely to be associated with an APT?", o: ["Nation-state actor", "Hacktivist", "Unskilled", "Insider"], a: 0, exp: "Advanced persistent threats (APTs) are most commonly associated with nation-state actors. It is unlikely that an APT group would leverage the unsophisticated services of an unskilled script kiddie type attacker. It is also unlikely that a hacktivist would have access to APT resources. Although APTs may take advantage of insider access, they are most commonly associated with nation-state actors.", card: 1},
  {c: 1, q: "Which organization did the U.S. government help create to share knowledge between organizations in specific verticals?", o: ["DHS", "SANS", "CERTS", "ISACs"], a: 3, exp: "The U.S. government created the Information Sharing and Analysis Centers (ISACs). ISACs help infrastructure owners and operators share threat information, and provide tools and assistance to their members.", card: 1},
  {c: 1, q: "Which of the following threat actors typically has the greatest access to resources?", o: ["Nation-state actors", "Organized crime", "Hacktivists", "Insider threats"], a: 0, exp: "Nation-state actors are government sponsored, and they typically have the greatest access to resources, including tools, money, and talent.", card: 1},
  {c: 1, q: "Of the threat vectors shown here, which one is most commonly exploited by attackers who are at a distant location?", o: ["Email", "Direct access", "Wireless", "Removable media"], a: 0, exp: "Email is the most common threat vector exploited by attackers who use phishing and other social engineering tactics to gain access to an organization. The other vectors listed here, direct access, wireless, and removable media, all require physical proximity to an organization and are not easily executed from a remote location.", card: 2},
  {c: 1, q: "Which one of the following is the best example of a hacktivist group?", o: ["Chinese military", "U.S. government", "Russian mafia", "Anonymous"], a: 3, exp: "The Chinese military and U.S. government are examples of nation-state actors and advanced persistent threats (APTs). The Russian mafia is an example of a criminal syndicate. Anonymous is the world's most prominent hacktivist group.", card: 1},
  {c: 1, q: "What type of assessment is particularly useful for identifying insider threats?", o: ["Behavioral", "Instinctual", "Habitual", "IoCs"], a: 0, exp: "Behavioral assessments are very useful when you are attempting to identify insider threats. Since insider threats are often hard to distinguish from normal behavior, the context of the actions performed—such as after-hours logins, misuse of credentials, logins from abnormal locations, or abnormal patterns—and other behavioral indicators are often used.", card: 1},
  {c: 1, q: "Cindy is concerned that her organization may be targeted by a supply chain attack and is conducting a review of all of her vendor and supplier partners. Which one of the following organizations is least likely to be the conduit for a supply chain attack?", o: ["Hardware provider", "Software provider", "Managed service provider", "Talent provider"], a: 3, exp: "Supply chain attacks are typically associated with vendors and suppliers that provide technology infrastructure or services that may be compromised. This would include hardware and software providers as well as managed service providers (MSPs). Talent providers, who help with staffing solutions, are generally not considered common avenues for supply chain attacks.", card: 2},
  {c: 1, q: "Greg believes that an attacker may have installed malicious firmware in a network device before it was provided to his organization by the supplier. What type of threat vector best describes this attack?", o: ["Supply chain", "Removable media", "Cloud", "Direct access"], a: 0, exp: "Tampering with equipment before it reaches the intended user is an example of a supply chain threat. It is also possible to describe this attack as a direct access attack because it involved physical access to the device, but supply chain is a more relevant answer. You should be prepared to select the best possible choice from several possible correct answers when you take the exam. Security+ questions often use this type of misdirection.", card: 2},
  {c: 1, q: "Ken is conducting threat research on Transport Layer Security (TLS) and would like to consult the authoritative reference for the protocol's technical specification. What resource would best meet his needs?", o: ["Academic journal", "Internet RFCs", "Subject matter experts", "Textbooks"], a: 1, exp: "All of these resources might contain information about the technical details of TLS, but Internet Request for Comments (RFC) documents are the definitive technical standards for Internet protocols. Consulting the RFCs would be Ken's best option.", card: 1},
  {c: 1, q: "Wendy is scanning cloud-based repositories for sensitive information. Which one of the following should concern her most, if discovered in a public repository?", o: ["Product manuals", "Source code", "API keys", "Open source data"], a: 2, exp: "All of these items could be concerning, depending on the circumstances. However, API keys should never be found in public repositories because they may grant unauthorized individuals access to information and resources.", card: 1},
  {c: 1, q: "Which one of the following threat research tools is used to visually display information about the location of threat actors?", o: ["Threat map", "Predictive analysis", "Vulnerability feed", "STIX"], a: 0, exp: "Threat maps are graphical tools that display information about the geographic locations of attackers and their targets. These tools are most often used as interesting marketing gimmicks, but they can also help identify possible threat sources.", card: 1},
  {c: 1, q: "Vince recently received the hash values of malicious software that several other firms in his industry found installed on their systems after a compromise. What term best describes this information?", o: ["Vulnerability feed", "IoC", "TTP", "RFC"], a: 1, exp: "Specific details of attacks that may be used to identify compromises are known as indicators of compromise (IoCs). This data may also be described as an adversary tactics, techniques, and procedures (TTP), but the fact that it is a set of file signatures makes it more closely match the definition of an IoC.", card: 1},
  {c: 1, q: "Ursula recently discovered that a group of developers are sharing information over a messaging tool provided by a cloud vendor but not sanctioned by her organization. What term best describes this use of technology?", o: ["Shadow IT", "System integration", "Vendor management", "Data exfiltration"], a: 0, exp: "The developers in question are using unapproved technology for business purposes. This is the classic definition of shadow IT. It is possible to describe this as data exfiltration, but there is no indication that the data security has been compromised, so shadow IT is a better description here. Remember, you will often be asked to choose the best answer from multiple correct answers on the exam.", card: 3},
  {c: 1, q: "Tom's organization recently learned that the vendor is discontinuing support for their customer relationship management (CRM) system. What should concern Tom the most from a security perspective?", o: ["Unavailability of future patches", "Lack of technical support", "Theft of customer information", "Increased costs"], a: 0, exp: "Tom's greatest concern should be that running unsupported software exposes his organization to the risk of new, unpatchable vulnerabilities. It is certainly true that they will no longer receive technical support, but this is a less important issue from a security perspective. There is no indication in the scenario that discontinuing the product will result in the theft of customer information or increased costs.", card: 1},
  {c: 1, q: "Which one of the following information sources would not be considered an OSINT source?", o: ["DNS lookup", "Search engine research", "Port scans", "WHOIS queries"], a: 2, exp: "Port scans are an active reconnaissance technique that probe target systems and would not be considered open source intelligence (OSINT). Search engine research, DNS lookups, and WHOIS queries are all open source resources.", card: 3},
  {c: 1, q: "When she does so, she accesses the records of other students. She closes the records and immediately informs the school principal of the vulnerability. What term best describes Renee's work?", o: ["Authorized hacking", "Unknown hacking", "Semi-authorized hacking", "Unauthorized hacking"], a: 2, exp: "Renee was not authorized to perform this security testing, so her work does not fit into the category of white-hat hacking, or authorized hacking. However, she also does not have malicious intent, so her work cannot be categorized as an unauthorized, or black-hat attack. Instead, it fits somewhere in between the two extremes and would best be described as semi-authorized, or gray-hat hacking.", card: 1},
  {c: 2, q: "Ryan wants to prevent logic bombs created by insider threats from impacting his organization. What technique will most effectively limit the likelihood of logic bombs being put in place?", o: ["Deploying antivirus software", "Using a code review process", "Deploying endpoint detection and response (EDR) software", "Disabling autorun for USB drives"], a: 1, exp: "Logic bombs are embedded in code, so Ryan's organization would get the most benefit from a code review process for any code that goes into production. Antivirus and EDR are unlikely to detect logic bombs created by staff in Ryan's organization."},
  {c: 2, q: "Yasmine believes that her organization may be dealing with an advanced rootkit and wants to write IoC definitions for it. Which of the following is not likely to be a useful IoC for a rootkit?", o: ["File hashes", "Command and control domains", "Pop-ups demanding a ransom", "Behavior-based identifiers"], a: 2, exp: "Rootkits are intended to be stealthy, and a pop-up demanding ransom works against that purpose. File hashes, command and control details, and behavior-based identifiers are all useful IoCs likely to be relevant to a rootkit."},
  {c: 2, q: "Nathan works at a school and notices that one of his staff appears to have logged in and changed grades for a single student to higher grades, even in classes that staff member is not responsible for. When asked, the staff member says that they did not perform the action. Which of the following is the most likely way that a student could have gotten access to the staff member's password?", o: ["A keylogger", "A rootkit", "Spyware", "A logic bomb"], a: 0, exp: "Nathan should check the staff member's computer for a keylogger, which would have captured their username and password. A student could have then used the staff member's credentials to make the changes described. A rootkit would be used to retain access, spyware gathers a variety of data but is not specifically aimed at capturing keystrokes like this, and logic bombs have specific events or triggers that cause them to take action."},
  {c: 2, q: "Amanda notices traffic between her systems and a known malicious host on TCP port 6667. What type of traffic is she most likely detecting?", o: ["Command and control", "Spyware", "A worm", "A hijacked web browser"], a: 0, exp: "Amanda has most likely discovered a botnet's command and control channel, and the system or systems she is monitoring are probably using IRC as the command and control channel. Spyware is likely to simply send data to a central server via HTTP/HTTPS, worms spread by attacking vulnerable services, and a hijacked web browser would probably operate on common HTTP or HTTPS ports (80/443)."},
  {c: 2, q: "Mike discovers that attackers have left software that allows them to have remote access to systems on a computer in his company's network. How should he describe or classify this malware?", o: ["A worm", "Crypto malware", "A trojan", "A backdoor"], a: 3, exp: "Remote access to a system is typically provided by a backdoor. Backdoors may also appear in firmware or even in hardware. None of the other items listed provide remote access by default, although they may have a backdoor as part of a more capable malware package."},
  {c: 2, q: "What is the primary impact of bloatware?", o: ["Consuming resources", "Logging keystrokes", "Providing information about users and devices to third parties", "Allowing unauthorized remote access"], a: 0, exp: "Bloatware is typically not a significant security threat, but it consumes resources like disk space, CPU, and memory. Unfortunately, some bloatware can be vulnerable and may not get regularly patched, meaning it's both useless and a potential risk!"},
  {c: 2, q: "What type of malware is used to gather information about a user's browsing habits and system?", o: ["A Trojan", "Bloatware", "Spyware", "A rootkit"], a: 2, exp: "Spyware is specifically designed to gather information about users and systems and to send that data back to a central collector. Trojans pretend to be useful software and include malicious components, bloatware is preinstalled software that isn't needed, and rootkits are used to conceal malicious software and retain a foothold on compromised systems."},
  {c: 2, q: "Matt uploads a malware sample to a third-party malware scanning site that uses multiple antimalware and antivirus engines to scan the sample. He receives multiple different answers for what the malware package is. What has occurred?", o: ["The package contains more than one piece of malware.", "The service is misconfigured.", "The malware is polymorphic and changed while being tested.", "Different vendors use different names for malware packages."], a: 3, exp: "One of the challenges security practitioners can face when attempting to identify malware is that different antivirus and antimalware vendors will name malware packages and families differently. This means that Matt may need to look at different names to figure out what he is dealing with."},
  {c: 2, q: "Nancy is concerned that there is a software keylogger on the system she's investigating. What best describes data that may have been stolen?", o: ["All files on the system", "All keyboard input", "All files the user accessed while the keylogger was active", "Keyboard and other input from the user"], a: 3, exp: "While keyloggers often focus on keyboard input, other types of input may also be captured, meaning Nancy should worry about any user input that occurred while the keylogger was installed. Keyloggers typically do not target files on systems, although if Nancy finds a keylogger, she may want to check for other malware packages with additional capabilities."},
  {c: 2, q: "A system in Elaine's company has suddenly displayed a message demanding payment in Bitcoin and claiming that the data from the system has been encrypted. What type of malware has Elaine likely encountered?", o: ["Worms", "A virus", "Ransomware", "Rootkit"], a: 2, exp: "Ransomware demands payment to be made while typically using encryption to make data inaccessible. Worms, viruses, and rootkits are not defined by behavior like this."},
  {c: 2, q: "Rick believes that a system he is responsible for has been compromised with malware that uses a rootkit to obtain and retain access to the system. When he runs an antimalware tool's scanner, the system doesn't show any malware. If he has other data that indicates the system is infected, what should his next step be if he wants to determine what malware may be on the system?", o: ["Rerun the antimalware scan.", "Mount the drive on another system and scan it that way.", "Disable the systems antivirus because it may be causing a false negative.", "The system is not infected and he should move on."], a: 1, exp: "Rootkits are designed to hide from antimalware scanners and can often defeat locally run scans. Mounting the drive in another system in read-only mode or booting from a USB drive and scanning using a trusted, known good operating system can be an effective way to determine what malware is on a potentially infected system."},
  {c: 2, q: "A recently terminated developer from Jaya's organization has contacted the organization claiming that they left code in an application that they wrote that will delete files and bring the application down if they are not employed by the company. What type of malware is this?", o: ["Ransomware", "Extortionware", "A logic bomb", "A Trojan"], a: 2, exp: "Jaya's former employee is describing a logic bomb, malicious code that will cause harm when a trigger or specific action occurs. In this case, the former employee is claiming that the trigger is them not being employed at the company. Jaya will need to assess all of the code that the employee wrote to determine if a logic bomb exists. Ransomware is a type of malicious software that typically uses encryption to extort a ransom. Extortionware is not a commonly used term. Trojans appear to be useful or desirable software but contain malicious code."},
  {c: 2, q: "Selah wants to ensure that malware is completely removed from a system. What should she do to ensure this?", o: ["Run multiple antimalware tools and use them to remove all detections.", "Wipe the drive and reinstall from known good media.", "Use the delete setting in her antimalware software rather than the quarantine setting.", "There is no way to ensure the system is safe and it should be destroyed."], a: 1, exp: "In most malware infection scenarios, wiping the drive and reinstalling from known good media is the best option available. If the malware has tools that can infect the system BIOS/UEFI, even this may not be sufficient, but BIOS/UEFI resident malware is relatively uncommon. Multiple antivirus and antimalware tools, even if they are set to delete malware, may still fail against unknown or advanced malware packages. Destroying systems is uncommon, expensive, and unlikely to be acceptable to most organizations as a means of dealing with a malware infection."},
  {c: 2, q: "What is the key difference between a worm and a virus?", o: ["What operating system they run on", "How they spread", "What their potential impact is", "The number of infections"], a: 1, exp: "The key difference between worms and viruses is how they spread. Worms spread themselves, whereas viruses rely on human interaction."},
  {c: 2, q: "Ben wants to analyze Python code that he believes may be malicious code written by an employee of his organization. What can he do to determine if the code is malicious?", o: ["Run a decompiler against it to allow him to read the code", "Open the file using a text editor to review the code", "Test the code using an antivirus tool", "Submit the Python code to a malware testing website"], a: 1, exp: "Python is an interpreted rather than a compiled language, so Ben doesn't need to use a decompiler. Instead, his best bet is to open the file and review the code to see what it does. Since it was written by an employee, it is unlikely that it will match an existing known malicious package, which means antivirus and antimalware tools and sites will be useless."},
  {c: 2, q: "Which of the following defenses is most likely to prevent Trojan installation?", o: ["Installing patches for known vulnerabilities", "Preventing downloads from application stores", "Preventing the use of USB drives", "Disabling autorun from USB drives"], a: 1, exp: "Trojans are often found in application stores where they appear to be innocuous but desirable applications or are listed in confusingly similar ways to legitimate applications. Many organizations choose to lock down the ability to acquire applications from app stores to prevent this type of issue. Since Trojans do not self-spread and rely on user action, patching typically won't prevent them. While users may try to transfer files via USB, this isn't the most common means for modern Trojans to spread."},
  {c: 2, q: "Jason's security team reports that a recent WordPress vulnerability seems to have been exploited by malware and that their organization's entire WordPress service cluster has been infected. What type of malware is most likely involved if a vulnerability in the software was exploited over the network?", o: ["A logic bomb", "A Trojan", "A worm", "A rootkit"], a: 2, exp: "Worms often spread via networks, taking advantage of vulnerabilities to install themselves on targeted systems and then to propagate further. Trojans require human interaction to install software that appears desirable. Logic bombs are embedded in code and perform actions when triggers like a date or event occur. Rootkits are used to hide malware and to conceal attacker's actions."},
  {c: 2, q: "Hui's organization recently purchased new Windows computers from an office supply store. The systems have a number of unwanted programs on them that load at startup that were installed by the manufacturer. What type of software is this?", o: ["Viruses", "Trojans", "Spyware", "Bloatware"], a: 3, exp: "Unwanted, typically preinstalled programs are known as bloatware. They take up space and resources without providing value, and many organizations either uninstall them or install clean operating system images to avoid them. There is no indication of malicious activity in the question, so these are most likely not viruses, Trojans, or spyware."},
  {c: 2, q: "What type of malware connects to a command and control system, allowing attackers to manage, control, and update it remotely?", o: ["A bot", "A drone", "A vampire", "A worm"], a: 0, exp: "Bots connect to command and control (C&C) systems, allowing them to be updated, controlled, and managed remotely. Worms spread via vulnerabilities, and drones and vampires aren't common terms for malware."},
  {c: 2, q: "Randy believes that a system that he is responsible for was infected after a user picked up a USB drive and plugged it in. The user claims that they only opened one file on the drive to see who might own it. What type of malware is most likely involved?", o: ["A virus", "A worm", "A trojan", "A spyware tool"], a: 0, exp: "Randy knows that viruses spread through user interaction with files on thumb drives. A worm would spread itself, a Trojan would look like a useful or desirable file, and there is no indication of spyware in the question."},
  {c: 3, q: "Joseph receives an email notifying him that he needs to change his password due to a recent account issue. He notices that the email links him to a website using the domain amaz0n.com. What type of attack should he describe this as?", o: ["Typosquatting", "Phishing", "Smishing", "A watering hole attack"], a: 1, exp: "This email is an attempt to get account information and is a phishing email. Joseph did not enter the URL himself, which is the behavior that a typosquatter relies on. A smishing attack relies on SMS, and a watering hole attack uses a frequently visited website."},
  {c: 3, q: "While reviewing her logs, Michele notices that a remote system has attempted to log into her server via SSH using the username admin and a variety of passwords like \u201cpassword\u201d and \u201cninja.\u201d What type of attack has Michele noticed?", o: ["A brute-force attack", "Shoulder surfing", "An on-path attack", "Pretexting"], a: 3, exp: "Vishing is a form of phishing done via voice phones call or voicemail. Whaling focuses on targeting important targets for phishing attacks, whereas spoofing is a general term that means faking things. Spooning is not a technical term used for security practices."},
  {c: 3, q: "Joanna wants to detect password spraying attacks. What type of rule should she deploy through her security systems?", o: ["Match attempts to log into many systems with the same username and password.", "Match multiple attempts to log into the same user account using different passwords.", "Match repeated use of the same password during failed login attempts for multiple usernames.", "Match all attempts to use passwords with slight changes for the same account."], a: 0, exp: "Michele has discovered a brute-force attack, which relies on trying a large number of passwords, often combined with a list of usernames to try. Shoulder surfing attacks involve an attacker watching as a user enters information like a password or credit card data. On-path attacks intercept data sent via a network, and pretexting is a social engineering attack that relies on a believable reason for attackers to need a victim to take action."},
  {c: 3, q: "One of the staff at Susan's organization has reported that a critical vendor has contacted them about an unpaid invoice. After Susan investigates, she discovers that the invoice was sent from an email account that was not typically a contact and that the invoice requested payment to a PayPal account. What type of social engineering attack has Susan most likely discovered?", o: ["Smishing", "Business email compromise", "Disinformation", "Typosquatting"], a: 2, exp: "Password spraying involves the use of the same password to attempt to log into multiple accounts. Joanna should search for uses of the same password for different accounts."},
  {c: 3, q: "Selah infects the ads on a website that users from her target company frequently visit with malware as part of her penetration test. What technique has she used?", o: ["A watering hole attack", "Vishing", "Whaling", "Typosquatting"], a: 1, exp: "Susan has most likely discovered a business email compromise and should reach out to the impacted organization to inform them of the potentially compromised account. Smishing would occur via SMS, there is nothing in the question to indicate a disinformation campaign was part of this, and there is no URL mentioned and thus typosquatting can be dismissed as well."},
  {c: 3, q: "Ben wants to determine if brute-force password attacks are being used against his company. What log information is least likely to be useful when working to detect brute-force attacks?", o: ["Source IP address or hostname", "Failed login logs", "The password that was used for each attempt", "The geographic location of system being logged into"], a: 0, exp: "Watering hole attacks rely on compromising or infecting a website that targeted users frequently visit, much like animals will visit a common watering hole. Vishing is phishing via voice, whaling is a targeted phishing attack against senior or important staff, and typosquatting registers similar URLs that are likely to be inadvertently entered in order to harvest clicks or conduct malicious activity."},
  {c: 3, q: "Melissa receives a call and the caller informs her a senior manager in her organization needs her to buy gift cards for an event that starts in an hour. The caller says that the senior leader forgot to get the cards, and that the event is critical to her organization. Melissa buys the cards and sends them to the Gmail address the caller says that the senior leader needs them sent to. What type of attack has Melissa fallen for?", o: ["Phishing", "Pretexting", "Business email compromise", "Carding"], a: 3, exp: "The source IP or hostname; the failed login logs with time, date, username, and other information; and the password that was used for each failed attempt would be useful for watching for brute-force attempts. Knowing where the system being logged into is located isn't useful when tracking brute-force attempts. Logging failed passwords can be problematic as it can reveal actual passwords by allowing log reviewers to see failures driven by typos, so Ben may want to avoid that sort of log even though it can be useful!"},
  {c: 3, q: "Alaina wants to determine if a password spraying attack was used against her organization. Which of the following indicators would be most useful as part of her investigation?", o: ["The time the login attempts happened", "The passwords used for failed attempts", "The source IP address of the attempts", "The number of failed attempts for each user"], a: 1, exp: "The caller is using pretexting, providing Melissa with a story that relies on urgency and perceived authority to get her to take actions she might normally question. This social engineering attack is not a phishing attack aimed at gathering information or credentials, it does not involve business email accounts being compromised, and carding is not a topic covered in the Security+ exam outline."},
  {c: 3, q: "Which of the following human vectors is primarily associated with nation-state actors?", o: ["Misinformation campaigns", "Watering hole attacks", "Business email compromise", "Password spraying"], a: 1, exp: "Password spraying attempts try to use a single common password for many user accounts. Determining if a single password is being used over and over can help catch basic password spraying attempts. The time, source IP, or number of failed attempts do not indicate password spraying."},
  {c: 3, q: "Nicole accidentally types www.smazon.com into her browser and discovers that she is directed to a different site loaded with ads and pop-ups. Which of the following is the most accurate description of the attack she has experienced?", o: ["DNS hijacking", "Pharming", "Typosquatting", "Hosts file compromise"], a: 0, exp: "Misinformation and disinformation campaigns are primarily associated with nation-state actors, but are increasingly used by other organizations and even individuals as well. Watering hole attacks, business email compromise, and password spraying are broadly used attacks."},
  {c: 3, q: "Devon is a penetration tester and sets up malicious tools on his target organization's primary internal website. What type of attack is he conducting?", o: ["A misinformation campaign", "A watering hole attack", "A typosquatting attack", "A disinformation campaign"], a: 2, exp: "Typosquatting uses misspellings and common typos of websites to redirect traffic for profit or malicious reasons. Fortunately in reality, if you visit smazon.com, you'll be redirected to the actual amazon.com website, as Amazon knows about and works to prevent this type of issue. DNS hijacking and hosts file modifications both attempt to redirect traffic to actual URLs or hostnames to different destinations, and pharming does redirect legitimate traffic to fake sites, but typosquatting is the more specific answer."},
  {c: 3, q: "Phishing emails sent pretending to be from a company that recipients are familiar with and likely to respond to is what type of attack?", o: ["Phishing", "Pharming", "Brand impersonation", "Pretexting"], a: 1, exp: "Devon is conducting a watering hole attack that leverages a frequently visited site to deploy malware. There is no description of misinformation or disinformation in the question, and there is not a typo described that would lead to a typosquatting attack being successful."},
  {c: 3, q: "When a caller was recently directed to Amanda, who is a junior IT employee at her company, the caller informed her that they were the head of IT for her organization and that she needed to immediately disable the organization's firewall. After Amanda made the change, she discovered that the caller was not the head of IT, and that they were actually a penetration tester hired by her company. What social engineering attack best describes this?", o: ["Smishing", "Pretexting", "Impersonation", "Vishing"], a: 2, exp: "Brand impersonation attacks are designed to appear to be from a company that recipients are likely to be familiar with, and thus are more likely to elicit a response. While these are a type of phishing, the more specific answer of brand impersonation is the best answer. Pretexting is a social engineering concept that provides a reason for the request. Pharming attacks redirect traffic intended to be sent to a legitimate site to a fake website typically designed to simulate the real one."},
  {c: 3, q: "Fred is concerned about text message\u2013based attacks. Which of the following attacks relies on text messages as its primary focus?", o: ["Impersonation", "Watering hole attacks", "Smishing", "Business email compromise"], a: 2, exp: "This is an example of an impersonation attack. The pentester impersonated the head of IT in order to achieve their goals. The good news is that it was a penetration tester! Smishing is phishing via SMS, vishing is phishing via voice or voicemail, and pretexting provides a reason that the target should perform an action. Here the attack relied on the authority that Amanda believed the caller had."},
  {c: 3, q: "Sharif notices that his authentication logs have many different usernames showing failed logins with the same password. What type of attack has he discovered?", o: ["Credential harvesting", "Impersonation", "BEC", "Spraying"], a: 2, exp: "Smishing attacks are SMS-based. Impersonation attacks could use texts but don't specifically rely on them. Watering hole attacks use frequently visited websites, whereas business email compromise attacks focus on gaining access to business email accounts to use in follow-up attacks."},
  {c: 3, q: "Naomi receives a report of smishing. What type of attack should she be looking for?", o: ["Compressed files in phishing", "Text message\u2013based phishing", "Voicemail-based phishing", "Server-based phishing"], a: 3, exp: "Sharif has discovered a spraying attack that uses the same password—often a default or common password—with many usernames. Credential harvesting is the process of gathering credentials like usernames and passwords. Impersonation is a social engineering technique used when an attacker pretends to be someone else. BEC, or business email compromise, involves attackers posing as a trusted individual and asking for actions to be performed."},
  {c: 3, q: "Jack's organization wants to prevent typosquatting. What option should he select to address this issue?", o: ["Copyright the domain name", "Purchase the most common typos for his organization's domain", "Trademark the domain name", "Disable typo resolution for the domain"], a: 1, exp: "Smishing is a type of phishing that occurs via text (SMS) message."},
  {c: 3, q: "Gwyne's company has been contacted by customers asking about a new social media account operating under the company's brand. The social media account is advertising cryptocurrency, which Gwyne's organization does not sell or work with. What type of attack best describes what Gwyne's organization has encountered?", o: ["Impersonation", "Brand impersonation", "Mis-branding", "Crypto-phishing"], a: 1, exp: "While it's nearly impossible to prevent typosquatting, purchasing and registering the most common typos (typo-domains) related to your organization's domain and redirecting them to your real domain is the most effective option available. Copyrighting or trademarking the domain name does not prevent typosquatting, and typo resolution is not a feature or capability that is available."},
  {c: 3, q: "Nation-state-driven social media campaigns about the trustworthiness of the U.S. election in 2016 are an example of what type of social engineering?", o: ["Smishing", "Pretexting", "Disinformation", "Spraying"], a: 1, exp: "Using an organization's brand in this way is an example of brand impersonation. While this is also an impersonation attack, the more specific description is the best answer here. Misbranding and crypto-phishing were both made up for this question and aren't commonly used terms."},
  {c: 3, q: "Is the system a production, test, or development system?", o: ["Organizations also use automated techniques to identify the systems that may be covered by a scan. Cybersecurity professionals use scanning tools to search the network for connected systems, whether they were previously known or unknown, and to build an asset inventory. Figure 5.1 shows an example of an asset map developed using the Qualys vulnerability scanner's asset inventory functionality.", "FIGURE 5.1 Qualys asset map", "Administrators may then supplement this inventory with additional information about the type of system and the information it handles. This information then helps make determinations about which systems are critical and which are noncritical. Asset inventory and asset criticality information helps guide decisions about the types of scans that are performed, the frequency of those scans, and the priority administrators should place on remediating vulnerabilities detected by the scan.", "Determining Scan Frequency"], a: 2, exp: "Disinformation campaigns are used to shift public opinion or to accomplish other goals. They are not limited to nation-state actors but are an increasingly heavily used social engineering tactic at a broad scale. Smishing relies on SMS messages, pretexting involves using a reason that creates urgency or importance in a request from a social engineer, and spraying is a type of password brute forcing."},
  {c: 4, q: "Which one of the following security assessment techniques assumes that an organization has already been compromised and searches for evidence of that compromise?", o: ["Vulnerability scanning", "Penetration testing", "Threat hunting", "War driving"], a: 2, exp: "Threat hunting is an assessment technique that makes an assumption of compromise and then searches the organization for indicators of compromise that confirm the assumption. Vulnerability scanning, penetration testing, and war driving are all assessment techniques that probe for vulnerabilities but do not assume that a compromise has already taken place."},
  {c: 4, q: "Renee is configuring her vulnerability management solution to perform credentialed scans of servers on her network. What type of account should she provide to the scanner?", o: ["Domain administrator", "Local administrator", "Root", "Read-only"], a: 3, exp: "Credentialed scans only require read-only access to target servers. Renee should follow the principle of least privilege and limit the access available to the scanner."},
  {c: 4, q: "Ryan is planning to conduct a vulnerability scan of a business-critical system using dangerous plug-ins. What would be the best approach for the initial scan?", o: ["Run the scan against production systems to achieve the most realistic results possible.", "Run the scan during business hours.", "Run the scan in a test environment.", "Do not run the scan to avoid disrupting the business."], a: 2, exp: "Ryan should first run his scan against a test environment to identify likely vulnerabilities and assess whether the scan itself might disrupt business activities."},
  {c: 4, q: "Which one of the following values for the CVSS attack complexity metric would indicate that the specified attack is simplest to exploit?", o: ["High", "Medium", "Low", "Severe"], a: 2, exp: "An attack complexity of “low” indicates that exploiting the vulnerability does not require any specialized conditions."},
  {c: 4, q: "Tara recently analyzed the results of a vulnerability scan report and found that a vulnerability reported by the scanner did not exist because the system was actually patched as specified. What type of error occurred?", o: ["False positive", "False negative", "True positive", "True negative"], a: 0, exp: "A false positive error occurs when the vulnerability scanner reports a vulnerability that does not actually exist."},
  {c: 4, q: "Brian ran a penetration test against a school's grading system and discovered a flaw that would allow students to alter their grades by exploiting a SQL injection vulnerability. What type of control should he recommend to the school's cybersecurity team to prevent students from engaging in this type of activity?", o: ["Confidentiality", "Integrity", "Alteration", "Availability"], a: 1, exp: "By allowing students to change their own grades, this vulnerability provides a pathway to unauthorized alteration of information. Brian should recommend that the school deploy integrity controls that prevent unauthorized modifications."},
  {c: 4, q: "Which one of the following security assessment tools is least likely to be used during the reconnaissance phase of a penetration test?", o: ["Nmap", "Nessus", "Metasploit", "Nslookup"], a: 2, exp: "Nmap is a port scanning tool used to enumerate open network ports on a system. Nessus is a vulnerability scanner designed to detect security issues on a system. Nslookup is a DNS information gathering utility. All three of these tools may be used to gather information and detect vulnerabilities. Metasploit is an exploitation framework used to execute and attack and would be better suited for the Attacking and Exploiting phase of a penetration test."},
  {c: 4, q: "What security control, if deployed, would likely have addressed this issue?", o: ["Patch management", "File integrity monitoring", "Intrusion detection", "Threat hunting"], a: 0, exp: "This vulnerability is corrected by a patch that was released by Microsoft in 2017. A strong patch management program would have identified and remediated the missing patch."},
  {c: 4, q: "Which one of the following tools is most likely to detect an XSS vulnerability?", o: ["Static application test", "Web application vulnerability scanner", "Intrusion detection system", "Network vulnerability scanner"], a: 1, exp: "Intrusion detection systems do not detect vulnerabilities; they detect attacks. The remaining three tools could all possibly discover a cross-site scripting (XSS) vulnerability, but a web application vulnerability scanner is the most likely to detect it because it is specifically designed to test web applications."},
  {c: 4, q: "During a penetration test, Patrick deploys a toolkit on a compromised system and uses it to gain access to other systems on the same network. What term best describes this activity?", o: ["Lateral movement", "Privilege escalation", "Footprinting", "OSINT"], a: 0, exp: "Moving from one compromised system to other systems on the same network is known as lateral movement. Privilege escalation attacks increase the level of access that an attacker has to an already compromised system. Footprinting and OSINT are reconnaissance techniques."},
  {c: 4, q: "Zian is a cybersecurity leader who is coordinating the activities of a security audit. The audit is being done to validate the organization's financial statements to investors and involves a review of cybersecurity controls. What term best describes this audit?", o: ["External audit", "Penetration test", "Internal audit", "Informal audit"], a: 0, exp: "Audits performed to validate an organization's financial statements are very formal audits that are performed by independent third-party auditors. This makes them external audits. Internal audits may be more or less formal than external audits but they are generally done only to provide assurance to internal parties and not to investors. Penetration tests may be done as part of an audit but they are not audits themselves."},
  {c: 4, q: "Which one of the following assessment techniques is designed to solicit participation from external security experts and reward them for discovering vulnerabilities?", o: ["Threat hunting", "Penetration testing", "Bug bounty", "Vulnerability scanning"], a: 2, exp: "Bug bounty programs are designed to allow external security experts to test systems and uncover previously unknown vulnerabilities. Bug bounty programs offer successful testers financial rewards to incentivize their participation."},
  {c: 4, q: "Kyle is conducting a penetration test. After gaining access to an organization's database server, he installs a backdoor on the server to grant himself access in the future. What term best describes this action?", o: ["Privilege escalation", "Lateral movement", "Maneuver", "Persistence"], a: 3, exp: "Backdoors are a persistence tool, designed to make sure that the attacker's access persists after the original vulnerability is remediated. Kyle can use this backdoor to gain access to the system in the future, even if the original exploit that he used to gain access is no longer effective."},
