  {c: 4, q: "Which one of the following techniques would be considered passive reconnaissance?", o: ["Port scans", "Vulnerability scans", "WHOIS lookups", "Footprinting"], a: 2, exp: "WHOIS lookups use external registries and are an example of open source intelligence (OSINT), which is a passive reconnaissance technique. Port scans, vulnerability scans, and footprinting all require active engagement with the target and are, therefore, active reconnaissance."},
  {c: 4, q: "Which element of the SCAP framework can be used to consistently describe vulnerabilities?", o: ["CPE", "CVE", "CVSS", "CCE"], a: 1, exp: "Common Vulnerabilities and Exposures (CVE) provides a standard nomenclature for describing security-related software flaws. Common Platform Enumeration (CPE) provides a standard nomenclature for describing product names and versions. The Common Vulnerability Scoring System (CVSS) provides a standardized approach for measuring and describing the severity of security-related software flaws. Common Configuration Enumeration (CCE) provides a standard nomenclature for discussing system configuration issues."},
  {c: 4, q: "Bruce is conducting a penetration test for a client. The client provided him with full details of their systems in advance. What type of test is Bruce conducting?", o: ["Partially known environment test", "Detailed environment test", "Known environment test", "Unknown environment test"], a: 2, exp: "Known environment tests are performed with full knowledge of the underlying technology, configurations, and settings that make up the target. Unknown environment tests are intended to replicate what an attacker would encounter. Testers are not provided with access to or information about an environment, and instead, they must gather information, discover vulnerabilities, and make their way through an infrastructure or systems like an attacker would. Partially known environment tests are a blend of unknown environment and known environment testing. Detailed environment tests are not a type of penetration test."},
  {c: 4, q: "Lila is working on a penetration testing team and she is unsure whether she is allowed to conduct social engineering as part of the test. What document should she consult to find this information?", o: ["Contract", "Statement of work", "Rules of engagement", "Lessons learned report"], a: 2, exp: "The rules of engagement provide technical details on the parameters of the test. This level of detail would not normally be found in a contract or statement of work (SOW). The lessons learned report is not produced until after the test."},
  {c: 4, q: "Grace would like to determine the operating system running on a system that she is targeting in a penetration test. Which one of the following techniques will most directly provide her with this information?", o: ["Port scanning", "Footprinting", "Vulnerability scanning", "Packet capture"], a: 1, exp: "All of these techniques might provide Grace with information about the operating system running on a device. However, footprinting is a technique specifically designed to elicit this information."},
  {c: 4, q: "Kevin recently identified a new security vulnerability and computed its CVSS base score as 6.5. Which risk category would this vulnerability fall into?", o: ["Low", "Medium", "High", "Critical"], a: 1, exp: "Vulnerabilities with CVSS base scores between 4.0 and 6.9 fit into the medium risk category. Vulnerability scores between 0.1 and 3.9 would be low, between 7.0 and 8.9 would be high, and those between 9.0 and 10.0 would be in the critical risk category."},
  {c: 4, q: "Which one of the CVSS metrics would contain information about the type of account access that an attacker must have to execute an attack?", o: ["AV", "C", "PR", "AC"], a: 2, exp: "The privileges required (PR) metric indicates the type of system access that an attacker must have to execute the attack."},
  {c: 5, q: "Adam is conducting software testing by reviewing the source code of the application. What type of code testing is Adam conducting?", o: ["Mutation testing", "Static code analysis", "Dynamic code analysis", "Fuzzing"], a: 1, exp: "Adam is conducting static code analysis by reviewing the source code. Dynamic code analysis requires running the program, and both mutation testing and fuzzing are types of dynamic analysis."},
  {c: 5, q: "Charles is worried about users conducting SQL injection attacks. Which of the following solutions will best address his concerns?", o: ["Using secure session management", "Enabling logging on the database", "Performing user input validation", "Implementing TLS"], a: 2, exp: "Charles should perform user input validation to strip out any SQL code or other unwanted input. Secure session management can help prevent session hijacking, logging may provide useful information for incident investigation, and implementing TLS can help protect network traffic, but only input validation helps with the issue described."},
  {c: 5, q: "Precompiled SQL statements that only require variables to be input are an example of what type of application security control?", o: ["Parameterized queries", "Encoding data", "Input validation", "Appropriate access controls"], a: 0, exp: "A parameterized query (sometimes called a prepared statement) uses a prebuilt SQL statement to prevent SQL-based attacks. Variables from the application are fed to the query, rather than building a custom query when the application needs data. Encoding data helps to prevent cross-site scripting attacks, as does input validation. Appropriate access controls can prevent access to data that the account or application should not have access to, but they don't use precompiled SQL statements. Stored procedures are an example of a parameterized query implementation."},
  {c: 5, q: "During a web application test, Ben discovers that the application shows SQL code as part of an error provided to application users. What should he note in his report?", o: ["Improper error handling", "Code exposure", "SQL injection", "A default configuration issue"], a: 0, exp: "Improper error handling often exposes data to users and possibly attackers that should not be exposed. In this case, knowing what SQL code is used inside the application can provide an attacker with details they can use to conduct further attacks. Code exposure is not one of the vulnerabilities we discuss in this book, and SQL code being exposed does not necessarily mean that SQL injection is possible. While this could be caused by a default configuration issue, there is nothing in the question to point to that problem."},
  {c: 5, q: "The application that Scott is writing has a flaw that occurs when two operations are attempted at the same time, resulting in unexpected results when the two actions do not occur in the expected order. What type of flaw does the application have?", o: ["Dereferencing", "A race condition", "An insecure function", "Improper error handling"], a: 1, exp: "The application has a race condition, which occurs when multiple operations cause undesirable results due to their order of completion. De-referencing accesses or uses a memory pointer, an insecure function would have security issues in the function itself, and improper error handling would involve an error and how it was displayed or what data it provided."},
  {c: 5, q: "Every time Susan checks code into her organization's code repository, it is tested and validated, and then if accepted, it is immediately put into production. What is the term for this?", o: ["Continuous integration", "Continuous delivery", "A security nightmare", "Agile development"], a: 1, exp: "Although this example includes continuous integration, the key thing to notice is that the code is then deployed into production. This means that Susan is operating in a continuous deployment environment, where code is both continually integrated and deployed. Agile is a development methodology and often uses CI/CD, but we cannot determine if Susan is using Agile."},
  {c: 5, q: "Tim is working on a change to a web application used by his organization to fix a known bug. What environment should he be working in?", o: ["Test", "Development", "Staging", "Production"], a: 1, exp: "Developers working on active changes to code should always work in the development environment. The test environment is where the software or systems can be tested without impacting the production environment. The staging environment is a transition environment for code that has successfully cleared testing and is waiting to be deployed into production. The production environment is the live system. Software, patches, and other changes that have been tested and approved move to production."},
  {c: 5, q: "Ricky is concerned that developers in his organization make use of third-party code in their applications, which may introduce unknown vulnerabilities. He is concerned about the risk of the organization running code that it is not aware it is using. Which one of the following activities would best address this risk?", o: ["Web application firewalls", "Package monitoring", "Static analysis", "Dynamic analysis"], a: 1, exp: "All of the activities listed here may reduce the risk of the vulnerabilities created by the code. However, Ricky is specifically concerned about the fact that the organization may not be aware of all of the code that it is running. Package monitoring would inventory and monitor these third-party libraries, so that is the best answer here."},
  {c: 5, q: "Which one of the following is not an advantage of automation in cybersecurity operations?", o: ["Enforcing baselines", "Technical debt", "Employee retention", "Standardizing infrastructure configurations"], a: 1, exp: "The main benefits of automation are efficiency and time savings, enforcing baselines, standardizing infrastructure configurations, scaling in a secure manner, retaining employees, reducing reaction time, and serving as a workforce multiplier. Technical debt is one of the potential drawbacks of automation."},
  {c: 5, q: "Chris is creating a script that will automatically screen any user requests and flag those that exceed normal thresholds for manual review. What term best describes this automation use case?", o: ["User provisioning", "Guard rails", "Ticket creation", "Escalation"], a: 1, exp: "This is an example of the guard rails use case for automation. Cybersecurity professionals can use scripting to automatically review user actions and block any that are outside of normal parameters."},
  {c: 5, q: "Which one of the following is not a common drawback of automating cybersecurity operations?", o: ["Reducing employee satisfaction", "Creating single points of failure", "Costs", "Complexity"], a: 0, exp: "Automation normally increases employee retention. The common drawbacks to automation include complexity, cost, creating single points of failure, incurring technical debt, and creating challenges to ongoing supportability."},
  {c: 5, q: "Frank is investigating a security incident where the attacker entered a very long string into an input field, which was followed by a system command. What type of attack likely took place?", o: ["Cross-site request forgery", "Server-side request forgery", "Command injection", "Buffer overflow"], a: 3, exp: "Buffer overflow attacks occur when an attacker manipulates a program into placing more data into an area of memory than is allocated for that program's use. The goal is to overwrite other information in memory with instructions that may be executed by a different process running on the system."},
  {c: 5, q: "What type of attack places an attacker in the position to eavesdrop on communications between a user and a web server?", o: ["On-path attack", "Session hijacking", "Buffer overflow", "Meet-in-the-middle"], a: 0, exp: "In an on-path attack, the attacker fools the user into thinking that the attacker is actually the target website and presenting a fake authentication form. They may then authenticate to the website on the user's behalf and obtain the cookie. This is slightly different from a session hijacking attack, where the attacker steals the cookie associated with an active session."},
  {c: 5, q: "Tom is a software developer who creates code for sale to the public. He would like to assure his users that the code they receive actually came from him. What technique can he use to best provide this assurance?", o: ["Code signing", "Code endorsement", "Code encryption", "Code obfuscation"], a: 0, exp: "Code signing provides developers with a way to confirm the authenticity of their code to end users. Developers use a cryptographic function to digitally sign their code with their own private key, and then browsers can use the developer's public key to verify that signature and ensure that the code is legitimate and was not modified by unauthorized individuals."},
  {c: 5, q: "Chris is reviewing evidence of a cross-site scripting attack where the attacker embedded JavaScript in a URL that a user clicked. The web page then sent the JavaScript to the user in the displayed page. What term best describes this attack?", o: ["Reflected XSS", "Stored XSS", "Persistent XSS", "DOM-based XSS"], a: 0, exp: "This is an example of a reflected attack because the script code is contained within the URL. A persistent or stored attack places the content on a web page or other location where a victim may later access it. DOM-based XSS attacks hide the attack code within the Document Object Model."},
  {c: 5, q: "What type of attack was most likely attempted?", o: ["Cross-site scripting", "Session hijacking", "Parameter pollution", "On-path"], a: 2, exp: "This query string is indicative of a parameter pollution attack. In this case, it appears that the attacker was waging a SQL injection attack and tried to use parameter pollution to slip the attack past content filtering technology. The two instances of the serviceID parameter in the query string indicate a parameter pollution attempt."},
  {c: 5, q: "What type of vulnerability was the attacker likely trying to exploit?", o: ["Insecure direct object reference", "File upload", "Unvalidated redirect", "Session hijacking"], a: 0, exp: "The series of thousands of requests incrementing a variable indicate that the attacker was most likely attempting to exploit an insecure direct object reference vulnerability."},
  {c: 5, q: "What type of attack was most likely attempted?", o: ["SQL injection", "Session hijacking", "Directory traversal", "File upload"], a: 2, exp: "In this case, the .. operators are the telltale giveaway that the attacker was attempting to conduct a directory traversal attack. This particular attack sought to break out of the web server's root directory and access the /etc/passwd file on the server."},
  {c: 5, q: "Wendy is a penetration tester who wishes to engage in a session hijacking attack. What information is crucial for Wendy to obtain if her attack will be successful?", o: ["Session ticket", "Session cookie", "Username", "User password"], a: 1, exp: "Websites use HTTP cookies to maintain sessions over time. If Wendy is able to obtain a copy of the user's session cookie, she can use that cookie to impersonate the user's browser and hijack the authenticated session."},
  {c: 5, q: "Joe is examining the logs for his web server and discovers that a user sent input to a web application that contained the string WAITFOR. What type of attack was the user likely attempting?", o: ["Timing-based SQL injection", "HTML injection", "Cross-site scripting", "Content-based SQL injection"], a: 0, exp: "The use of the SQL WAITFOR command is a signature characteristic of a timing-based SQL injection attack."},
  {c: 6, q: "Mike is sending David an encrypted message using a symmetric encryption algorithm. What key should he use to encrypt the message?", o: ["Mike's public key", "Mike's private key", "David's public key", "Shared secret key"], a: 3, exp: "In symmetric encryption algorithms, both the sender and the receiver use a shared secret key to encrypt and decrypt the message, respectively.", card: 1},
  {c: 6, q: "Shahla recently discovered an attack where the attacker managed to force a network user to use weak encryption and was then able to decrypt that content. What term best describes this attack?", o: ["Downgrade", "Collision", "Homomorphic encryption", "Birthday attack"], a: 0, exp: "Downgrade attacks try to remove or lower the strength of encryption to allow the decryption of sensitive information. Birthday attacks find collisions where two different inputs produce the same hash value output, but there is no discussion of that in this scenario. Homomorphic encryption is not an attack but a technology that protects privacy by encrypting data in a way that preserves the ability to perform computation on that data.", card: 2},
  {c: 6, q: "Norm is using full-disk encryption technology to protect the contents of laptops against theft. What goal of cryptography is he attempting to achieve?", o: ["Integrity", "Non-repudiation", "Authentication", "Confidentiality"], a: 3, exp: "Norm's actions are designed to protect against the unauthorized disclosure of sensitive information. This is a clear example of protecting confidentiality.", card: 1},
  {c: 6, q: "Brian discovers that a user suspected of stealing sensitive information is posting many image files to a message board. What technique might the individual be using to hide sensitive information in those images?", o: ["Steganography", "Homomorphic encryption", "Replay attack", "Birthday attack"], a: 0, exp: "Steganography is the art of using cryptographic techniques to embed secret messages within another file.", card: 1},
  {c: 6, q: "Which one of the following statements about cryptographic keys is incorrect?", o: ["All cryptographic keys should be kept secret.", "Longer keys are better than shorter keys when the same algorithm is used.", "Asymmetric algorithms generally use longer keys than symmetric algorithms.", "Digital certificates are designed to share public keys."], a: 0, exp: "All of these statements are correct except for the statement that all cryptographic keys should be kept secret. The exception to this rule are public keys used in asymmetric cryptography. These keys should be freely shared.", card: 1},
  {c: 6, q: "What type of cipher operates on one character of text at a time?", o: ["Block cipher", "Bit cipher", "Stream cipher", "Balanced cipher"], a: 2, exp: "Stream ciphers operate on one character or bit of a message (or data stream) at a time. Block ciphers operate on “chunks,” or blocks, of a message and apply the encryption algorithm to an entire message block at the same time.", card: 1},
  {c: 6, q: "Vince is choosing a symmetric encryption algorithm for use in his organization. He would like to choose the strongest algorithm from these choices. What algorithm should he choose?", o: ["DES", "3DES", "RSA", "AES"], a: 3, exp: "AES is the successor to 3DES and DES and is the best choice for a symmetric encryption algorithm. RSA is a secure algorithm, but it is asymmetric rather than symmetric.", card: 1},
  {c: 6, q: "Kevin is configuring a web server to use digital certificates. What technology can he use to allow clients to quickly verify the status of those certificates without contacting a remote server?", o: ["CRL", "OCSP", "Certificate stapling", "Certificate pinning"], a: 2, exp: "The Online Certificate Status Protocol (OCSP) provides real-time checking of a digital certificate's status using a remote server. Certificate stapling attaches a current OCSP response to the certificate to allow the client to validate the certificate without contacting the OCSP server. Certificate revocation lists (CRLs) are a slower, outdated approach to managing certificate status. Certificate pinning is used to provide an expected key, not to manage certificate status.", card: 3},
  {c: 6, q: "Acme Widgets has 10 employees and they all need the ability to communicate with one another using a symmetric encryption system. The system should allow any two employees to securely communicate without other employees eavesdropping. If an 11th employee is added to the organization, how many new keys must be added to the system?", o: ["1", "2", "10", "11"], a: 2, exp: "When the 11th employee joins Acme Widgets, they will need a shared secret key with every existing employee. There are 10 existing employees, so 10 new keys are required.", card: 1},
  {c: 6, q: "Referring to the scenario in question 9, if Acme Widgets switched to an asymmetric encryption algorithm, how many keys would be required to add the 11th employee?", o: ["1", "2", "10", "11"], a: 1, exp: "In an asymmetric encryption algorithm, each employee needs only two keys: a public key and a private key. Adding a new user to the system requires the addition of these two keys for that user, regardless of how many other users exist.", card: 1},
  {c: 6, q: "What type of digital certificate provides the greatest level of assurance that the certificate owner is who they claim to be?", o: ["DV", "OV", "UV", "EV"], a: 3, exp: "Extended validation (EV) certificates provide the highest available level of assurance. The CA issuing an EV certificate certifies that they have verified the identity and authenticity of the certificate subject.", card: 3},
  {c: 6, q: "Glenn recently obtained a wildcard certificate for *.mydomain.com. Which one of the following domains would not be covered by this certificate?", o: ["mydomain.com", "core.mydomain.com", "dev. www.mydomain.com", "mail.mydomain.com"], a: 2, exp: "Wildcard certificates protect the listed domain as well as all first-level subdomains. dev.www.mydomain.com is a second-level subdomain of mydomain.com and would not be covered by this certificate.", card: 3},
  {c: 6, q: "Which one of the following servers is almost always an offline CA in a large PKI deployment?", o: ["Root CA", "Intermediate CA", "RA", "Internal CA"], a: 0, exp: "Root CAs are highly protected and not normally used for certificate issuance. A root CA is usually run as an offline CA that delegates authority to intermediate CAs that run as online CAs.", card: 3},
  {c: 6, q: "Which one of the following certificate formats is closely associated with Windows binary certificate files?", o: ["DER", "PEM", "PFX", "P7B"], a: 2, exp: "The PFX format is most closely associated with Windows systems that store certificates in binary format, whereas the P7B format is used for Windows systems storing files in text format.", card: 3},
  {c: 6, q: "What type of security solution provides a hardware platform for the storage and management of encryption keys?", o: ["HSM", "IPS", "SIEM", "SOAR"], a: 0, exp: "Hardware security modules (HSMs) provide an effective way to manage encryption keys. These hardware devices store and manage encryption keys in a secure manner that prevents humans from ever needing to work directly with the keys.", card: 1},
  {c: 6, q: "What type of cryptographic attack attempts to force a user to reduce the level of encryption that they use to communicate with a remote server?", o: ["Birthday", "Frequency", "Downgrade", "Collision"], a: 2, exp: "A downgrade attack is sometimes used against secure communications such as TLS in an attempt to get the user or system to inadvertently shift to less secure cryptographic modes. The idea is to trick the user into shifting to a less secure version of the protocol, one that might be easier to break.", card: 3},
  {c: 6, q: "David would like to send Mike a message using an asymmetric encryption algorithm. What key should he use to encrypt the message?", o: ["David's public key", "David's private key", "Mike's public key", "Mike's private key"], a: 2, exp: "When encrypting a message using an asymmetric encryption algorithm, the person performing the encryption does so using the recipient's public key.", card: 1},
  {c: 6, q: "When Mike receives the message that David encrypted for him, what key should he use to decrypt the message?", o: ["David's public key", "David's private key", "Mike's public key", "Mike's private key"], a: 3, exp: "In an asymmetric encryption algorithm, the recipient of a message uses their own private key to decrypt messages that they receive.", card: 1},
  {c: 6, q: "If David wishes to digitally sign the message that he is sending Mike, what key would he use to create the digital signature?", o: ["David's public key", "David's private key", "Mike's public key", "Mike's private key"], a: 1, exp: "The sender of a message may digitally sign the message by encrypting a message digest with the sender's own private key.", card: 1},
  {c: 6, q: "When Mike receives the digitally signed message from David, what key should he use to verify the digital signature?", o: ["David's public key", "David's private key", "Mike's public key", "Mike's private key"], a: 0, exp: "The recipient of a digitally signed message may verify the digital signature by decrypting it with the public key of the individual who signed the message.", card: 1},
  {c: 7, q: "Angela has chosen to federate with other organizations to allow use of services that each organization provides. What role does Angela's organization play when they authenticate their users and assert that those users are valid to other members of the federation?", o: ["Service provider", "Relying party", "Authentication provider", "Identity provider"], a: 3, exp: "Angela's organization is acting as an identity provider (IdP). Other members of the federation may act as a service provider or relying party when they allow her users to access their services. Authentication provider is not a named role in typical federation activities.", card: 1},
  {c: 7, q: "Which of the following technologies is the least effective means of preventing shared accounts?", o: ["Password complexity requirements", "Requiring biometric authentication", "Requiring one-time passwords via a token", "Requiring a one-time password via an application"], a: 0, exp: "Password complexity requirements do not prevent sharing of complex passwords, making it the least effective option from the list. Biometric authentication measures will require the enrolled user to be there, although in some cases such as fingerprint systems, multiple users could each enroll a valid fingerprint for a single account. Both types of one-time passwords could be shared but make it harder and less convenient to share accounts.", card: 1},
  {c: 7, q: "What major difference is likely to exist between on-premises identity services and those used in a cloud-hosted environment?", o: ["A.Account policy control will be set to the cloud provider's standards.", "B.The cloud service will provide account and identity management services.", "C.Multifactor authentication will not be supported by the cloud vendor.", "D.None of the above."], a: 1, exp: "Most cloud services provide identity and authorization tools for their services. Most, although not all, allow customers to set some or even many of the account policies they will use, and most major vendors support some form of multifactor capability.", card: 1},
  {c: 7, q: "Amitoj wants to ensure that her organization's password policy does not allow users to reset their password multiple times until they can reuse their current password. What setting is used to prevent this?", o: ["Complexity", "Length", "Expiration", "Age"], a: 3, exp: "Password age is set to prevent users from resetting their password enough times to bypass reuse settings. Complexity, length, and expiration do not influence this.", card: 3},
  {c: 7, q: "Which type of multifactor authentication is considered the least secure?", o: ["HOTP", "SMS", "TOTP", "Biometric"], a: 1, exp: "SMS messages are not secure and could be accessed by cloning a SIM card or redirecting VoIP traffic, among other possible threat models. Both HOTP and TOTP tokens and applications as well as biometric factors are generally considered more secure than an SMS-based factor.", card: 1},
  {c: 7, q: "Geeta has been issued a USB security key as part of her organization's multifactor implementation. What type of implementation is this?", o: ["A hard token", "A biometric token", "A soft token", "An attestation token"], a: 0, exp: "A USB security key is an example of a hard, or physical, token. An application is an example of a soft token. A biometric factor might be a fingerprint or faceprint. Attestation is a formal verification that something is true. Attestation tokens were made up for this question.", card: 1},
  {c: 7, q: "Michelle enables the Windows picture password feature to control logins for her laptop. Which type of attribute will it provide?", o: ["Somewhere you are", "Something you know", "Something you are", "Someone you know"], a: 1, exp: "Picture password asks users to click on specific, self-defined parts of a picture. This means that clicking on those points is something you know. Something you are involves biometric traits, and somewhere you are relies on geographic locations.", card: 3},
  {c: 7, q: "What purpose would Linux file permissions set to rw-r\u2014r-- serve?", o: ["To allow the owner to read and write the file, and for the owner's group and others to be able to read it", "To allow all users to read and write the file, and for the group and owner to be able to read it", "To allow system administrators to read and write the file, and for users and all others to be able to read it", "To prevent reading and writing for all users, and to prevent reading by groups and a specific user"], a: 0, exp: "Linux file permissions are read left to right, with the first three characters indicating read, write, and execute permissions (rwx) for the owner of the file, the second three apply to the group, and the last three to all other users. Any indicated with a – are not allowed for that set.", card: 1},
  {c: 7, q: "Theresa wants to implement an access control scheme that sets permissions based on what the individual's job requires. Which of the following schemes is most suited to this type of implementation?", o: ["ABAC", "DAC", "RBAC", "MAC"], a: 2, exp: "Role-based access control (RBAC) sets permissions based on an individual's role, which is typically associated with their job. Attribute-based access control (ABAC) is typically matched to other attributes than the job role. Discretionary access control (DAC) and mandatory access control (MAC) are commonly implemented at the operating system level.", card: 1},
  {c: 7, q: "Which of the following biometric technologies is most broadly deployed due to its ease of use and acceptance from end users?", o: ["Voice print recognition", "Gait recognition", "Retina scanners", "Fingerprint scanner"], a: 3, exp: "Fingerprint scanners are found on many mobile devices and laptops, making them one of the most broadly deployed biometric technologies. Facial recognition is also broadly deployed, but it is not mentioned in this question or offered as an option.", card: 3},
  {c: 7, q: "Adam want to increase his organization's passwords resistance to attacks in the event that the password hash database is stolen by attackers. Which of the following password security settings has the largest impact on password cracking if his organization's current passwords are 8 characters long?", o: ["Password complexity", "Password length", "Password reuse limitations", "Preventing the use of common words in passwords"], a: 1, exp: "Password length has the largest impact on preventing password cracking. When paired with a strong password hash algorithm and proper use of technology like salting, long passwords are much harder to crack. Complexity is the next most important option, as preventing simple repeated characters and similar problematic passwords helps reduce the probability of easily cracked passwords being used. Reuse limitations and preventing common words are less useful.", card: 3},
  {c: 7, q: "A PIN is an example of what type of factor?", o: ["Something you know", "Something you are", "Something you have", "Something you set"], a: 0, exp: "PINs and passwords are both examples of something you know. Something you set is not a type of factor. Biometric factors are an example of something you are, and a physical USB token would be a common example of something you have.", card: 1},
  {c: 7, q: "Marie is implementing a PAM solution and wants to ensure that root passwords are available in the event of an outage. Which PAM-related tool is most likely to be useful in this situation?", o: ["Ephemeral accounts", "Just-in-time permissions", "Password vaulting", "Token-based authentication"], a: 2, exp: "Password vaulting, which stores passwords for use with proper authentication and rights, is the most appropriate solution for Marie's needs. Ephemeral accounts and just-in-time permissions are typically used under normal circumstances to provide least privilege access as needed. Token-based authentication is not specifically a PAM solution.", card: 3},
  {c: 7, q: "Jill sets her files on a Windows file share to allow Fred to access the files. What type of access control system is she using?", o: ["Mandatory access control", "Rule-based access control", "Attribute-based access control", "Discretionary access control"], a: 3, exp: "Jill is able to make decisions about the rights she grants on her files, meaning this is a discretionary access control system. A mandatory access control system relies on labels to set access control rules. Rule-based access control systems rely on rules to define access, and attribute-based access control systems grant access based on attributes like job roles or locations.", card: 1},
  {c: 7, q: "Lisa sets up an account on a website that allows her to log in with Google. When she logs in, Google provides an access token to the website that confirms that she is who she says she is but doesn't provide the site with her password. Which of the following technologies has she used?", o: ["LDAP", "OAuth", "MITRE", "RADIUS"], a: 1, exp: "OAuth is an authentication protocol that allows services to receive authentication tokens from an identity provider without needing the user's password. LDAP is a directory service and is often used as part of SSO processes. MITRE is a nonprofit organization, and RADIUS is an authentication technology.", card: 3},
  {c: 7, q: "Kyle has been asked to provide his government-issued ID as part of the creation of his user account. What process should he assume it is being used for?", o: ["Biometric enrollment", "Just-in-time permission creation", "Identity proofing", "Federation"], a: 2, exp: "Kyle can assume that his government-issued ID is being used as part of an identity proofing process to validate that he is who he claims to be. Biometric enrollment typically requires interaction with an enrollment process to scan or capture biometric information. Just-in-time permission creation is done when access is requested and does not require government ID, and federation connects identity providers with service providers, which is not described here.", card: 1},
  {c: 7, q: "What key concept below best describes only providing the permissions necessary to perform a role?", o: ["Least privilege", "Best practice", "Ephemeral accounts", "Mandatory access control"], a: 0, exp: "The principle of least privilege means that users should only be given the permissions necessary to perform their role. Best practice is a general term describing commonly recommended and accepted industry practices. Temporal accounts are ephemeral, or short-lived accounts. Mandatory access control is an access control scheme.", card: 1},
  {c: 7, q: "Nina has recently left her organization. What should the organization do with her account?", o: ["Transfer it to her replacement.", "Reprovision it for another user.", "Deprovision her account.", "Change the password and preserve the account."], a: 2, exp: "Without other factors that would require the account to be retained, deprovisioning accounts that belonged to users who have left the organization is a best practice. Transferring accounts or reprovisioning them may expose data to new users or provide them with rights that they should not have.", card: 1},
  {c: 7, q: "A person's name, age, location, or job title are all examples of what?", o: ["Biometric factors", "Identity factors", "Attributes", "Account permissions"], a: 2, exp: "A person's name, age, location, job title, and even things like their height or their hair color are all attributes that may be associated with a person's identity. None of these describe biometric factors used for authentication, and identity factors are something you are, something you have, or somewhere you are. Account permissions determine what you can do, not attributes like these.", card: 1},
  {c: 7, q: "What type of access control scheme best describes the Linux filesystem?", o: ["MAC", "RBAC", "DAC", "ABAC"], a: 2, exp: "Linux users can change who can read, write, or execute files and directories they own, which is discretionary access control (DAC). Mandatory access control (MAC) would enforce settings set by the systems administrator without users having the rights to make their own decisions. While role-based access control is involved, DAC best describes the access control scheme. ABAC is not a default method for setting rights for the Linux filesystem.", card: 1},
  {c: 8, q: "Naomi wants to handle increasing load by scaling cloud-hosted resources as needed while having the change remain transparent to users. She also wants to allow for upgrades and system replacements transparently. What solution should she select?", o: ["Load balancing", "Clustering", "Geographic diversity", "A hot site"], a: 0, exp: "Naomi should select a load balancing solution. Load balancers allow multiple systems or services to appear like a single resource and can take systems out of the load-balanced pool to allow for upgrades or changes in resources required. Clustering is used to allow groups of computers to perform the same task, but without a load balancer cannot provide the same transparent service appearing as the same system. Geographic diversity and hot sites are concepts used to provide resilience but don't provide this capability."},
  {c: 8, q: "Rick performs a backup that captures the changes since the last full backup. What type of backup has he performed?", o: ["A new full backup", "A snapshot", "An incremental backup", "A differential backup"], a: 3, exp: "Differential backups back up the changes since the last full backup. Incremental backups back up changes since the last backup, and snapshots are a live copy of a system. This is not a full backup, because it is capturing changes since a full backup."},
  {c: 8, q: "What type of recovery site has some or most systems in place but does not have the data needed to take over operations?", o: ["A hot site", "A warm site", "A cloud site", "A cold site"], a: 1, exp: "Warm sites have systems, connectivity, and power but do not have the live or current data to immediately take over operations. A hot site can immediately take over operations, whereas a cold site has space and power, and likely connectivity, but will require that systems and data be put in place to be used. Cloud sites are not one of the three common types of recovery sites."},
  {c: 8, q: "Ben wants to test his warm site to verify that it will take over operations successfully. What type of testing is this?", o: ["Parallel processing", "Simulation", "Failover", "A tabletop exercise"], a: 2, exp: "Testing that involves an actual failover to another site or service is failover testing. Parallel processing runs both sites or services at the same time; simulation and tabletops both review what would happen without making the actual change."},
  {c: 8, q: "Felix wants to clone a virtual machine. What should he do to capture a live machine, including the machine state?", o: ["A full backup", "A snapshot", "A differential backup", "Live boot media"], a: 1, exp: "Virtual machine snapshots capture the machine state at a point in time and will allow Felix to clone the system. A full backup and a differential backup can be used to capture the disk for the machine but typically will not capture the memory state and other details of the system state. Live boot media allows you to boot and run a nonpersistent system from trusted media."},
  {c: 8, q: "Sally is working to restore her organization's operations after a disaster took her datacenter offline. What critical document should she refer to as she restarts systems?", o: ["The restoration order documentation", "The TOTP documentation", "The HOTP documentation", "The last-known good configuration documentation"], a: 0, exp: "A documented restoration order helps ensure that systems and services that have dependencies start in the right order and that high-priority or mission-critical services are restored first. TOTP and HOTP are types of one-time password technology, and last-known good configurations are often preserved with a snapshot or other technology that can allow a system to return to a known good status after an issue such as a bad patch or configuration change."},
  {c: 8, q: "Mike wants to stop vehicles from traveling toward the entrance of his building. What physical security control should he implement?", o: ["An air gap", "A hot aisle", "A robotic sentry", "A bollard"], a: 3, exp: "Bollards are physical security controls that prevent vehicles from accessing or ramming doors or other areas. They may look like pillars, planters, or other innocuous objects. An air gap is a physical separation of technology environments; a hot aisle is the aisle where systems in a datacenter exhaust warm air; and unlike in movies, robotic sentries are not commonly deployed and aren't ready to stop vehicles in most current circumstances."},
  {c: 8, q: "Alecia wants to ensure that her backups cannot be accessed by third parties while stored in an offsite storage location. What should she do to secure her backups?", o: ["Hash the backup data.", "Avoid the use of offsite storage locations.", "Employ security guards.", "Encrypt the backup data."], a: 3, exp: "Encryption is commonly used to ensure that backup media or data that is exposed is not accessible to third parties. This does mean that Alecia must carefully secure the encryption keys for the backup. Hashing that data would not keep it secure, and if only hashes were stored the data would be unrecoverable. Security guards are expensive and not a complete solution if data is inadvertently exposed, and offsite, secure storage locations are a useful and common solution for organizations that want to have remote backups."},
  {c: 8, q: "Fred wants to be able to recover his database transactions at any point in time if a physical disaster occurs involving his datacenter. His organization uses daily backups. What additional solution should he select to support this need?", o: ["Onsite journaling", "Onsite snapshots", "Offsite journaling", "Offsite snapshots"], a: 2, exp: "Offsite journaling will allow transactions to be recorded and to remain available if a significant event occurred that involved his datacenter. Snapshots are useful at a point in time but do not retain a transaction log between snapshots."},
  {c: 8, q: "Ellen is concerned about her company's resilience and wants to ensure it can handle either changing loads or support disaster recovery and business continuity efforts if a primary location or datacenter were taken offline. Which of the following should she primarily focus on during her capacity planning?", o: ["People, technology, and infrastructure", "A generator and a UPS", "RAID 0, 1, 5, and 10", "Incremental, differential, and full backups"], a: 0, exp: "Resilience requires capacity planning to ensure that capacity—including staff, technology, and infrastructure—is available when is needed. Although a generator, UPS, various RAID levels, and backups have their place in disaster recovery and contingency planning, they are not the primary focus of resiliency and capacity planning."},
  {c: 8, q: "Madhuri has deployed a replication tool that copies data over to a secondary hot site in real time. What type of replication has she deployed?", o: ["Synchronous replication", "Journaled replication", "Asynchronous replication", "Snapshot-based replication"], a: 0, exp: "Synchronous replication occurs in real time, whereas asynchronous replication occurs after the fact but more regularly than a backup. Journaled and snapshot-based replication are not specific types of replication."},
  {c: 8, q: "What factor is a major reason organizations do not use security guards?", o: ["Reliability", "Training", "Cost", "Social engineering"], a: 2, exp: "Security guards can be one of the costliest physical security controls over time, making the cost of guards one of the most important deciding factors guiding when and where they will be employed. Reliability, training, and the potential for social engineering are all possible issues with security guards, but none of these is the major driver in the decision process."},
  {c: 8, q: "Megan wants to deploy a sensor that is inexpensive, yet will allow her to detect humans entering and moving in a secured room. Which of the following should she select?", o: ["An infrared sensor", "A microwave sensor", "An ultrasonic sensor", "A pressure sensor"], a: 0, exp: "Infrared sensors balance lower cost with the ability to detect humans entering and moving in a space. Microwave sensors are more expensive but can provide better coverage, including traveling through some barriers. Ultrasonic sensors are rarely used for this purpose, and pressure sensors are limited to the pad where they are deployed, making them expensive and challenging to use for rooms or larger spaces."},
  {c: 8, q: "Kathleen wants to discourage potential attackers from entering the facility she is responsible for. Which of the following is not a common control used for this type of preventive defense?", o: ["Fences", "Lighting", "Platform diversity", "Video surveillance"], a: 2, exp: "Fences, lighting, and video surveillance can all help discourage potential malicious actors from entering an area, although a determined adversary will ignore or bypass all three. Platform diversity can help make it harder for attackers to succeed, but this is primarily a resilience tactic, and remains more costly to maintain and implement."},
  {c: 8, q: "How does technology diversity help ensure cybersecurity resilience?", o: ["It ensures that a vulnerability in a single company's product will not impact the entire infrastructure.", "If a single vendor goes out of business, the company does not need to replace its entire infrastructure.", "It means that a misconfiguration will not impact the company's entire infrastructure.", "All of the above."], a: 3, exp: "Technology diversity helps ensure that a single failure—due to a vendor, vulnerability, or misconfiguration—will not impact an entire organization. Technology diversity does have additional costs, including training, patch management, and configuration management."},
  {c: 8, q: "Scott sends his backups to a company that keeps them in a secure vault. What type of backup solution has he implemented?", o: ["Nearline", "Safe", "Onsite", "Offsite"], a: 3, exp: "Scott has implemented an offsite backup scheme. His backups will take longer to retrieve because they are at a remote facility and will have to be sent back to him, but they are likely to survive any disaster that occurs in his facility or datacenter. Onsite backups are kept immediately accessible, whereas nearline backups can be retrieved somewhat more slowly than online backups but faster than offline backups. “Safe backups” is not an industry term."},
  {c: 8, q: "Gabby wants to detect physical brute-force attempts against her organization. What solution is best suited to this?", o: ["Security guards", "Locks", "Access badges", "An intrusion detection system (IDS)"], a: 0, exp: "Security guards who can monitor for and understand the signs of a physical brute-force attempt are the most useful control listed. Locks may show signs of attempts but require careful inspection, access badges would require log review and additional information to detect brute-force attacks, and an IDS is useful for network attacks."},
  {c: 8, q: "Florian wants to test his high-availability designs but does not want to interrupt his organization's normal work. Which of the following is the least disruptive testing scenario?", o: ["A failover exercise", "A tabletop exercise", "A partial failover exercise", "A simulation"], a: 1, exp: "A tabletop exercise is the least disruptive form of exercise. Even simulations have some risk if an employee does not fully realize that the scenario is simulated and takes action. Failover, even partial, involves the potential for disruption."},
  {c: 8, q: "What type of physical security control is shown here?", o: ["A Faraday cage", "An access control vestibule", "A bollard", "An air gap"], a: 1, exp: "An access control vestibule uses a pair of doors. When an individual enters, the first door must be closed and secured before the second door can be opened. This helps prevent tailgating, since the person entering will notice anybody following them through the secured area. A Faraday cage is used to stop electromagnetic interference (EMI), a bollard prevents vehicular traffic, and an air gap is a physical separation of networks or devices."},
  {c: 8, q: "Gurvinder identifies a third-party datacenter provider over 90 miles away to run his redundant datacenter operations. Why has he placed the datacenter that far away?", o: ["Because it is required by law", "Network traffic latency concerns", "Geographic dispersion", "Geographic tax reasons"], a: 2, exp: "Geographic dispersion helps ensure that a single natural or human-made disaster does not disable multiple facilities. This distance is not required by law; latency increases with distance; and though there may be tax reasons in some cases, this is not a typical concern for a security professional."},
  {c: 9, q: "Kevin discovered that his web server was being overwhelmed by traffic, causing a CPU bottleneck. Using the interface offered by his cloud service provider, he added another CPU to the server. What term best describes Kevin's action?", o: ["Elasticity", "Horizontal scaling", "Vertical scaling", "High availability"], a: 2, exp: "This is an example of adding additional capacity to an existing server, which is also known as vertical scaling. Kevin could also have used horizontal scaling by adding additional web servers. Elasticity involves the ability to both add and remove capacity on demand, and though it does describe this scenario, it's not as good a description as vertical scaling. There is no mention of increasing the server's availability."},
  {c: 9, q: "Fran's organization uses a Type I hypervisor to implement an IaaS offering that it sells to customers. Which one of the following security controls is least applicable to this environment?", o: ["Customers must maintain security patches on guest operating systems.", "The provider must maintain security patches on the hypervisor.", "The provider must maintain security patches on the host operating system.", "Customers must manage security groups to mediate network access to guest operating systems."], a: 2, exp: "Type I hypervisors, also known as bare-metal hypervisors, run directly on top of the physical hardware and, therefore, do not require a host operating system."},
  {c: 9, q: "In what cloud security model does the cloud service provider bear the most responsibility for implementing security controls?", o: ["IaaS", "FaaS", "PaaS", "SaaS"], a: 3, exp: "The cloud service provider bears the most responsibility for implementing security controls in an SaaS environment and the least responsibility in an IaaS environment. This is due to the division of responsibilities under the cloud computing shared responsibility model."},
  {c: 9, q: "Greg would like to find a reference document that describes how to map cloud security controls to different regulatory standards. What document would best assist with this task?", o: ["CSA CCM", "NIST SP 500-292", "ISO 27001", "PCI DSS"], a: 0, exp: "The Cloud Security Alliance (CSA) Cloud Controls Matrix (CCM) is a reference document designed to help organizations understand the appropriate use of cloud security controls and map those controls to various regulatory standards. NIST SP 500-292 is a reference model for cloud computing and operates at a high level. ISO 27001 is a general standard for cybersecurity, and PCI DSS is a regulatory requirement for organizations involved in processing credit card transactions."},
  {c: 9, q: "Wanda is responsible for a series of seismic sensors placed at remote locations. These sensors have low-bandwidth connections, and she would like to place computing power on the sensors to allow them to preprocess data before it is sent back to the cloud. What term best describes this approach?", o: ["Edge computing", "Client-server computing", "Fog computing", "Thin client computing"], a: 0, exp: "This approach may be described as client-server computing, but that is a general term that describes many different operating environments. The better term to use here is edge computing, which involves placing compute power at the client to allow it to perform preprocessing before sending data back to the cloud. Fog computing is a related concept that uses IoT gateway devices that are located in close physical proximity to the sensors."},
  {c: 9, q: "Which one of the following statements about cloud computing is incorrect?", o: ["Cloud computing offers ubiquitous, convenient access.", "Cloud computing customers store data on hardware that is shared with other customers.", "Cloud computing customers provision resources through the service provider's sales team.", "Cloud computing resources are accessed over a network."], a: 2, exp: "One of the key characteristics of cloud computing is that customers can access resources on-demand with minimal service provider interaction. Cloud customers do not need to contact a sales representative each time they wish to provision a resource but can normally do so on a self-service basis."},
  {c: 9, q: "Helen designed a new payroll system that she offers to her customers. She hosts the payroll system in AWS and her customers access it through the web. What tier of cloud computing best describes Helen's service?", o: ["PaaS", "SaaS", "FaaS", "IaaS"], a: 1, exp: "Helen is using IaaS services to create her payroll product. She is then offering that payroll service to her customers as a SaaS solution."},
  {c: 9, q: "Which cloud computing deployment model requires the use of a unifying technology platform to tie together components from different providers?", o: ["Public cloud", "Private cloud", "Community cloud", "Hybrid cloud"], a: 3, exp: "Hybrid cloud environments blend elements of public, private, and/or community cloud solutions. A hybrid cloud requires the use of technology that unifies the different cloud offerings into a single, coherent platform."},
  {c: 9, q: "Which one of the following would not commonly be available as an IaaS service offering?", o: ["CRM", "Storage", "Networking", "Computing"], a: 0, exp: "Customer relationship management (CRM) packages offered in the cloud would be classified as software-as-a-service (SaaS), since they are not infrastructure components. Storage, networking, and computing resources are all common IaaS offerings."},
  {c: 9, q: "Which one of the following is not an example of infrastructure as code?", o: ["Defining infrastructure in JSON", "Writing code to interact with a cloud provider's API", "Using a cloud provider's web interface to provision resources", "Defining infrastructure in YAML"], a: 2, exp: "Infrastructure as code (IaC) is any approach that automates the provisioning, management, and deprovisioning of cloud resources. Defining resources through JSON or YAML is IaC, as is writing code that interacts with an API. Provisioning resources through a web interface is manual, not automated, and therefore does not qualify as IaC."},
  {c: 9, q: "Brian is selecting a CASB for his organization, and he would like to use an approach that interacts with the cloud provider directly. Which CASB approach is most appropriate for his needs?", o: ["Inline CASB", "Outsider CASB", "Comprehensive CASB", "API-based CASB"], a: 3, exp: "API-based CASB solutions interact directly with the cloud provider through the provider's API. Inline CASB solutions intercept requests between the user and the provider. Outsider and comprehensive are not categories of CASB solutions."},
  {c: 9, q: "In which of the following cloud categories are customers typically charged based on the number of virtual server instances dedicated to their use?", o: ["IaaS only", "SaaS only", "IaaS and PaaS", "IaaS, SaaS, and PaaS"], a: 2, exp: "Customers are typically charged for server instances in both IaaS environments, where they directly provision those instances, and PaaS environments, where they request the number of servers needed to support their applications. In an SaaS environment, the customer typically has no knowledge of the number of server instances supporting their use."},
  {c: 9, q: "Brian would like to limit the ability of users inside his organization to provision expensive cloud server instances without permission. What type of control would best help him achieve this goal?", o: ["Resource policy", "Security group", "Multifactor authentication", "Secure web gateway"], a: 0, exp: "Cloud providers offer resource policies that customers may use to limit the actions that users of their accounts may take. Implementing resource policies is a good security practice to limit the damage caused by an accidental command, a compromised account, or a malicious insider."},
  {c: 9, q: "Ursula would like to link the networks in her on-premises datacenter with cloud VPCs in a secure manner. What technology would help her best achieve this goal?", o: ["Transit gateway", "HSM", "VPC endpoint", "SWG"], a: 0, exp: "Cloud providers offer VPC endpoints that allow connections of VPCs to each other using the cloud provider’s secure network. Cloud transit gateways extend this model even further, allowing the direct interconnection of cloud VPCs with on-premises VLANs for hybrid cloud operations. Secure web gateways (SWGs) provide a layer of application security for cloud-dependent organizations. Hardware security modules (HSMs) are special-purpose computing devices that manage encryption keys and also perform cryptographic operations in a highly efficient manner."},
  {c: 9, q: "What component of a virtualization platform is primarily responsible for preventing VM escape attacks?", o: ["Administrator", "Guest operating system", "Host operating system", "Hypervisor"], a: 3, exp: "Virtual machine (VM) escape vulnerabilities are the most serious issue that can exist in a virtualized environment, particularly when a virtual host runs systems of differing security levels. In an escape attack, the attacker has access to a single virtual host and then manages to leverage that access to intrude upon the resources assigned to a different virtual machine. The hypervisor is supposed to prevent this type of access by restricting a virtual machine's access to only those resources assigned to that machine."},
  {c: 9, q: "Ryan is selecting a new security control to meet his organization's objectives. He would like to use it in their multicloud environment and would like to minimize the administrative work required from his fellow technologists. What approach would best meet his needs?", o: ["Third-party control", "Internally developed control", "Cloud-native control", "Any of the above"], a: 0, exp: "Controls offered by cloud service providers have the advantage of direct integration with the provider's offerings, often making them cost-effective and user-friendly. Third-party solutions are often more costly, but they bring the advantage of integrating with a variety of cloud providers, facilitating the management of multicloud environments."},
  {c: 9, q: "Kira would like to implement a security control that can implement access restrictions across all of the SaaS solutions used by her organization. What control would best meet her needs?", o: ["Security group", "Resource policy", "CASB", "SWG"], a: 2, exp: "Cloud access security brokers (CASBs) are designed specifically for this situation: enforcing security controls across cloud providers. A secure web gateway (SWG) may be able to achieve Kira's goal, but it would be more difficult to do so. Security groups and resource policies are controls used in IaaS environments."},
  {c: 9, q: "Howard is assessing the legal risks to his organization based on its handling of PII. The organization is based in the United States, handles the data of customers located in Europe, and stores information in Japanese datacenters. What law would be most important to Howard during his assessment?", o: ["Japanese law", "European Union law", "U.S. law", "All should have equal weight."], a: 3, exp: "The principle of data sovereignty states that data is subject to the legal restrictions of any jurisdiction where it is collected, stored, or processed. In this case, Howard needs to assess the laws of all three jurisdictions."},
  {c: 9, q: "Brenda's company provides a managed incident response service to its customers. What term best describes this type of service offering?", o: ["MSP", "PaaS", "SaaS", "MSSP"], a: 3, exp: "Brenda's company is offering a technology service to customers on a managed basis, making it a managed service provider (MSP). However, this service is a security service, so the term managed security service provider (MSSP) is a better description of the situation."},
  {c: 9, q: "Tony purchases virtual machines from Microsoft Azure exclusively for use by his organization. What model of cloud computing is this?", o: ["Public cloud", "Private cloud", "Hybrid cloud", "Community cloud"], a: 0, exp: "This is an example of public cloud computing because Tony is using a public cloud provider, Microsoft Azure. The fact that Tony is limiting access to virtual machines to his own organization is not relevant because the determining factor for the cloud model is whether the underlying infrastructure is shared, not whether virtualized resources are shared."},
  {c: 10, q: "Lin's hardware manufacturer has stopped selling the model of device that Lin's organization uses and has also stopped providing security or other updates. What phase of the hardware life cycle is the device in?", o: ["End-of-life", "Legacy", "End-of-sales", "Senescence"], a: 1, exp: "Legacy hardware is unsupported and no longer sold. End-of-life typically means that the device is no longer being made but is likely to still have support for a period of time. End-of-sales means the device is no longer being sold, but again, may have support for some time. Senescence is not a term typically used in hardware life cycles."},
  {c: 10, q: "Naomi has discovered the following TCP ports open on a system she wants to harden. Which ports are used for unsecure services and thus should be disabled to allow their secure equivalents to continue to be used?", o: ["21, 22, and 80", "21 and 80", "21, 23, and 80", "22 and 443"], a: 2, exp: "The services listed are: 21—FTP 22—SSH 23—Telnet 80—HTTP 443—HTTPS Of these services, SSH (Port 22) and HTTPS (port 443) are secure options for remote shell access and HTTP. Although secure mode FTP (FTP/S) may run on TCP 21, there is not enough information to know for sure, and HTTPS can be used for secure file transfer if necessary. Thus, Naomi's best option is to disable all three likely unsecure protocols: FTP (port 21), Telnet (port 23), and HTTP (port 80)."},
  {c: 10, q: "Frank's organization is preparing to deploy a data loss prevention (DLP) system. What key process should they undertake before they deploy it?", o: ["Define data life cycles for all nonsensitive data.", "Encrypt all sensitive data.", "Implement and use a data classification scheme.", "Tag all data by creator or owner."], a: 2, exp: "Protecting data using a DLP requires data classification so that the DLP knows which data should be protected and what policies to apply to it. Defining data life cycles can help prevent data from being kept longer than it should be and improves data security by limiting the data that needs to be secured, but it isn't necessary as part of a DLP deployment. Encrypting all sensitive data may mean the DLP cannot recognize it and may not be appropriate for how it is used. Tagging all data with a creator or owner can be useful but is not required for a DLP rollout—instead, knowing the classification of the data is more important."},
  {c: 10, q: "Oliver wants to store and manage secrets in his cloud service provider's environment. What type of solution should he look for as part of their offerings?", o: ["A TPM", "A secure enclave", "A KMS", "A Titan M"], a: 2, exp: "Oliver should look for a key management system, or KMS, which will allow him to securely create, store, and manage keys in a cloud environment. TPMs, secure enclaves, and Google's Titan M are all local hardware solutions."},
  {c: 10, q: "What is the key difference between EDR and XDR solutions?", o: ["The variety of malware it can detect", "The number of threat feeds that are used", "The breadth of the technology stack that is covered", "The volume of logs that can be processed"], a: 2, exp: "XDR is similar to EDR but has a broader perspective covering not only endpoints but also cloud services, security platforms, and other components. Thus, the breadth of coverage of the technology stack is broader for XDR solutions."},
  {c: 10, q: "Michelle wants to prevent unauthorized applications from being installed on a Windows system. What type of tool can she use to stop applications from being installed?", o: ["Antivirus", "A GPO", "An EDR", "A HIPS"], a: 1, exp: "A Windows Group Policy Object (GPO) can be used to control whether users are able to install software. Antivirus will not stop this, nor will EDR or a HIPS."},
  {c: 10, q: "What term is used to describe tools focused on detecting and responding to suspicious activities occurring on endpoints like desktops, laptops, and mobile devices?", o: ["EDR", "IAM", "FDE", "ESC"], a: 0, exp: "Endpoint detection and response (EDR) systems provide monitoring, detection, and response capabilities for systems. EDR systems capture data from endpoints and send it to a central repository, where it can be analyzed for issues and indicators of compromise or used for incident response activities. IAM is identity and access management, FDE is full-disk encryption, and ESC is not a commonly used security acronym."},
  {c: 10, q: "Fred has recently purchased a network router and is preparing to deploy it. Which of the following is a common step in deploying new routers?", o: ["Disabling unwanted services", "Removing unnecessary software", "Installing antivirus", "Changing default passwords"], a: 3, exp: "Network devices as well as many other devices like printers come with default passwords set. Fred should change the default password as part of the process of setting up his new router."},
  {c: 10, q: "Charlene wants to prevent attacks against her system that leverage flaws in the services that it provides while still keeping the services accessible. What hardening technique should she use?", o: ["A host-based firewall", "A host-based IPS", "Encryption", "An EDR"], a: 1, exp: "A host-based intrusion prevention system (HIPS) can detect and prevent attacks against services while allowing the service to be accessible. A firewall can only block based on port, protocol, and IP; encryption won't prevent this; and an EDR is primarily targeted at malicious software and activity, not at network-based attacks on services."},
  {c: 10, q: "Allan is preparing to harden his organization's network switches. Which of the following is not a common hardening technique for network devices?", o: ["Removing unnecessary software", "Installing patches", "Administrative VLANs", "Changing default passwords"], a: 0, exp: "Unlike computers and mobile devices, switches and other network devices typically do not have additional software that can be removed. Installing patches, placing administrative interfaces on protected VLANs, and changing default passwords are all common hardening techniques for network devices like switches."},
  {c: 10, q: "Helen's organization is planning to deploy IoT devices across their buildings as part of a HVAC system. Helen knows that the vendor for the IoT devices does not provide regular security updates to the device's web interfaces that are used to manage the devices. What security control should she recommend to help protect the devices on the network?", o: ["Install host-based firewalls.", "Deploy the IoT devices to a protected VLAN.", "Install host-based IPS.", "Disable the web interfaces for the IoT devices."], a: 1, exp: "Since the web interfaces are needed to manage the devices, Helen's best option is to place the IoT devices in a protected VLAN. IoT devices will not typically allow additional software to be installed, meaning that adding firewalls or a HIPS won't work."},
  {c: 10, q: "What is the primary reason to remove unnecessary software during hardening efforts?", o: ["To reduce the attack footprint of the device", "To reduce the number of patches that are installed", "To reduce the number of firewall rules required for the device", "To support incident response (IR) activities"], a: 0, exp: "Removing unnecessary software helps to reduce the attack surface of the devices. Not all software runs a service or opens a network port, but installed software provides additional opportunities for attackers to find vulnerabilities. That means that reducing firewall rules is not a primary purpose. While removing it may reduce the number of patches required by a device, that is not the primary driver. Finally, while incident response efforts may point to a need for further hardening to prevent future incidents, removing unnecessary software is not a typical step in support of IR activities."},
  {c: 10, q: "Brian has deployed a system that monitors sensors and uses that data to manage the power distribution for the power company that he works for. Which of the following terms is commonly used to describe this type of control and monitoring solution?", o: ["SCADA", "SIM", "HVAC", "AVAD"], a: 0, exp: "SCADA (supervisory control and data acquisition) is a system architecture that combines data acquisition and control devices with communications methods and interfaces to oversee complex industrial and manufacturing processes, just like those used in utilities. A SIM (subscriber identity module) is the small card used to identify cell phones; HVAC stands for heating, ventilation, and air-conditioning; and AVAD was made up for this question."},
  {c: 10, q: "The organization that Lynn works for wants to deploy an embedded system that needs to process data as it comes in to the device without processing delays or other interruptions. What type of solution does Lynn's company need to deploy?", o: ["An MFP", "A HIPS", "An SoC", "An RTOS"], a: 3, exp: "A real-time operating system (RTOS) is an OS that is designed to handle data as it is fed to the operating system, rather than delaying handling it as other processes and programs are run. Real-time operating systems are used when processes or procedures are sensitive to delays that might occur if responses do not happen immediately. An MFP is a multifunction printer, a HIPS is a host intrusion prevention system, and an SoC is a system on a chip—which is hardware, which might run an RTOS, but the option does not mention what type of OS the SoC is running."},
  {c: 10, q: "Which of the following is not a common constraint of an embedded system?", o: ["Compute", "Cost", "Network", "Authentication"], a: 1, exp: "Embedded systems are available at many price points. Understanding constraints that limited resources create for embedded systems helps security professionals identify appropriate security controls and options."},
  {c: 10, q: "Jim configures a Windows machine with the built-in BitLocker full-disk encryption tool that uses a TPM chip. When is the machine least vulnerable to having data stolen from it?", o: ["When the machine is off", "When the machine is booted and logged in but is locked", "When the machine is booted and logged in but is unlocked", "When the machine is booted and logged in but is asleep"], a: 0, exp: "Jim knows that once a BitLocker-enabled machine is booted, the drive is unlocked and could be accessed. He would be least worried if the machine were off and was stolen, or if the drive itself were stolen from the machine, since the data would not be accessible in either of those cases."},
  {c: 10, q: "Olivia wants to install a host-based security package that can detect attacks against the system coming from the network, but she does not want to take the risk of blocking the attacks since she fears that she might inadvertently block legitimate traffic. What type of tool could she install that will meet this requirement?", o: ["A host firewall", "A host-based intrusion detection system", "A host-based intrusion prevention system", "A data loss prevention tool"], a: 1, exp: "Olivia should install a host-based intrusion detection system (HIDS). An HIDS can detect and report on potential attacks but does not have the ability to stop them. A host-based intrusion prevention system (HIPS) can be configured to report only on attacks, but it does have the built-in ability to be set up to block them. Firewalls can block known ports, protocols, or applications, but they do not detect attacks—although advanced modern firewalls blur the line between firewalls and other defensive tools. Finally, a data loss prevention (DLP) tool focuses on preventing data exposures, not on stopping network attacks."},
  {c: 10, q: "Anita wants to enforce security settings across her organization's Windows Active Directory domain. What tool can she use to do this?", o: ["EDR", "Group Policy", "XDR", "SELinux"], a: 1, exp: "Group Policy deployed via Active Directory will allow Anita to set security settings across her domain managed systems. EDR and XDR are useful for detecting and responding to malware and malicious actors but not for deploying security configurations. SELinux is a Linux kernel-based security module that provides additional security capabilities and options on top of existing Linux distributions."},
  {c: 10, q: "Chris wants systems that connect to his network to report their boot processes to a server where they can be validated before being permitted to join the network. What technology should he use to do this on the workstations?", o: ["UEFI/Trusted boot", "BIOS/Trusted boot", "UEFI/Measured boot", "BIOS/Measured boot"], a: 2, exp: "Chris knows that BIOS-based systems do not support either of these modes, and that trusted boot validates every component before loading it, whereas measured boot logs the boot process and sends it to a server that can validate it before permitting the system to connect to the network or perform other actions."},
  {c: 10, q: "Elaine wants to securely erase the contents of a tape used for backups in her organization's tape library. What is the fastest secure erase method available to her that will allow the tape to be reused?", o: ["Using a degausser", "Wiping the tape by writing a random pattern of 1s and 0s to it", "Incinerating the tape", "Wiping the tape by writing all 1s or all 0s to it"], a: 0, exp: "A degausser is a quick and effective way to erase a tape before it is reused. Wiping a tape by writing 1s, 0s, or a pattern of 1s and 0s to it will typically be a slow operation and is not a common method of destroying data on a tape. Incinerating the tape won't allow it to be reused!"},
  {c: 11, q: "A system that Tony manages sends an SNMP trap. What type of information should Tony expect to receive?", o: ["Notification of a vulnerability", "Notification of a patch being installed", "Notification of an issue", "Notification of user being created"], a: 2, exp: "SNMP traps can be configured to provide additional information, but typical SNMP traps provide information about issues such as links going down, authentication failures, and reboots."},
  {c: 11, q: "Ben wants to observe malicious behavior targeted at multiple systems on a network. He sets up a variety of systems and instruments to allow him to capture copies of attack tools and to document all the attacks that are conducted. What has he set up?", o: ["A honeypot", "A beartrap", "A honeynet", "A tarpit"], a: 2, exp: "A honeynet is a group of systems that intentionally exposes vulnerabilities so that defenders can observe attacker behaviors, techniques, and tools to help them design better defenses."},
  {c: 11, q: "Valerie wants to replace the telnet access that she found still in use in her organization. Which protocol should she use to replace it, and what port will it run on?", o: ["SFTP, port 21", "SSH, port 22", "HTTPS, port 443", "RDP, port 3389"], a: 1, exp: "Telnet provides remote command-line access but is not secure. SSH is the most common alternative to telnet, and it operates on port 22."},
  {c: 11, q: "Jill wants to use DNS filtering to prevent users in her organization from visiting potentially malicious sites. What type of service should she use to obtain this information?", o: ["An OSINT service", "A STP feed", "An ACL monitoring service", "A reputation service"], a: 3, exp: "DNS reputation services can provide Jill with an automated feed of malicious sites that she can include in her DNS filter. OSINT (open source intelligence) is gathered without scans but typically won't provide DNS block lists. STP (Spanning Tree Protocol) prevents loops in networks and is not relevant to DNS filtering, and an access control monitoring service will not be either."},
  {c: 11, q: "Chuck wants to provide access to a protected network from a less trusted network. What type of solution is commonly implemented to provide a secure, monitored access method?", o: ["A proxy server", "A jump server", "A VLAN", "An air gap"], a: 1, exp: "Jump servers are used to provide secure, monitored access to a protected network. Users log in to the jump server, which then has access to the network. Proxies are used to filter or manage traffic and might be used in this scenario, but jump servers are the preferred answer for most organizations and uses. A VLAN (virtual LAN) is used to logically separate network segments. An air gap is a physical disconnection between networks or devices."},
