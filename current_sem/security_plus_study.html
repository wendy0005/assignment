  {c: 11, q: "Kathleen wants to deploy a firewall that can handle large amounts of network traffic while performing advanced firewalling tasks. What type of device should she select?", o: ["A NGFW", "A WAF", "A UTM", "A SD-FW"], a: 0, exp: "A next-generation firewall (NGFW) device is typically designed and built to be more capable at high speeds and throughput than a universal threat management device. Since UTM devices provide such a wide array of services that consume CPU and memory resources, this performance gap can also sometimes be due to the broad set of services that a UTM device provides. A WAF (web application firewall) is specialized in web traffic, and SD-FW was made up for this question."},
  {c: 11, q: "Mark wants to prevent DNS poisoning attacks. What technology should he implement to counter them most effectively?", o: ["DNSSEC", "SDNS", "SASE", "SD-WAN"], a: 0, exp: "DNSSEC validates both the origin of DNS information and ensures that DNS responses have not been modified, making it the best option to help prevent DNS poisoning attacks. SDNS was made up for this question. SASE is used to secure networks in complex multilocation environments, and SD-WAN allows for dynamic wide area networks defined by software, but neither provides this type of DNS security."},
  {c: 11, q: "Casey wants to replace her organization's MPLS-based external connectivity using commodity technologies. What technology should she select to help her manage this?", o: ["IPSec VPN", "SASE", "SD-WAN", "TLS VPN"], a: 2, exp: "SD-WAN (software-defined wide area network) is commonly used to replace MPLS (Multiprotocol Label Switching) networks, which are typically higher cost than other connectivity options. IPSec and TLS-based VPNs are used to connect through untrusted networks, but they do not provide the functionality required. SASE uses SD-WAN and other technologies to ensure secure connectivity in complex network infrastructures with endpoints in many locations."},
  {c: 11, q: "What protocol is used to securely wrap many otherwise insecure protocols?", o: ["ISAKMP", "SSL", "IKE", "TLS"], a: 3, exp: "Transport Layer Security (TLS) is commonly used to wrap (protect) otherwise insecure protocols. In fact, many of the secure protocols simply add TLS to protect them. ISAKMP and IKE are both used for IPSec and can be used to wrap insecure protocols, but they aren't used alone. SSL is no longer used; TLS has almost entirely replaced it, although SSL is still often casually referred to as TLS."},
  {c: 11, q: "Valentine wants to deploy a secure version of DHCP for her organization. What should she implement?", o: ["S-DHCP", "DHCP over TLS", "DHCPS", "There is no secured version of DHCP."], a: 3, exp: "While many protocols have a secure version, DHCP does not have a secure option, and protection must be handled by using detection and response mechanisms, rather than an encrypted protocol."},
  {c: 11, q: "What component of a zero-trust architecture forwards requests from subjects and acts on whether subjects are allowed to access resources?", o: ["Policy administrators", "Policy enforcement points", "Policy engines", "Policy gateways"], a: 1, exp: "Policy enforcement points communicate with policy administrators to forward requests from subjects and to receive instructions from them about connections to allow or end. Policy administrators are components that establish or remove the communication path between subjects and resources, including creating session-specific authentication tokens or credentials as needed. Policy engines make policy decisions based on both rules and external systems. Policy gateways are not reference components for zero-trust designs."},
  {c: 11, q: "Gary wants to use secure protocols for email access for his end users. Which of the following groups of protocols should he implement to accomplish this task?", o: ["DKIM, DMARC, HTTPS", "SPF, POPS, IMAPS", "POPS, IMAPS, HTTPS", "DMARC, DKIM, SPF"], a: 2, exp: "End users may use secure POP (POPS), secure IMAP (IMAPS), and secure HTTP (HTTPS) to retrieve email. SPF, DKIM, and DMARC are used to identify and validate email servers, not to access email by end users."},
  {c: 11, q: "Gary wants to prevent his organization's most sensitive data from being accessed by network-based attackers at any cost. What solution should he implement to ensure this?", o: ["An air gap", "Firewall rules", "An IPS", "IPSec"], a: 0, exp: "Physical isolation like an air gap is used when the additional work to manually transfer files is an acceptable trade-off against the potential for a security event caused by potential network-based attackers. Firewall rules, an IPS, or the use of IPSec to protect traffic will not sufficiently address this issue if any services remain accessible on the system."},
  {c: 11, q: "Madhuri is designing a load-balancing configuration for her company and wants to keep a single node from being overloaded. What type of design will meet this need?", o: ["A daisy chain", "Active/active", "Duck-duck-goose", "Active/passive"], a: 1, exp: "Active/active designs spread traffic among active nodes, helping ensure that a single node will not be overwhelmed. Active/passive designs are useful for disaster recovery and business continuity, but they do not directly address heavy load on a single node. There are many load-balancing schemes, but daisy chains and duck-duck-goose are not among them."},
  {c: 11, q: "What type of NAC will provide Isaac with the greatest amount of information about the systems that are connecting while also giving him the most amount of control of systems and their potential impact on other systems that are connected to the network?", o: ["Agent-based, preadmission NAC", "Agentless, postadmission NAC", "Agent-based NAC, postadmission NAC", "Agentless, postadmission NAC"], a: 0, exp: "Agent-based, preadmission NAC will provide Isaac with the greatest amount of information about a machine and the most control about what connects to the network and what can impact other systems. Since systems will not be connected to the network, even to a quarantine or preadmission zone, until they have been verified, Isaac will have greater control."},
  {c: 11, q: "Danielle's organization has implemented a tool that combines SD-WAN, a CASB, and Zero Trust, among other security functions, to provide security regardless of where her organization's devices are. What type of solution has her organization implemented?", o: ["A UTM", "An NGFW", "IPSec", "SASE"], a: 3, exp: "SASE (Secure Access Service Edge) combines network security and device security by leveraging SD-WAN with security tools like Zero Trust, firewalls, and cloud access security brokers (CASBs). Both UTM and NGFW are advanced firewalls but do not provide this full functionality, and IPSec is a protocol used to provide encryption and authentication for network traffic."},
  {c: 11, q: "Wayne is concerned that an on-path attack has been used against computers he is responsible for. What artifact is he most likely to find associated with this attack?", o: ["A compromised router", "A browser plug-in", "A compromised server", "A modified hosts file"], a: 1, exp: "Browser on-path attacks take advantage of malicious browser plug-ins or proxies to modify traffic at the browser level. They do not involve compromised routers or servers, and a modified hosts file is more likely to be involved in an on-path attack."},
  {c: 11, q: "Elle has scanned her organization from an external IP address and has identified all of the services that are visible from the public Internet. What does this enable her to describe?", o: ["If the organization is a fail-open organization", "Her organization's OSINT report", "Her organization's attack surface", "If the organization is a fail-closed organization"], a: 2, exp: "Understanding what services your organization offers to the outside world is an important step in describing the organization's attack surface. Fail open and fail closed describe what happens when devices or systems fail, not vulnerability and service availability information. OSINT is a passive process and scanning is not a passive activity."},
  {c: 11, q: "What technique is used to ensure that DNSSEC-protected DNS information is trustworthy?", o: ["It is digitally signed.", "It is sent via TLS.", "It is encrypted using AES256.", "It is sent via an IPSec VPN."], a: 0, exp: "DNSSEC does not encrypt data but does rely on digital signatures to ensure that DNS information has not been modified and that it is coming from a server that the domain owner trusts. DNSSEC does not protect confidentiality, which is a key thing to remember when discussing it as a security option. TLS, an IPSec VPN, or encryption via AES are all potential solutions to protect the confidentiality of network data."},
  {c: 11, q: "Fred wants to ensure that the administrative interfaces for the switches and routers are protected so that they cannot be accessed by attackers. Which of the following solutions should he recommend as part of his organization's network design?", o: ["NAC", "Trunking", "Out-of-band management", "Port security"], a: 2, exp: "Out-of-band management places the administrative interface of a switch, router, or other device on a separate network or requires direct connectivity to the device to access and manage it. This ensures that an attacker who has access to the network cannot make changes to the network devices. NAC and port security help protect the network itself, whereas trunking is used to combine multiple interfaces, VLANs, or ports together."},
  {c: 12, q: "Alyssa wants to harden iOS devices her organization uses. What set of guidelines can she follow to align to common industry security practices?", o: ["OWASP", "CIS benchmarks", "NIST 800-103", "NIST 800-111"], a: 1, exp: "The Center for Internet Security (CIS) provides hardening guidelines known as CIS benchmarks that Alyssa can use as a guide to secure her organization's iOS devices. OWASP does not provide these, and NIST provides general guidance, not OS- or device-specific configuration guides."},
  {c: 12, q: "Fred's company issues devices in a BYOD model. That means that Fred wants to ensure that corporate data and applications are kept separate from personal applications on the devices. What technology is best suited to meet this need?", o: ["Biometrics", "Full-device encryption", "Context-aware authentication", "Containerization"], a: 3, exp: "Using a containerization system can allow Fred's users to run corporate applications and to use corporate data in a secure environment that cannot be accessed by other applications outside of the container on the device. Containerization schemes for mobile devices typically use encryption and other isolation techniques to ensure that data and applications do not cross over. Biometrics and context-aware authentication are useful for ensuring that the right user is using a device but don't provide this separation. Full-device encryption helps reduce the risk of theft or loss of a device resulting in a data breach."},
  {c: 12, q: "Michelle has deployed iPads to her staff who work her company's factory floor. She wants to ensure that the devices work only in the factory and that if they are taken home they cannot access business data or services. What type of solution is best suited to her needs?", o: ["Context-aware authentication", "Geofencing", "Geolocation", "Unified endpoint management (UEM)"], a: 1, exp: "Geofencing will allow Michelle to determine what locations the device should work in. The device will then use geolocation to determine when it has moved and where it is. In this case, the correct answer is therefore geofencing—simply having geolocation capabilities would not provide the solution she needs. Context-aware authentication can help by preventing users from logging in when they aren't in the correct location, but a device that was logged in may not require reauthentication. Finally, UEM, much like mobile device management, can be used to enforce these policies, but the most correct answer is geofencing."},
  {c: 12, q: "Ivan is running an enterprise wireless network and his heatmap shows that two access points are likely conflicting with each other. What will the enterprise access controller most likely do to handle this conflict?", o: ["Increase the broadcast power of one of the access points.", "Change the SSID for one of the access points.", "Disable one of the access points.", "Decrease the broadcast power of the access points."], a: 3, exp: "When access points conflict, enterprise wireless network management tools will typically decrease the power for both access points until the issue is resolved. Simply increasing power will cause more conflicts, changing the SSID would not serve typical enterprise models that use a single SSID to allow roaming, and disabling an access point may leave coverage gaps."},
  {c: 12, q: "Chris wants to use geolocation technology to find where phones issued by his organization are located. Which of the following is not commonly used as part of geolocation techniques?", o: ["Bluetooth", "GPS", "NFC", "Wi-Fi"], a: 2, exp: "Nearfield communication (NFC) is not typically used for geolocation because of its extremely short range. Geolocation services may use GPS, Wi-Fi, and Bluetooth to identify areas, access points, Bluetooth beacons, and other items that help with location services."},
  {c: 12, q: "Daniel knows that WPA3 has added a method to ensure that brute-force attacks against weak preshared keys are less likely to succeed. What is this technology called?", o: ["SAE", "CCMP", "PSK", "WPS"], a: 0, exp: "Simultaneous Authentication of Equals (SAE) is used to establish a secure peering environment and to protect session traffic. Since the process requires additional cryptographic steps, it causes brute-force attacks to be much slower and thus less likely to succeed while also providing more security than WPA2's preshared key (PSK) mode. WPS is Wi-Fi Protected Setup, a quick setup capability; CCMP is the encryption mode used for WPA2 networks. WPA3 moves to 128-bit encryption for Personal mode and can support 192-bit encryption in Enterprise mode."},
  {c: 12, q: "Isabelle needs to select the EAP protocol that she will use with her wireless network. She wants to use a secure protocol that does not require client devices to have a certificate, but she does want to require mutual authentication. Which EAP protocol should she use?", o: ["EAP-FAST", "EAP-TTLS", "PEAP", "EAP-TLS"], a: 2, exp: "Isabelle should select PEAP, which doesn't require client certificates but does provide TLS support. EAP-TTLS provides similar functionality but requires additional software to be installed on some devices. EAP-FAST focuses on quick reauthentication, and EAP-TLS requires certificates to be deployed to the endpoint devices."},
  {c: 12, q: "Theresa has implemented a technology that keeps data for personal use separate from data for her company on mobile devices used by members of her staff. What is this concept called?", o: ["Storage segmentation", "Multifactor storage", "Full-device encryption", "Geofencing"], a: 0, exp: "Storage segmentation is the concept of splitting storage between functions or usage to ensure that information that fits a specific context is not shared or used by applications or services outside of that context. Full-device encryption encrypts the entire device, geofencing is used to determine geographic areas where actions or events may be taken by software, and multifactor storage was made up for this question."},
  {c: 12, q: "A member of Jake's team tells him that he sideloaded applications on his Android-based company owned phone. What has occurred?", o: ["Malware was installed on the phone.", "The phone was rooted to allow administrative access.", "Applications were installed by copying them instead of via an app store.", "The organization's MDM was disabled to avoid its management controls."], a: 2, exp: "Sideloading is the process of copying files between two devices like a phone and a laptop, desktop, or storage device. Jake's team member has loaded an application without using the Android application store. Sideloading does not necessarily imply malware, rooting, or disabling an MDM, although an MDM may be configured to prevent sideloading."},
  {c: 12, q: "Madhuri disables SMS, MMS, and RCS on phones in her organization. What has she prevented from being sent?", o: ["Phone calls and texts", "Text messages and multimedia messages", "Text messages and firmware updates", "Phone calls and multimedia messages"], a: 1, exp: "SMS (Short Message Service) is used to send text messages, and MMS and RCS provide additional multimedia features. Neither provides phone calls or firmware updates."},
  {c: 12, q: "What is the most frequent concern that leads to GPS tagging being disabled by some companies via an MDM tool?", o: ["Chain of custody", "The ability to support geofencing", "Privacy", "Context-aware authentication"], a: 2, exp: "Geotagging places a location stamp in documents and pictures that can include position, time, and date. This can be a serious privacy issue when pictures or other information are posted, and many individuals and organizations disable GPS tagging. Organizations may want to enforce GPS tagging for some work products, meaning that the ability to enable or disable it in an MDM tool is quite useful. Chain of custody is a forensic concept, the ability to support geofencing does not require GPS tagging, and context-aware authentication may need geolocation but not GPS tagging."},
  {c: 12, q: "Bart wants to use a cellular hotspot to provide Internet connectivity via Wi-Fi. What type of network has he set up for his laptop and phone to connect to?", o: ["Ad-hoc", "NFC", "Point-to-point", "RFID"], a: 0, exp: "This is an ad-hoc network set up to allow devices to connect to the access point provided by the cellular modem. NFC is a short range, low bandwidth connection method used for payments and similar purposes. Point-to-point connections are used to bridge two networks together or for single connections, this is a multi-device network. RFID uses tags and readers."},
  {c: 12, q: "Susan wants to ensure that the threat of a lost phone creating a data breach is minimized. What two technologies should she implement to do this?", o: ["Wi-Fi and NFC", "Remote wipe and FDE", "Containerization and NFC", "Geofencing and remote wipe"], a: 1, exp: "Susan's best options are to use a combination of full-device encryption (FDE) and remote wipe. If a device is stolen and continues to be connected to the cellular network, or reconnects at any point, the remote wipe will occur. If it does not, or if attackers attempt to get data from the device and it is locked, the encryption will significantly decrease the likelihood of the data being accessed. Of course, cracking a passcode, PIN, or password remains a potential threat. NFC and Wi-Fi are wireless connection methods and have no influence on data breaches due to loss of a device. Geofencing may be useful for some specific organizations that want to take action if devices leave designated areas, but it is not a general solution. Containerization may shield data, but use of containers does not immediately imply encryption or other protection of the data but simply that the environments are separated."},
  {c: 12, q: "What are the two most commonly deployed biometric authentication solutions for mobile devices?", o: ["Voice recognition and face recognition", "Fingerprint recognition and gait recognition", "Face recognition and fingerprint recognition", "Voice recognition and fingerprint recognition"], a: 2, exp: "Current mobile device implementations have focused heavily on facial recognition via services like Apple's Face ID and fingerprint recognition like Android's fingerprint scanning and Apple's Touch ID. Gait recognition is not a widely deployed biometric technology and would be difficult for most mobile device users to use. Voice recognition as a biometric authenticator has not been broadly deployed for mobile devices, whereas voice-activated services are in wide usage."},
  {c: 12, q: "Alaina wants to modify operating system settings and features on her iOS device and to install applications that are not permitted or available via the Apple App Store. What would she need to do to accomplish this?", o: ["Deploy an MDM tool to the phone.", "Jailbreak the phone.", "Keymod the phone.", "Install a third-party operating system."], a: 1, exp: "Jailbreaking will allow Alaina to obtain administrator access to the underlying phone operating system and to modify operating system settings and options as well as to install applications that are not available via the App Store. Deploying an MDM does not permit all of this, keymodding is not a term used in this context, and installing a third-party OS would allow access but would change the OS."},
  {c: 12, q: "Jerome wants to allow guests to use his organization's wireless network, but he does not want to provide a preshared key. What solution can he deploy to gather information such as email addresses or other contact information before allowing users to access his open network?", o: ["WPS capture mode", "Kerberos", "WPA2", "A captive portal"], a: 3, exp: "Jerome should deploy a captive portal that requires users to provide information before being moved to a network segment that allows Internet access. WPS capture mode was made up for this question, Kerberos is used for enterprise authentication, and WPA2 supports open, enterprise, or PSK modes but does not provide the capability Jerome needs by itself."},
  {c: 12, q: "Amanda wants to create a view of her buildings that shows Wi-Fi signal strength and coverage. What is this type of view called?", o: ["A channel overlay", "A PSK", "A heatmap", "A SSID chart"], a: 2, exp: "Amanda wants to create a heatmap, which shows the signal strength and coverage for each access point in a facility. Heatmaps can also be used to physically locate an access point by finding the approximate center of the signal. This can be useful to locate rogue access points and other unexpected or undesired wireless devices. PSK stands for preshared key, a channel overlay is not a commonly used term (although channel overlap is a concern for channels that share bandwidth), and SSID chart was made up for this question."},
  {c: 12, q: "Megan wants to prevent access to phones that are misplaced by members of her organization. Which of the following MDM control options is least likely to help her protect phones that are misplaced?", o: ["PINs", "Device encryption", "Remote wipe", "Application management"], a: 3, exp: "Managing applications won't help protect a misplaced phone from being accessed. PINs, device encryption, and remote wipe will all help keep her organization's data and devices secure."},
  {c: 12, q: "Gurvinder wants to select a mobile device deployment method that provides employees with devices that they can use as though they're personally owned to maximize flexibility and ease of use. Which deployment model should he select?", o: ["CYOD", "COPE", "BYOD", "MOTD"], a: 1, exp: "Gurvinder's requirements fit the COPE (corporate-owned, personally enabled) mobile device deployment model. Choose your own device (CYOD) allows users to choose a device but then centrally manages it. BYOD allows users to use their own device, rather than have the company provide it, and MOTD means message of the day, and is not a mobile device deployment scheme."},
  {c: 12, q: "Octavia discovers that the contact list from her phone has been acquired via a wireless attack. Which of the following is the most likely culprit?", o: ["Bluejacking", "An evil maid", "Bluesnarfing", "An evil twin"], a: 2, exp: "Bluesnarfing is the theft of information from a Bluetooth enabled device. If Octavia left Bluetooth on and had not properly secured her device, then an attacker may have been able to access her contact list and download its contents. A bluejacking attack occurs when unwanted messages are sent to a device via Bluetooth. Evil twins are malicious access points configured to appear to be legitimate access points, and an evil maid attack is an in-person attack where an attacker takes advantage of physical access to hardware to acquire information or to insert malicious software on a device."},
  {c: 13, q: "The following figure shows the Security+ incident response cycle. What item is missing?", o: ["Planning", "Reporting", "Monitoring", "Preparation"], a: 3, exp: "The first item in the incident response cycle used by the Security+ exam is preparation."},
  {c: 13, q: "Michael analyzes network traffic, including packet content, as part of his incident response process. What tool should he use?", o: ["Syslog", "NetFlow", "Packet capture", "A SIEM"], a: 2, exp: "Packet capture will allow Michael to see all the content of packets that are captured to analyze them. NetFlow simply shows source, destination, protocol, and traffic volume. Syslog and a SIEM don't capture packet content, and instead focus on logs and events."},
  {c: 13, q: "Susan wants to create a dashboard that shows her aggregated log events related to logins from different geographic regions. Her goal is to identify impossible travel scenarios. Which of the following solutions should she select to accomplish that goal?", o: ["IPS", "OS logs", "SIEM", "Vulnerability scan data"], a: 2, exp: "A SIEM with correlation rules for geographic IP information as well as user IDs and authentication events will accomplish Susan's goals. An IPS may detect attacks, but it isn't well suited to detecting impossible travel. OS logs would need to be aggregated, and vulnerability scan data won't show this at all."},
  {c: 13, q: "Selah wants to ensure that users in her organization can only install applications that are evaluated and approved by the organization's security team. What should she use?", o: ["A SIEM", "An application deny list", "An application allow list", "sFlow"], a: 2, exp: "Application allow lists are used to ensure that only allowed applications are installable on systems. A deny list specifically identifies programs that aren't allowed. A SIEM doesn't provide application management capabilities, and sFlow is a flow tool like NetFlow."},
  {c: 13, q: "What is the primary concern with sFlow in a large, busy network?", o: ["It may allow buffer overflow attacks against the collector host.", "sFlow is not designed for large or complex networks.", "sFlow puts extreme load on the flow collector host.", "sFlow samples only network traffic, meaning that some detail will be lost."], a: 3, exp: "The primary concern for analysts who deploy sFlow is often that it samples only data, meaning some accuracy and nuance can be lost in the collection of flow data. Sampling, as well as the implementation methods for sFlow, means that it scales well to handle complex and busy networks. Although vulnerabilities may exist in sFlow collectors, a buffer overflow is not a primary concern for them."},
  {c: 13, q: "Mark unplugs the network connection from a system that is part of an incident and places tape over its Ethernet jack with a sign that says, \u201cDo not reconnect without approval from IR team.\u201d How is this method best described?", o: ["Containment", "Isolation", "Segmentation", "Zoning"], a: 1, exp: "Mark has isolated the system by removing it from the network and ensuring that it cannot communicate with other systems. Containment would limit the impact of the incident and might leave the system connected but with restricted or protected access. Segmentation moves systems or groups of systems into zones that have similar purposes, data classification, or other restrictions on them."},
  {c: 13, q: "The company that Ben works for wants to test its incident response plan. Ben gathers the incident response team in a room and walks through a scenario to validate the organization's processes and procedures. What type of event has Ben hosted?", o: ["A checklist exercise", "A simulation", "A tabletop exercise", "A fail-over exercise"], a: 2, exp: "Ben's organization is conducting a tabletop exercise. Tabletop exercises are conducted with more flexibility—team members are given a scenario and asked how they would respond and what they would do to accomplish tasks they believe would be relevant. Checklist exercises are not a specific type of exercise. A simulation exercise attempts to more fully re-create an actual incident to test responses. Fail-over exercises are conducted by actually failing a datacenter over to a hot location."},
  {c: 13, q: "Madhuri wants to check a PNG-formatted photo for GPS coordinates. Where can she find that information if it exists in the photo?", o: ["In the location.txt file appended to the PNG", "On the original camera", "In the photo's metadata", "In the photo as a steganographically embedded data field"], a: 2, exp: "If the photo includes GPS data, it will be included in the photo's metadata. Madhuri can use a tool like ExifTool to review the metadata for useful information. None of the other options are places where data is stored for a PNG image as a normal practice."},
  {c: 13, q: "Alyssa has identified malware on a system. She removes the system from the network to ensure that it cannot impact other systems. What technique has she used to deal with this system?", o: ["Quarantine", "Segmentation", "Converted it to agentless", "Deny listing"], a: 0, exp: "Alyssa's has quarantined the machine, ensuring it cannot reach other systems or impact the rest of her organization. Segmentation would involve putting the system in protected network zone. Agentless tools are used to send data without a separate program or agent deployed to allow that. Deny lists are used to prevent specific programs or files from being used or deployed to systems."},
  {c: 13, q: "Kristen discovers missing logs as part of her threat hunting activities. What has most likely happened?", o: ["The logs hit the end of their life cycle and were rotated.", "The system is a newly deployed system.", "An attacker wiped the logs to hide evidence.", "An attacker encrypted the logs as part of their process."], a: 2, exp: "Missing logs are often associated with an attacker attempting to hide evidence of their actions. Log rotation will typically remove the oldest log items and replace them with new log items rather than wiping a log, or will archive the old log file and create a new one. A newly deployed system typically has at least some logs from booting and running. Encrypting logs would leave a file in place even if it couldn't be read."},
  {c: 13, q: "Ian has been receiving hundreds of false positive alerts from his SIEM every night when scheduled jobs run across his datacenter. What should he adjust on his SIEM to reduce the false positive rate?", o: ["Trend analysis", "Sensitivity", "Correlation rules", "Dashboard configuration"], a: 1, exp: "Ian's first step should be changing the sensitivity for his alerts. Adjusting the alerts to ignore safe or expected events can help reduce false positives. Correlation rules may then need to be adjusted if they are matching unrelated items. Dashboards are used to visualize data, not for alerting, and trend analysis is used to feed dashboards and reports."},
  {c: 13, q: "Which team member acts as a primary conduit to senior management on an IR team?", o: ["Communications and public relations", "Information security", "Management", "Technical expert"], a: 2, exp: "Members of management or organizational leadership act as a primary conduit to senior leadership for most incident response teams. They also ensure that difficult or urgent decisions can be made without needing escalated authority. Communications and PR staff focus on internal and external communications but are typically not the direct conduit to leadership. Technical and information security experts do most of the incident response work itself."},
  {c: 13, q: "Dana is reviewing her system's application logs and notices that a full backup of the application was done at 10 a.m. She knows that the job that runs the backup process is set to run overnight. What indicator should she flag this as?", o: ["Unexpected logs", "Resource consumption", "Resource inaccessibility", "Out-of-cycle logging"], a: 3, exp: "This is an example of out-of-cycle logging, or logging that occurs at a different time than expected. This may be because an attacker is using the backup tool to acquire data. Unexpected logs are not an indicator found on the Security+ exam outline. There is no indication of resource consumption or inaccessibility in the question."},
  {c: 13, q: "Jim wants to view log entries that describe actions taken by applications on a Red Hat Linux system. Which of the following tools can he use on the system to view those logs?", o: ["logger", "syslog-ng", "journalctl", "tail"], a: 2, exp: "Red Hat Enterprise uses journalctl to view journal logs that contain application information. Jim should use journalctl to review the logs for the information he needs. The tool also provides functionality that replicates what head and tail can do for logs. Syslog-ng is a logging infrastructure, and though logs may be sent via syslog-ng, it is not mentioned here. logger is a logging utility used to make entries in the system log."},
  {c: 13, q: "Megan wants to ensure that logging is properly configured for her organization's Windows workstations. What could she use to ensure that logging best practices are configured?", o: ["SIEM", "Benchmarks", "Syslog", "Agents"], a: 1, exp: "Benchmarks often include logging settings and configurations. SIEM is used to gather and analyze logs. Syslog is a standard for logging and sending logs. Agents are used to send logs for systems that don't have a logging capability."},
  {c: 13, q: "Chris has turned on logon auditing for a Windows system. Which log will show them?", o: ["The Windows Application log", "The Windows Security log", "The Windows System log", "All of the above"], a: 1, exp: "The Windows Security log records logon events when logon auditing is enabled. The Application and System logs do not contain these events."},
  {c: 13, q: "Jayne wants to determine why a ransomware attack was successful against her organization. She plans to conduct a root cause analysis. Which of the following is not a typical root cause analysis method?", o: ["Root/branch review", "Five whys", "Event analysis", "Diagramming"], a: 0, exp: "Five whys, event analysis, and diagramming are all common methods of performing root cause analysis. Root/branch review is not a typical process for this."},
  {c: 13, q: "Hitesh wants to keep a system online but limit the impact of the malware that was found on it while an investigation occurs. What method from the following list should he use?", o: ["Containment", "Isolation", "Segmentation", "Black holing"], a: 0, exp: "Containment activities focus on preventing further malicious actions or attacks. In this case, Hitesh might opt to prevent the malware from spreading but leave the system online due to a critical need or a desire to preserve memory and other artifacts for investigation. Isolation walls a system or systems off from the rest of the world, whereas segmentation is frequently used before incidents occur to create zones or segments of a network or system with different security levels and purposes."},
  {c: 13, q: "What phase in the incident response process leverages indicators of compromise and log analysis as part of a review of events?", o: ["Preparation", "Containment", "Eradication", "Identification"], a: 3, exp: "The Analysis phase focuses on using various techniques to analyze events to identify potential incidents. Preparation focuses on building tools, processes, and procedures to respond to incidents. Eradication involves the removal of artifacts related to the incident, and containment limits the scope and impact of the incident."},
  {c: 13, q: "Henry wants to check to see if services were installed by an attacker. What commonly gathered organizational data can he use to see if a new service appeared on systems?", o: ["Registry dumps from systems throughout his organization", "Firewall logs", "Vulnerability scans", "Flow logs"], a: 2, exp: "Vulnerability scans are the best way to find new services that are offered by systems. In fact, many vulnerability scanners will flag new services when they appear, allowing administrators to quickly notice unexpected new services. Registry information is not regularly dumped or collected in most organizations. Firewall logs and flow logs could show information about the services being used by systems whose traffic passes through them, but this is a less useful and accurate way of identifying new services and would work only if those services were also being used."},
  {c: 14, q: "Felix wants to make an exact copy of a drive using a Linux command-line tool as part of a forensic acquisition process. What command should he use?", o: ["df", "cp", "dd", "ln"], a: 2, exp: "dd is a copying and conversion command for Linux and can be used to create a forensic image that can be validated using an MD5sum or SHA1 hash. The other commands are df for disk usage, cp for copying files, and ln to link files."},
  {c: 14, q: "Greg is preparing a forensic report and needs to describe the tools that were used. What should he report about the tools in addition to their names?", o: ["The type of system the tools were installed or run on", "The training level or certifications of the team that uses the tools", "Any known limitations or issues with the tools", "The patch level or installed version of the tools"], a: 2, exp: "If there are known limitations or issues with the tools used, this should be included in the report. The type of system the tool was installed on may influence performance but should not influence the report or output. Training and certification may be listed as part of a team description but are not required as part of tool description. Finally, patch levels or installed versions are not critical unless there are known issues that would have been described as such."},
  {c: 14, q: "Gabby is preparing chain-of-custody documentation and identifies a gap in hand-off documentation for an original source forensic drive. What issue should she expect to encounter due to this gap?", o: ["The evidence may not be admissible in court.", "The forensic activities may need to be repeated.", "The staff involved may have to re-create the missed log.", "The chain of custody may need to be edited to note the problem."], a: 0, exp: "If forensic evidence was not properly handled, it may not be admissible in court. Repeating forensic activities won't reverse mishandling, staff can't go back and re-create logs, and noting the issue will not resolve it."},
  {c: 14, q: "Mike's organization has recently moved to a SaaS cloud service and needs to collect forensic data from the cloud service. What process can Mike use to gather the information he needs?", o: ["Install forensic imaging software on the cloud service's servers.", "Identify the log information available and request any other desired information from the cloud service provider.", "Engage law enforcement to acquire the forensic data.", "Request the forensic information from third-party auditors."], a: 1, exp: "Mike's best option is to identify the log information available from the provider and to request any additional information knowing that he may not receive more detail unless there is contractual language that specifies it. SaaS vendors typically won't allow installation of forensic tools, law enforcement does not perform forensic acquisition for third parties upon request, and auditors don't provide forensic data acquisition either."},
  {c: 14, q: "Charles wants to obtain a forensic copy of a running virtual machine. What technique should he use to capture the image?", o: ["Run dd from within the running machine.", "Use FTK Imager from the virtual machine host.", "Use the VM host to create a snapshot.", "Use WinHex to create a copy from within the running machine."], a: 2, exp: "Creating a snapshot will provide a complete copy of the system, including memory state that can then be analyzed for forensic purposes. Copying a running system from a program running within that system can be problematic, since the system itself will change while it is trying to copy itself. FTK Imager can copy drives and files, but it would not handle a running virtual machine."},
  {c: 14, q: "Melissa wants to capture network traffic for forensic purposes. What tool should she use to capture it?", o: ["A forensic suite", "Wireshark", "dd", "WinHex"], a: 1, exp: "Even though Wireshark is not a dedicated network forensic tool, since network traffic is ephemeral, capturing it with a packet sniffer like Wireshark is Melissa's best option. Forensic suites are useful for analyzing captured images, not capturing network traffic, and dd and WinHex are both useful for packet capture, but not for network traffic analysis."},
  {c: 14, q: "Frank is concerned about the admissibility of his forensic data. Which of the following is not an element he should be concerned about?", o: ["Whether the forensic source data has remained unaltered", "Whether the practices and procedures would survive review by experts", "Whether the evidence is relevant to the case", "Whether the forensic information includes a time stamp"], a: 3, exp: "Forensic information does not have to include a time stamp to be admissible, but time stamps can help build a case that shows when events occurred. Files without a time stamp may still show other information that is useful to the case or may have other artifacts associated with them that can provide context about the time and date."},
  {c: 14, q: "What is the document that tracks the custody or control of a piece of evidence called?", o: ["Evidence log", "Audit log", "Event report", "Chain of custody"], a: 3, exp: "Chain-of-custody documentation tracks evidence throughout its life cycle, with information about who has custody or control and when transfers happened, and continues until the evidence is removed from the legal process and disposed of. The other terms are not used for this practice."},
  {c: 14, q: "Isaac is performing a forensic analysis on two systems that were compromised in the same event in the same facility. As he performs his analysis, he notices that the event appears to have happened almost exactly one hour earlier on one system than the other. What is the most likely issue he has encountered?", o: ["The attacker took an hour to get to the second system.", "One system is set to an incorrect time zone.", "The attacker changed the system clock to throw off forensic practitioners.", "The forensic tool is reading the time stamps incorrectly."], a: 1, exp: "The most common cause of an hour of difference between two systems in an environment is an incorrectly set time zone. Isaac should check the time zone settings, and then correct his findings based on the time zones set on the systems if necessary."},
  {c: 14, q: "What legal concept determines the law enforcement agency or agencies that will be involved in a case based on location?", o: ["Nexus", "Nonrepudiation", "Jurisdiction", "Admissibility"], a: 2, exp: "Jurisdiction is the legal authority over an area or individuals based on laws that create the jurisdiction. Nexus defines whether a relationship or connection exists, such as a local branch or business location. Non-repudiation ensures that evidence or materials can be connected to their originator. Admissibility determines whether evidence can be used in court."},
  {c: 14, q: "Michael wants to acquire the firmware from a running device for analysis. What method is most likely to succeed?", o: ["Use forensic memory acquisition techniques.", "Use disk forensic acquisition techniques.", "Remove the firmware chip from the system.", "Shut down the system and boot to the firmware to copy it to a removable device."], a: 0, exp: "Firmware can be challenging to access, but both memory forensic techniques and direct hardware interface access are viable means in some cases. Firmware is not typically stored on the disk and instead is stored in a BIOS or UEFI chip. Removing the chip from the system will leave it unable to run and thus this is not a preferred method. Also, many chips are not removable. Shutting down the device and booting it to the firmware does not provide a means of copying the firmware for most devices. Although the firmware is likely to allow updates, most do not allow downloads or copying."},
  {c: 14, q: "Charles needs to know about actions an individual performed on a PC. What is the best starting point to help him identify those actions?", o: ["Review the system log.", "Review the event log.", "Interview the individual.", "Analyze the system's keystroke log."], a: 2, exp: "Although it may be tempting to use a technical answer, interviewing the individual involved is the best starting point when a person performed actions that need to be reviewed. Charles can interview the staff member, and then move on to technical means to validate their responses. System and event logs may have some clues to what occurred, but normal systems do not maintain a keystroke log. In fact, the closest normal element is the command log used by both Windows and Linux to allow command-line input to be recalled as needed."},
  {c: 14, q: "Maria has acquired a disk image from a hard drive using dd, and she wants to ensure that her process is forensically sound. What should her next step be after completing the copy?", o: ["Securely wipe the source drive.", "Compare the hashes of the source and target drive.", "Securely wipe the target drive.", "Update her chain-of-custody document."], a: 1, exp: "Once a copy is made, hashes for the original and target drive should be compared to ensure that the copy was successful. After that, the chain-of-custody document can be updated to note that a copy was made and will be tracked as it is analyzed while the original is preserved. Wiping either drive after a copy is not part of the process, although a target drive may be wiped after a case is complete."},
  {c: 14, q: "Alex has been handed a flash media device that was quick-formatted and has been asked to recover the data. What data will remain on the drive?", o: ["No data will remain on the drive.", "Files will remain but file indexes will not.", "File indexes will remain, but the files will be gone.", "Files and file indexes will remain on the drive."], a: 1, exp: "Quick-formatting a drive removes the file indexes but leaves the file content on the drive. Recovery tools look for those files on the drive and piece them back together using metadata, headers, and other clues that help to recover the files."},
  {c: 14, q: "Naomi is preparing to migrate her organization to a cloud service and wants to ensure that she has the appropriate contractual language in place. Which of the following is not a common item she should include?", o: ["Right-to-audit clauses", "Right to forensic examination", "Choice of jurisdiction", "Data breach notification timeframe"], a: 1, exp: "Contracts commonly include right to audit, choice of jurisdiction, and data breach notification time frame clauses, but a right to forensically examine a vendor's systems or devices is rarely included. Naomi may want to ask about their incident response process and for examples of previous breach notification and incident documentation shared with customers instead."},
  {c: 14, q: "Alaina wants to maintain chain-of-custody documentation and has created a form. Which of the following is not a common element on a chain-of-custody form?", o: ["Item identifier number", "Signature of the person transferring the item", "Signature of the person receiving the item", "Method of transport"], a: 3, exp: "Chain of custody tracks who has an item, how it is collected, where it is stored and how, how it is secured or protected, who collected it, and transfers, but it does not typically include how the items were transported because that is not relevant if the other data is provided."},
  {c: 14, q: "Henry is following the EDRM model and is preparing to review data. What two key tasks occur during this stage?", o: ["Validating that time stamps match between systems and that data is properly hashed to confirm that original data is sent", "Validating that the legal hold request is valid and that all documented items are included", "Validating that the desired data is included and that information that should not be shared is not included", "Validating that chain of custody is ensured and that malicious files are not included"], a: 2, exp: "It is important to ensure that data prepared for e-discovery only contains what it is supposed to, and that information that should not be shared is not included. Time stamps, hashing, chain of custody, and ensuring malicious files are not included are not part of the EDRM model. Validating that a legal hold is valid should happen before preservation, but validating that documented items from the hold are included if they exist should occur."},
  {c: 14, q: "Theresa's organization has received a legal hold notice for their files and documents. Which of the following is not an action she needs to take?", o: ["Ensure that changes to existing documents related to the case are tracked and that originals can be provided.", "Preserve all existing documents relevant to the case.", "Delete all sensitive documents related to the case.", "Prevent backups that contain files related to the case from being overwritten on their normal schedule."], a: 2, exp: "Removing information relevant to a legal hold is exactly what the hold is intended to prevent. Theresa's organization could be in serious legal trouble if they were to intentionally purge or change related information."},
  {c: 14, q: "Gurvinder wants to follow the order of volatility to guide his forensic data acquisition. Which of the following is the least volatile?", o: ["RAM", "Data on the hard drive", "Backups", "Remote logs"], a: 2, exp: "Backups are the least volatile of these options according to the order of volatility. Backups will be kept until they are aged out, which may be days, weeks, or even months in some cases. From most to least volatile, these are RAM, data on the hard drive, remote logs, and then backups."},
  {c: 14, q: "What is the key difference between hashing and checksums?", o: ["Both can validate integrity, but a hash also provides a unique digital fingerprint.", "A hash can be reversed, and a checksum cannot be.", "Checksums provide greater security than hashing.", "Checksums have fewer message collisions than a hash."], a: 0, exp: "Although both a checksum and a hash can be used to validate message integrity, a hash has fewer collisions than a checksum and will also provide a unique fingerprint for a file. Checksums are primarily used as a quick means of checking that that integrity is maintained, whereas hashes are used for many other purposes such as secure password validation without retaining the original password. A checksum would not be useful for proving a forensic image was identical, but it could be used to ensure that your work had not changed the contents of the drive."},
  {c: 15, q: "Joe is authoring a document that explains to system administrators one way in which they might comply with the organization's requirement to encrypt all laptops. What type of document is Joe writing?", o: ["Policy", "Guideline", "Procedure", "Standard"], a: 1, exp: "The key phrase in this scenario is “one way.” This indicates that compliance with the document is not mandatory, so Joe must be authoring a guideline. Policies, standards, and procedures are all mandatory.", card: 1},
  {c: 15, q: "Which one of the following statements is not true about compensating controls under PCI DSS?", o: ["Controls used to fulfill one PCI DSS requirement may be used to compensate for the absence of a control needed to meet another requirement.", "Controls must meet the intent of the original requirement.", "Controls must meet the rigor of the original requirement.", "Compensating controls must provide a similar level of defense as the original requirement."], a: 0, exp: "PCI DSS compensating controls must be “above and beyond” other PCI DSS requirements. This specifically bans the use of a control used to meet one requirement as a compensating control for another requirement.", card: 2},
  {c: 15, q: "What law creates privacy obligations for those who handle the personal information of European Union residents?", o: ["HIPAA", "FERPA", "GDPR", "PCI DSS"], a: 2, exp: "The General Data Protection Regulation (GDPR) implements privacy requirements for handling the personal information of EU residents. The Health Insurance Portability and Accountability Act (HIPAA) includes security and privacy rules that affect health-care providers, health insurers, and health information clearinghouses. The Family Educational Rights and Privacy Act (FERPA) applies to educational institutions. The Payment Card Industry Data Security Standard (PCI DSS) applies to credit and debit card information.", card: 1},
  {c: 15, q: "Which one of the following is not one of the five core security functions defined by the NIST Cybersecurity Framework?", o: ["Identify", "Contain", "Respond", "Recover"], a: 1, exp: "The five security functions described in the NIST Cybersecurity Framework are identify, protect, detect, respond, and recover.", card: 1},
  {c: 15, q: "What ISO standard provides guidance on privacy controls?", o: ["27002", "27001", "27701", "31000"], a: 2, exp: "The International Organization for Standardization (ISO) publishes ISO 27701, covering privacy controls. ISO 27001 and 27002 cover cybersecurity, and ISO 31000 covers risk management.", card: 1},
  {c: 15, q: "Which one of the following documents must normally be approved by the CEO or similarly high-level executive?", o: ["Standard", "Procedure", "Guideline", "Policy"], a: 3, exp: "Policies require approval from the highest level of management, usually the CEO. Other documents may often be approved by other managers, such as the CISO.", card: 1},
  {c: 15, q: "Greg would like to create an umbrella agreement that provides the security terms and conditions for all future work that his organization does with a vendor. What type of agreement should Greg use?", o: ["BPA", "MOU", "MSA", "SLA"], a: 2, exp: "Master service agreements (MSAs) provide an umbrella contract for the work that a vendor does with an organization over an extended period of time. The MSA typically includes detailed security and privacy requirements. Each time the organization enters into a new project with the vendor, they may then create a statement of work (SOW) that contains project-specific details and references the MSA.", card: 1},
  {c: 15, q: "What organization is known for creating independent security benchmarks covering hardware and software platforms from many different vendors?", o: ["Microsoft", "Center for Internet Security", "Cloud Security Alliance", "Cisco"], a: 1, exp: "All of these organizations produce security standards and benchmarks. However, only the Center for Internet Security (CIS) is known for producing independent benchmarks covering a wide variety of software and hardware.", card: 1},
  {c: 15, q: "What do many organizations use to schedule and coordinate changes for information systems?", o: ["Impact analysis", "Backout plans", "Maintenance windows", "Version control"], a: 2, exp: "Many organizations use scheduled maintenance windows to coordinate changes to information systems. These windows are preplanned and announced times when all non-emergency changes will take place and often occur on evenings and weekends. A change management process ensures that personnel can perform a security impact analysis. Experts evaluate changes to identify any security impacts before personnel deploy the changes in a production environment. A backout plan allows personnel to undo the change and return the system to its previous state if necessary. Version control ensures that developers and users have access to the latest versions of software and that changes are carefully managed throughout the release process.", card: 1},
  {c: 15, q: "Which one of the following would not normally be found in an organization's information security policy?", o: ["Statement of the importance of cybersecurity", "Requirement to use AES-256 encryption", "Delegation of authority", "Designation of responsible executive"], a: 1, exp: "Security policies do not normally contain prescriptive technical guidance, such as a requirement to use a specific encryption algorithm. This type of detail would normally be found in a security standard.", card: 1},
  {c: 15, q: "Alice, an IT security manager at Acme Corporation, decides to conduct an exercise to test the employees' ability to recognize phishing emails. She creates fake phishing messages and sends them to the employees. When employees click on the links in the fake messages, they are redirected to a training program. What is the primary purpose of the exercise that Alice is conducting?", o: ["To penalize the employees who click on the phishing links", "To reward employees who identify the fake phishing messages", "To test employees' ability to recognize phishing messages and help them improve", "To gather data for a report on the most gullible departments"], a: 2, exp: "Alice's exercise is designed to evaluate how well employees can identify phishing messages and, if they fail to do so, redirect them to a training program that is meant to help them get better at recognizing such messages. The exercise is meant for educational purposes and not for penalizing employees. It is intended to help them improve their skills in recognizing phishing emails. While rewarding employees for identifying phishing emails could be a component of a security awareness program, the exercise described is primarily educational and is focused on helping those who fail to recognize the phishing messages. While data might be collected for analysis and understanding areas where improvement is needed, the intention is not to label departments as gullible.", card: 1},
  {c: 15, q: "Tonya discovers that an employee is running a side business from his office, using company technology resources. What policy would most likely contain information relevant to this situation?", o: ["NDA", "AUP", "Data ownership", "Data classification"], a: 1, exp: "An organization's acceptable use policy (AUP) should contain information on what constitutes allowable and unallowable use of company resources. This policy should contain information to help guide Tonya's next steps.", card: 1},
  {c: 15, q: "What compliance obligation applies to merchants and service providers who work with credit card information?", o: ["FERPA", "SOX", "HIPAA", "PCI DSS"], a: 3, exp: "The Payment Card Industry Data Security Standard (PCI DSS) provides detailed rules about the storage, processing, and transmission of credit and debit card information. PCI DSS is not a law but rather a contractual obligation that applies to credit card merchants and service providers.", card: 2},
  {c: 15, q: "Mike is an information security manager at TechRise Solutions. The company has been experiencing an increase in security incidents, and senior management is concerned about the security posture of the organization. They have asked Mike to take proactive measures to strengthen the company's security culture. What should be Mike's primary role in enhancing the security awareness and training at TechRise Solutions?", o: ["To delegate all security responsibilities to the HR department", "To establish, promote, and maintain security training and awareness programs", "To create and distribute security awareness posters", "To personally conduct security training sessions for all employees"], a: 1, exp: "As an information security manager, Mike's primary role would be to establish an effective security training and awareness program, promote it within the organization, and ensure it is maintained effectively to foster a security-conscious culture among employees. This aligns with a proactive approach to reducing security incidents. Mike should take an active role in security training and awareness, rather than delegating all responsibilities to another department. While HR may be involved, Mike's expertise is crucial in establishing effective programs. Although security awareness posters and training sessions are two components of security awareness efforts, Mike's role should be much broader, encompassing the establishment, promotion, and maintenance of comprehensive training and awareness programs.", card: 1},
  {c: 15, q: "Colin would like to implement a security control in his accounting department that is specifically designed to detect cases of fraud that are able to occur despite the presence of other security controls. Which one of the following controls is best suited to meet Colin's need?", o: ["Separation of duties", "Least privilege", "Dual control", "Mandatory vacations"], a: 3, exp: "Mandatory vacations are designed to force individuals to take time away from the office to allow fraudulent activity to come to light in their absence. The other controls listed here (separation of duties, least privilege, and dual control) are all designed to prevent, rather than detect, fraud.", card: 1},
  {c: 15, q: "Which one of the following security policy framework components does not contain mandatory guidance for individuals in the organization?", o: ["Policy", "Standard", "Procedure", "Guideline"], a: 3, exp: "Guidelines are the only element of the security policy framework that is optional. Compliance with policies, standards, and procedures is mandatory.", card: 1},
  {c: 15, q: "Rachel is the Head of Security at WebCraft Inc. She wants to create both security training and awareness programs. Which statement best captures the difference between these programs?", o: ["Security training requires time to learn new material, whereas awareness efforts use techniques like posters and emails to remind employees of security lessons.", "Security training involves giving rewards to employees, whereas awareness efforts involve punishments.", "There is no difference; both terms can be used interchangeably.", "Security training is for security team members only, whereas security awareness is for all employees."], a: 0, exp: "Security training typically involves structured and formal programs where employees learn new security concepts and practices. In contrast, security awareness efforts are more informal and aim to keep security principles top-of-mind for employees through reminders, without requiring them to engage in formal learning. The idea that security training involves giving rewards to employees and awareness efforts involve punishments is not accurate. Security training is meant to educate employees on security concepts and practices, not to serve as a platform for rewards. Similarly, awareness efforts are not punitive; they serve to remind and reinforce security principles among employees. The statement that there is no difference between security training and awareness efforts and that both terms can be used interchangeably is also incorrect. There is a distinct difference between the two in terms of their structure and purpose, as explained in the correct answer. Lastly, the notion that security training is only for security team members while security awareness is for all employees is not true. Security training is important for all employees, depending on their roles and responsibilities, to ensure they understand the security protocols and policies. Security awareness, on the other hand, is a continual reminder for all employees, including the security team, to stay vigilant and informed about security practices.", card: 1},
  {c: 15, q: "Allan is developing a document that lists the acceptable mechanisms for securely obtaining remote administrative access to servers in his organization. What type of document is Allan writing?", o: ["Policy", "Standard", "Guideline", "Procedure"], a: 1, exp: "Standards describe specific security controls that must be in place for an organization. Allan would not include acceptable mechanisms in a high-level policy document, and this information is too general to be useful as a procedure. Guidelines are not mandatory, so they would not be applicable in this scenario.", card: 1},
  {c: 15, q: "Which one of the following is not a common use of the NIST Cybersecurity Framework?", o: ["Describe the current cybersecurity posture of an organization.", "Describe the target future cybersecurity posture of an organization.", "Communicate with stakeholders about cybersecurity risk.", "Create specific technology requirements for an organization."], a: 3, exp: "The NIST Cybersecurity Framework is designed to help organizations describe their current cybersecurity posture, describe their target state for cybersecurity, identify and prioritize opportunities for improvement, assess progress, and communicate with stakeholders about risk. It does not create specific technology requirements.", card: 1},
  {c: 15, q: "Which one of the following items is not normally included in a request for an exception to security policy?", o: ["Description of a compensating control", "Description of the risks associated with the exception", "Proposed revision to the security policy", "Business justification for the exception"], a: 2, exp: "Requests for an exception to a security policy would not normally include a proposed revision to the policy. Exceptions are documented variances from the policy because of specific technical and/or business requirements. They do not alter the original policy, which remains in force for systems not covered by the exception.", card: 1}
