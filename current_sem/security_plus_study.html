let currentTutorialIdx = 0;
let currentLessonIdx = 0;
let currentStepIdx = 0;

function renderTabs() {
  tabsContainer.innerHTML = tutorials.map((t, i) => {
    const cardCount = t.questions.length;
    const qCount = ALL_QUESTIONS.filter(q => q.c === t.cIdx).length;
    let badgeText = '';
    if (cardCount > 0) {
      badgeText = `${cardCount} slide${cardCount > 1 ? 's' : ''} + ${qCount} Qs`;
    } else {
      badgeText = `${qCount} Qs`;
    }
    return `<button class="tab-btn ${i === currentTutorialIdx ? 'active' : ''}" onclick="switchTutorial(${i})">
      ${t.title}
      <span class="tab-badge">${badgeText}</span>
    </button>`;
  }).join('');
}

function switchTutorial(idx) {
  currentTutorialIdx = idx;
  currentStepIdx = 0;
  
  const t = tutorials[currentTutorialIdx];
  if (t.questions && t.questions.length > 0) {
    viewingQuiz = false;
    currentLessonIdx = 0;
  } else {
    viewingQuiz = true;
    currentLessonIdx = -1;
  }
  
  renderTabs();
  renderSidebar();
  renderLesson();
  saveProgress();
}

function renderSidebar() {
  const t = tutorials[currentTutorialIdx];
  let html = '';
  
  if (t.questions && t.questions.length > 0) {
    t.questions.forEach((q, i) => {
      const isActive = (i === currentLessonIdx && !viewingQuiz);
      const cls = isActive ? 'active' : '';
      html += `<li><a class="${cls}" onclick="switchLesson(${i})">
        <span class="q-num">${q.number}</span> ${q.title}
      </a></li>`;
    });
  }
  
  const hasQuestions = ALL_QUESTIONS.some(q => q.c === t.cIdx);
  if (hasQuestions) {
    const isActive = viewingQuiz;
    const cls = isActive ? 'active' : '';
    html += `<li><a class="${cls}" onclick="switchToQuiz()">
      <span class="q-num">📝</span> Practice Quiz
    </a></li>`;
  }
  
  sidebarList.innerHTML = html;
}

function switchLesson(idx, stepIdx) {
  viewingQuiz = false;
  currentLessonIdx = idx;
  currentStepIdx = stepIdx || 0;
  renderSidebar();
  renderLesson();
  saveProgress();
}

function renderLesson() {
  if (viewingQuiz) {
    renderQuiz();
    return;
  }

  const t = tutorials[currentTutorialIdx];
  const q = t.questions[currentLessonIdx];
  if (!q) {
    mainContent.innerHTML = `<div class="empty-state"><h2>Select a study card</h2><p>Choose a card from the sidebar.</p></div>`;
    return;
  }

  const step = q.steps[currentStepIdx];
  const totalSteps = q.steps.length;
  const isLastStep = currentStepIdx === totalSteps - 1;

  const stepDots = q.steps.map((_, i) =>
    `<span class="step-dot ${i === currentStepIdx ? 'current active' : i < currentStepIdx ? 'done' : ''}"></span>`
  ).join('');

  const bodyHtml = processBody(step.body);

  let diagramHtml = '';
  if (step.diagram) {
    diagramHtml = `<div class="diagram-box"><pre class="mermaid">${escapeHtml(step.diagram)}</pre></div>`;
  }

  let recapHtml = '';
  if (isLastStep && q.recap) {
    recapHtml = `<div class="recap-box">
      <h4>📝 Lesson Summary</h4>
      <ul>${q.recap.map(r => `<li>${r}</li>`).join('')}</ul>
    </div>`;
  }

  mainContent.innerHTML = `
    <div class="lesson-card">
      <div class="lesson-header">
        <span class="q-label">${t.short} · Card ${q.number}</span>
        <h2>${q.title}</h2>
        <div class="lesson-intro">${q.intro}</div>
      </div>
      <div class="steps-container">
        <div class="steps-progress">
          ${stepDots}
          <span class="step-label">${currentStepIdx + 1} / ${totalSteps}</span>
        </div>
        <div class="step-content">
          <h3>${step.title}</h3>
          ${bodyHtml}
          ${diagramHtml}
          ${recapHtml}
        </div>
        <div class="step-nav">
          <button class="btn-prev" onclick="prevStep()" ${currentStepIdx === 0 ? 'disabled' : ''}>
            ← Previous
          </button>
          ${isLastStep
            ? `<button class="btn-finish" onclick="nextLesson()">Next Card →</button>`
            : `<button class="btn-next" onclick="nextStep()">Continue →</button>`
          }
        </div>
      </div>
    </div>
  `;

  initMermaid();
  attachGlossaryListeners();
  updateSidebarProgress();
}

function nextStep() {
  if (viewingQuiz) {
    nextQuizQuestion();
    return;
  }
  const q = tutorials[currentTutorialIdx].questions[currentLessonIdx];
  if (currentStepIdx < q.steps.length - 1) {
    currentStepIdx++;
    renderLesson();
    saveProgress();
  }
}

function prevStep() {
  if (viewingQuiz) {
    prevQuizQuestion();
    return;
  }
  if (currentStepIdx > 0) {
    currentStepIdx--;
    renderLesson();
    saveProgress();
  }
}

function nextLesson() {
  const t = tutorials[currentTutorialIdx];
  if (currentLessonIdx < t.questions.length - 1) {
    currentLessonIdx++;
    currentStepIdx = 0;
    renderSidebar();
    renderLesson();
    saveProgress();
  } else {
    switchToQuiz();
  }
}

function updateSidebarProgress() {
  const t = tutorials[currentTutorialIdx];
  const links = sidebarList.querySelectorAll('a');
  links.forEach((a) => { a.classList.remove('done'); });
  
  if (viewingQuiz) {
    links.forEach((a, i) => {
      if (i < t.questions.length) a.classList.add('done');
    });
    return;
  }
  
  if (currentStepIdx === 0) return;
  links.forEach((a, i) => {
    if (i < currentLessonIdx) a.classList.add('done');
  });
  if (currentStepIdx > 0) {
    if (links[currentLessonIdx]) links[currentLessonIdx].classList.add('done');
  }
}

function processBody(html) {
  return html.replace(/\{\{(.+?)\}\}/g, (_, term) => {
    const key = Object.keys(glossary).find(k => k.toLowerCase() === term.toLowerCase());
    if (key) {
      return `<span class="glossary-term" data-term="${key}">${key}</span>`;
    }
    return term;
  });
}

function attachGlossaryListeners() {
  document.querySelectorAll('.glossary-term').forEach(el => {
    el.addEventListener('click', () => {
      const term = el.dataset.term;
      if (glossary[term]) {
        glossaryTermTitle.textContent = term;
        glossaryTermDef.innerHTML = glossary[term];
        glossaryModal.classList.add('show');
      }
    });
  });
}

function closeGlossary() {
  glossaryModal.classList.remove('show');
}

function initMermaid() {
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', fontSize: 14 });
    mermaid.run({ querySelector: '.mermaid' }).catch(() => {});
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

glossaryModal.addEventListener('click', (e) => {
  if (e.target === glossaryModal) closeGlossary();
});

/* ---- Quiz Functions ---- */
function switchToQuiz() {
  viewingQuiz = true;
  renderSidebar();
  renderQuiz();
  saveProgress();
}

function renderQuiz() {
  const t = tutorials[currentTutorialIdx];
  const cIdx = t.cIdx;
  
  if (!quizStates[cIdx]) {
    const qs = ALL_QUESTIONS.filter(q => q.c === cIdx);
    quizStates[cIdx] = {
      questions: qs.slice(),
      originalQuestions: qs.slice(),
      currentIdx: 0,
      answers: {},
      results: {},
      shuffled: false
    };
  }
  
  const state = quizStates[cIdx];
  const total = state.questions.length;
  
  if (total === 0) {
    mainContent.innerHTML = `
      <div class="lesson-card">
        <div class="lesson-header">
          <span class="q-label">${t.short} · Practice Quiz</span>
          <h2>Chapter ${cIdx + 1} Practice Quiz</h2>
        </div>
        <div class="steps-container">
          <div class="empty-state">
            <h2>No questions available</h2>
            <p>There are no practice questions for this chapter yet.</p>
          </div>
        </div>
      </div>
    `;
    return;
  }
  
  if (state.currentIdx === total) {
    const correct = Object.values(state.results).filter(r => r === 'correct').length;
    const pct = Math.round((correct / total) * 100);
    
    let feedbackMsg = '';
    if (pct >= 90) feedbackMsg = '🏆 Outstanding work! You are ready for the exam!';
    else if (pct >= 70) feedbackMsg = '👍 Good job! Review the questions you missed to lock in your score.';
    else feedbackMsg = '📖 Keep studying! Review the materials and try again.';
    
    mainContent.innerHTML = `
      <div class="lesson-card">
        <div class="lesson-header">
          <span class="q-label">${t.short} · Quiz Complete</span>
          <h2>Chapter ${cIdx + 1} Quiz Results</h2>
          <div class="lesson-intro">You have finished the practice quiz for this chapter. Here is your performance:</div>
        </div>
        <div class="steps-container">
          <div class="results" style="padding: 20px 0;">
            <div class="score">${correct} / ${total}</div>
            <div class="score-label">${pct}% Correct</div>
            <div class="score-bar"><div class="score-fill" style="width: ${pct}%"></div></div>
            <p style="font-size: 16px; font-weight: 600; margin-top: 16px; color: var(--navy);">${feedbackMsg}</p>
          </div>
          <div class="step-nav" style="margin-top: 40px;">
            <button class="btn-prev" onclick="goToQuizQuestion(${total - 1})">← Review Answers</button>
            <button class="btn-finish" onclick="resetChapterQuiz(${cIdx})">🔄 Try Again</button>
          </div>
        </div>
      </div>
    `;
    return;
  }
  
  const q = state.questions[state.currentIdx];
  const letters = ['A', 'B', 'C', 'D'];
  const answered = state.results[state.currentIdx] !== undefined;
  const isCorrect = state.results[state.currentIdx] === 'correct';
  const selectedOpt = state.answers[state.currentIdx];
  
  const progressPct = ((state.currentIdx + 1) / total) * 100;
  
  const optsHtml = q.o.map((opt, i) => {
    let cls = '';
    if (answered) {
      cls = 'disabled';
      if (i === q.a) cls += ' correct';
      else if (i === selectedOpt) cls += ' wrong';
    } else {
      if (i === selectedOpt) cls += ' selected';
    }
    return `<button class="q-option ${cls}" onclick="selectQuizAnswer(${i})" ${answered ? 'disabled' : ''}>
      <span class="letter">${letters[i]}</span>${opt}
    </button>`;
  }).join('');
  let feedbackHtml = '';
  if (answered) {
    let readingHtml = '';
    if (q.card !== undefined && t.questions && t.questions[q.card - 1]) {
      const cardTitle = t.questions[q.card - 1].title;
      readingHtml = `
        <div class="recommended-reading" onclick="switchLesson(${q.card - 1})">
          📖 Review Card ${q.card}: ${cardTitle}
        </div>
      `;
    } else {
      readingHtml = `
        <span class="recommended-reading-missing">
          📖 Recommended Reading: Review Chapter ${cIdx + 1} in the CompTIA Security+ Study Guide.
        </span>
      `;
    }
    
    feedbackHtml = `
      <div class="feedback show" style="margin-top: 15px;">
        <div class="feedback-inner ${isCorrect ? 'correct' : 'wrong'}" style="margin-bottom: 15px;">
          ${isCorrect ? '✓ Correct!' : '✗ Incorrect. The correct answer was: ' + q.o[q.a]}
        </div>
        <div class="explanation-box">
          <div class="explanation-title">
            💡 Explanation & Concept Review
          </div>
          <div class="explanation-text">
            ${q.exp || 'No explanation available.'}
          </div>
          ${readingHtml}
        </div>
      </div>
    `;
  }
    
  const noStudyCardsAlert = (t.questions.length === 0) 
    ? `<div class="lesson-intro" style="background: var(--blue-light); border-left-color: var(--blue); margin-bottom: 20px;">
        💡 Study cards for this chapter are currently in development. Test your knowledge using the quiz questions below!
       </div>`
    : '';

  mainContent.innerHTML = `
    <div class="lesson-card">
      <div class="lesson-header" style="padding-bottom: 15px; border-bottom: 1px solid var(--border);">
        <span class="q-label">${t.short} · Chapter Quiz</span>
        <h2>${t.title}</h2>
        <div style="display: flex; gap: 12px; margin-top: 12px; align-items: center;">
          <button class="btn-prev" style="padding: 6px 12px; font-size: 11px;" onclick="toggleShuffleQuiz(${cIdx})">
            ${state.shuffled ? '🔀 Shuffled ✓' : '🔀 Shuffle Questions'}
          </button>
          <button class="btn-prev" style="padding: 6px 12px; font-size: 11px;" onclick="resetChapterQuiz(${cIdx})">
            🔄 Reset Quiz
          </button>
          <span style="font-size: 12px; font-weight: 600; color: var(--slate-light); margin-left: auto;">
            Score: ${Object.values(state.results).filter(r => r === 'correct').length} / ${Object.keys(state.results).length}
          </span>
        </div>
      </div>
      
      <div class="steps-container">
        ${noStudyCardsAlert}
        <div class="steps-progress" style="margin-bottom: 15px;">
          <div class="progress-bar" style="margin: 0; flex: 1; height: 6px;">
            <div class="progress-fill" style="width: ${progressPct}%; background: var(--blue);"></div>
          </div>
          <span class="step-label" style="margin-left: 15px; white-space: nowrap;">Question ${state.currentIdx + 1} of ${total}</span>
        </div>
        
        <div class="step-content">
          <div class="q-text" style="font-size: 16px; font-weight: 600; color: var(--navy); line-height: 1.5; margin-bottom: 20px;">
            ${q.q}
          </div>
          <div class="q-options" style="padding: 0;">${optsHtml}</div>
          ${feedbackHtml}
        </div>
        
        <div class="step-nav" style="margin-top: 25px;">
          <button class="btn-prev" onclick="prevQuizQuestion()" ${state.currentIdx === 0 ? 'disabled' : ''}>
            ← Previous
          </button>
          
          <button class="btn-check" id="checkQuizBtn" onclick="checkQuizAnswer()" 
            ${answered || selectedOpt === undefined ? 'disabled' : ''} 
            style="background: var(--teal); color: white; border: none; padding: 10px 24px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: all var(--transition); display: ${answered ? 'none' : 'block'}; margin-left: auto;">
            Check Answer
          </button>
          
          <button class="btn-next" onclick="nextQuizQuestion()" 
            style="margin-left: auto; display: ${answered ? 'block' : 'none'};">
            ${state.currentIdx === total - 1 ? 'Finish Quiz →' : 'Next Question →'}
          </button>
        </div>
      </div>
    </div>
  `;
  updateSidebarProgress();
}

function selectQuizAnswer(optIdx) {
  const t = tutorials[currentTutorialIdx];
  const state = quizStates[t.cIdx];
  state.answers[state.currentIdx] = optIdx;
  
  document.querySelectorAll('.q-option').forEach((el, i) => {
    el.classList.toggle('selected', i === optIdx);
  });
  
  const checkBtn = document.getElementById('checkQuizBtn');
  if (checkBtn) checkBtn.disabled = false;
  saveProgress();
}

function checkQuizAnswer() {
  const t = tutorials[currentTutorialIdx];
  const state = quizStates[t.cIdx];
  const q = state.questions[state.currentIdx];
  const selectedOpt = state.answers[state.currentIdx];
  
  if (selectedOpt === undefined) return;
  
  state.results[state.currentIdx] = (selectedOpt === q.a) ? 'correct' : 'wrong';
  renderQuiz();
  saveProgress();
}

function nextQuizQuestion() {
  const t = tutorials[currentTutorialIdx];
  const state = quizStates[t.cIdx];
  if (state.currentIdx < state.questions.length) {
    state.currentIdx++;
    renderQuiz();
    saveProgress();
  }
}

function prevQuizQuestion() {
  const t = tutorials[currentTutorialIdx];
  const state = quizStates[t.cIdx];
  if (state.currentIdx > 0) {
    state.currentIdx--;
    renderQuiz();
  }
}

function goToQuizQuestion(idx) {
  const t = tutorials[currentTutorialIdx];
  const state = quizStates[t.cIdx];
  state.currentIdx = idx;
  renderQuiz();
}

function resetChapterQuiz(cIdx) {
  const state = quizStates[cIdx];
  if (state) {
    state.currentIdx = 0;
    state.answers = {};
    state.results = {};
    if (state.shuffled) {
      state.questions = state.originalQuestions.slice();
      for (let i = state.questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [state.questions[i], state.questions[j]] = [state.questions[j], state.questions[i]];
      }
    } else {
      state.questions = state.originalQuestions.slice();
    }
  }
  renderQuiz();
}

function toggleShuffleQuiz(cIdx) {
  const state = quizStates[cIdx];
  if (!state) return;
  
  state.shuffled = !state.shuffled;
  if (state.shuffled) {
    for (let i = state.questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [state.questions[i], state.questions[j]] = [state.questions[j], state.questions[i]];
    }
  } else {
    state.questions = state.originalQuestions.slice();
  }
  
  state.currentIdx = 0;
  state.answers = {};
  state.results = {};
  renderQuiz();
}

/* ---- Search ---- */
let searchIndex = [];
let searchHighlightIdx = -1;

function buildSearchIndex() {
  searchIndex = [];
  tutorials.forEach((t, ti) => {
    t.questions.forEach((q, qi) => {
      searchIndex.push({
        tutorialIdx: ti, lessonIdx: qi, stepIdx: -1,
        sortKey: `${String(ti)}-${String(qi).padStart(2,'0')}-000`,
        path: `${t.short} · Card ${q.number}`,
        title: q.title,
        fullText: stripHtml(q.intro)
      });
      q.steps.forEach((s, si) => {
        searchIndex.push({
          tutorialIdx: ti, lessonIdx: qi, stepIdx: si,
          sortKey: `${String(ti)}-${String(qi).padStart(2,'0')}-${String(si).padStart(3,'0')}`,
          path: `${t.short} · Card ${q.number}`,
          title: `${q.title} — ${s.title}`,
          fullText: stripHtml(s.body)
        });
      });
    });
  });
}

function stripHtml(html) {
  return html.replace(/<[^>]*>/g, ' ').replace(/&mdash;/g,'—').replace(/&amp;/g,'&')
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ')
    .replace(/\s+/g,' ').trim();
}

function makeSnippet(text, query, contextLen) {
  contextLen = contextLen || 50;
  const q = query.toLowerCase();
  const t = text.toLowerCase();
  const idx = t.indexOf(q);
  if (idx < 0) return text.substring(0, 120);
  const start = Math.max(0, idx - contextLen);
  const end = Math.min(text.length, idx + q.length + contextLen);
  let out = '';
  if (start > 0) out += '…';
  out += text.substring(start, end);
  if (end < text.length) out += '…';
  return out;
}

function performSearch(query) {
  const q = query.toLowerCase().trim();
  if (!q) return [];
  const results = [];
  searchIndex.forEach(item => {
    const searchText = (item.title + ' ' + item.fullText).toLowerCase();
    if (searchText.includes(q)) {
      const snippet = makeSnippet(item.fullText, q, 55);
      const highlighted = snippet.replace(
        new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'),
        '<em>$1</em>'
      );
      results.push({ ...item, snippet: highlighted });
    }
  });
  return results.slice(0, 20);
}

function renderSearchResults(results) {
  const container = document.getElementById('searchResults');
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('searchClear');
  if (!results.length) {
    container.innerHTML = `<div class="search-empty">${input.value.trim() ? 'No results found' : 'Type to search study slides…'}</div>`;
    container.classList.add('show');
    clear.style.display = input.value.trim() ? 'block' : 'none';
    return;
  }
  container.innerHTML = results.map((r, i) =>
    `<div class="search-result-item ${i === searchHighlightIdx ? 'highlighted' : ''}" data-idx="${i}" onclick="selectSearchResult(${i})" onmouseenter="searchHighlightIdx=${i};renderSearchResults(performSearch(document.getElementById('searchInput').value))">
      <div class="sr-path">${r.path}</div>
      <div class="sr-title">${r.title}</div>
      <div class="sr-preview">${r.snippet}</div>
    </div>`
  ).join('');
  container.classList.add('show');
  clear.style.display = 'block';
}

function selectSearchResult(idx) {
  const results = performSearch(document.getElementById('searchInput').value);
  if (!results[idx]) return;
  const r = results[idx];
  closeSearch();
  viewingQuiz = false;
  if (currentTutorialIdx !== r.tutorialIdx) {
    currentTutorialIdx = r.tutorialIdx;
    renderTabs();
  }
  switchLesson(r.lessonIdx, r.stepIdx >= 0 ? r.stepIdx : 0);
}

function closeSearch() {
  document.getElementById('searchResults').classList.remove('show');
  document.getElementById('searchClear').style.display = 'none';
  searchHighlightIdx = -1;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  closeSearch();
  document.getElementById('searchInput').focus();
}

buildSearchIndex();

document.getElementById('searchInput').addEventListener('input', function() {
  searchHighlightIdx = -1;
  const results = performSearch(this.value);
  renderSearchResults(results);
});

document.getElementById('searchInput').addEventListener('blur', function() {
  setTimeout(closeSearch, 200);
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  const results = performSearch(this.value);
  if (e.key === 'Escape') { closeSearch(); this.blur(); return; }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchHighlightIdx = Math.min(searchHighlightIdx + 1, results.length - 1);
    renderSearchResults(performSearch(this.value));
    const el = document.querySelector('.search-result-item.highlighted');
    if (el) el.scrollIntoView({ block: 'nearest' });
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchHighlightIdx = Math.max(searchHighlightIdx - 1, -1);
    renderSearchResults(performSearch(this.value));
  }
  if (e.key === 'Enter' && searchHighlightIdx >= 0) {
    e.preventDefault();
    selectSearchResult(searchHighlightIdx);
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeGlossary();
  if (e.key === 'ArrowRight') nextStep();
  if (e.key === 'ArrowLeft') prevStep();
  if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'f')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrapper')) closeSearch();
});

/* ---- Profiles & SQLite API Sync ---- */
let activeUser = null;
let isOfflineMode = false;

async function checkServerConnection() {
  try {
    const res = await fetch('/api/users', { method: 'POST', body: JSON.stringify({}), headers: { 'Content-Type': 'application/json' } });
    if (res.ok) {
      isOfflineMode = false;
      return true;
    }
  } catch(e) {}
  isOfflineMode = true;
  return false;
}

async function fetchUsers() {
  if (isOfflineMode) {
    return JSON.parse(localStorage.getItem('study_users') || '[]');
  } else {
    try {
      const res = await fetch('/api/users', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
      const data = await res.json();
      return data.users || [];
    } catch(e) {
      console.warn("Backend users fetch failed, falling back to local storage list", e);
      return JSON.parse(localStorage.getItem('study_users') || '[]');
    }
  }
}

async function saveProgress() {
  if (!activeUser) return;
  
  const savedQuizStates = {};
  for (let key in quizStates) {
    const s = quizStates[key];
    if (s) {
      savedQuizStates[key] = {
        answers: s.answers,
        currentIdx: s.currentIdx,
        results: s.results,
        shuffled: s.shuffled,
        shuffledQuestions: s.questions ? s.questions.map(q => q.q) : null
      };
    }
  }

  const payload = {
    username: activeUser,
    last_chapter: currentTutorialIdx,
    last_card: currentLessonIdx,
    last_step: currentStepIdx,
    viewing_quiz: viewingQuiz,
    quiz_states: savedQuizStates
  };

  if (isOfflineMode) {
    localStorage.setItem(`progress_${activeUser}`, JSON.stringify(payload));
  } else {
    try {
      const res = await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!data.success) {
        localStorage.setItem(`progress_${activeUser}`, JSON.stringify(payload));
      }
    } catch(e) {
      console.warn("API save progress failed, saving locally", e);
      localStorage.setItem(`progress_${activeUser}`, JSON.stringify(payload));
    }
  }
}

async function loadProgress(username) {
  let progress = null;
  if (isOfflineMode) {
    const stored = localStorage.getItem(`progress_${username}`);
    if (stored) progress = JSON.parse(stored);
  } else {
    try {
      const res = await fetch('/api/load', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username })
      });
      const data = await res.json();
      if (data.success) {
        progress = data;
      } else {
        const stored = localStorage.getItem(`progress_${username}`);
        if (stored) progress = JSON.parse(stored);
      }
    } catch(e) {
      console.warn("API load progress failed, loading locally", e);
      const stored = localStorage.getItem(`progress_${username}`);
      if (stored) progress = JSON.parse(stored);
    }
  }
  return progress;
}

async function openProfileModal() {
  const modal = document.getElementById('profileModal');
  const listContainer = document.getElementById('profileList');
  listContainer.innerHTML = '<div style="color: var(--slate-light); font-size:13px; padding:10px 0;">Loading profiles...</div>';
  modal.classList.add('show');
  
  await checkServerConnection();
  const users = await fetchUsers();
  listContainer.innerHTML = '';
  
  if (users.length === 0) {
    listContainer.innerHTML = '<div style="color: var(--slate-light); padding: 10px 0; font-size: 13px;">No profiles found. Create one below to begin!</div>';
  } else {
    users.forEach(u => {
      const isCurrent = (u === activeUser);
      const activeCls = isCurrent ? 'active' : '';
      const badge = isCurrent ? '<span style="font-size: 11px; background: var(--blue); color: #fff; padding: 2px 8px; border-radius: 10px;">Active</span>' : '';
      listContainer.innerHTML += `
        <div class="profile-item ${activeCls}" onclick="selectProfile('${u.replace(/'/g, "\\'")}')">
          <span>👤 ${u}</span>
          ${badge}
        </div>
      `;
    });
  }
}

async function selectProfile(username) {
  activeUser = username;
  localStorage.setItem('active_study_user', username);
  
  const labelEl = document.getElementById('activeUserLabel');
  if (isOfflineMode) {
    labelEl.textContent = `${username} (Offline)`;
    labelEl.style.color = '#94a3b8';
  } else {
    labelEl.textContent = username;
    labelEl.style.color = '#fff';
  }
  
  document.getElementById('profileModal').classList.remove('show');
  
  const progress = await loadProgress(username);
  if (progress) {
    currentTutorialIdx = progress.last_chapter || 0;
    currentLessonIdx = progress.last_card !== undefined ? progress.last_card : 0;
    currentStepIdx = progress.last_step || 0;
    viewingQuiz = progress.viewing_quiz || false;
    
    if (progress.quiz_states) {
      for (let k in progress.quiz_states) {
        const storedState = progress.quiz_states[k];
        quizStates[k] = {
          answers: storedState.answers || {},
          currentIdx: storedState.currentIdx || 0,
          results: storedState.results || {},
          shuffled: storedState.shuffled || false,
          originalQuestions: ALL_QUESTIONS.filter(q => q.c === parseInt(k)),
          questions: ALL_QUESTIONS.filter(q => q.c === parseInt(k))
        };
        if (storedState.shuffledQuestions) {
          const qs = quizStates[k].questions;
          const mapped = [];
          storedState.shuffledQuestions.forEach(qStr => {
            const match = qs.find(q => q.q === qStr);
            if (match) mapped.push(match);
          });
          if (mapped.length === qs.length) {
            quizStates[k].questions = mapped;
            quizStates[k].shuffled = true;
          }
        }
      }
    }
    
    renderTabs();
    if (viewingQuiz) {
      currentLessonIdx = -1;
      renderSidebar();
      renderQuiz();
    } else {
      renderSidebar();
      renderLesson();
    }
  } else {
    currentTutorialIdx = 0;
    currentLessonIdx = 0;
    currentStepIdx = 0;
    viewingQuiz = false;
    renderTabs();
    renderSidebar();
    renderLesson();
  }
}

async function handleCreateProfile() {
  const input = document.getElementById('newProfileInput');
  const username = input.value.trim();
  if (!username) {
    alert("Please enter a profile name.");
    return;
  }
  
  const users = await fetchUsers();
  if (users.includes(username)) {
    alert("This profile name already exists.");
    return;
  }
  
  if (isOfflineMode) {
    users.push(username);
    localStorage.setItem('study_users', JSON.stringify(users));
  } else {
    try {
      await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, last_chapter: 0, last_card: 0, last_step: 0, viewing_quiz: false })
      });
      users.push(username);
      localStorage.setItem('study_users', JSON.stringify(users));
    } catch(e) {
      console.error(e);
      users.push(username);
      localStorage.setItem('study_users', JSON.stringify(users));
    }
  }
  
  input.value = '';
  await selectProfile(username);
}

async function initProfile() {
  await checkServerConnection();
  const savedUser = localStorage.getItem('active_study_user');
  if (savedUser) {
    await selectProfile(savedUser);
  } else {
    openProfileModal();
  }
}

initProfile();
</script>
