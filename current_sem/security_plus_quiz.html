// State
let currentQuestions = [];
let currentIdx = 0;
let results = {}; // idx -> 'correct' | 'wrong'
let shuffled = false;
let chapterFilter = 'all';

function init() {
  const sel = document.getElementById('chapterSelect');
  sel.innerHTML = '<option value="all">All Chapters</option>' +
    CH_NAMES.map((n, i) => `<option value="${i}">Ch ${i+1} — ${n}</option>`).join('');
  loadQuestions();
}

function loadQuestions() {
  if (chapterFilter === 'all') {
    currentQuestions = ALL_QUESTIONS.slice();
  } else {
    currentQuestions = ALL_QUESTIONS.filter(q => q.c === parseInt(chapterFilter));
  }
  if (shuffled) shuffle();
  currentIdx = 0;
  render();
}

function shuffle() {
  shuffled = !shuffled;
  if (shuffled) {
    for (let i = currentQuestions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
    }
  } else {
    // Restore original order if all questions
    if (chapterFilter === 'all') {
      currentQuestions = ALL_QUESTIONS.slice();
    }
  }
  currentIdx = 0;
  render();
}

function changeChapter() {
  chapterFilter = document.getElementById('chapterSelect').value;
  shuffled = false;
  loadQuestions();
}

function resetAll() {
  if (!confirm('Reset all progress? This will clear correct/wrong marks.')) return;
  results = {};
  currentIdx = 0;
  render();
}

function render() {
  const container = document.getElementById('quizContent');
  const qs = currentQuestions;
  
  if (!qs.length) {
    container.innerHTML = '<div class="empty"><h2>No questions match</h2></div>';
    updateStats();
    return;
  }

  const q = qs[currentIdx];
  const total = qs.length;
  const letters = ['A', 'B', 'C', 'D'];
  
  const answered = results[currentQuestions.indexOf(q)] !== undefined;
  const isCorrect = results[currentQuestions.indexOf(q)] === 'correct';
  const selectedOpt = results[currentQuestions.indexOf(q) + '_sel'];
  
  const progressPct = ((currentIdx + 1) / total) * 100;

  const optsHtml = q.o.map((opt, i) => {
    let cls = '';
    if (answered) {
      cls = 'disabled';
      if (i === q.a) cls += ' correct';
      else if (i === selectedOpt) cls += ' wrong';
    }
    return `<button class="q-option ${cls}" onclick="selectAnswer(${i})" ${answered ? 'disabled' : ''}>
      <span class="letter">${letters[i]}</span>${opt}
    </button>`;
  }).join('');

  const feedbackHtml = answered
    ? `<div class="feedback show"><div class="feedback-inner ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ Correct!' : '✗ Incorrect. The correct answer was: ' + q.o[q.a]}</div></div>`
    : '';

  container.innerHTML = `
    <div class="q-card">
      <div class="progress-bar" style="margin:0;border-radius:0;height:3px"><div class="progress-fill" style="width:${progressPct}%;background:var(--teal)"></div></div>
      <div class="q-header">
        <div class="q-meta">
          <span class="q-chapter">Ch ${q.c + 1} — ${CH_NAMES[q.c]}</span>
          <span class="q-num">Question ${currentIdx + 1} of ${total}</span>
        </div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="q-options">${optsHtml}</div>
      ${feedbackHtml}
      <div class="q-nav">
        <button class="btn-prev" onclick="prevQ()" ${currentIdx === 0 ? 'disabled style=opacity:.5' : ''}>← Previous</button>
        <button class="btn-check" id="checkBtn" onclick="revealAnswer()" ${answered ? 'disabled' : ''}>Check Answer</button>
        <button class="btn-next" onclick="nextQ()">${currentIdx === total - 1 ? 'Done' : 'Next →'}</button>
      </div>
    </div>
  `;

  updateStats();
}

function selectAnswer(idx) {
  // Just style the selected option
  document.querySelectorAll('.q-option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('checkBtn').disabled = false;
}

function revealAnswer() {
  const q = currentQuestions[currentIdx];
  const selected = document.querySelector('.q-option.selected');
  if (!selected) return;
  const idx = Array.from(document.querySelectorAll('.q-option')).indexOf(selected);
  const key = currentQuestions.indexOf(q);
  
  results[key] = idx === q.a ? 'correct' : 'wrong';
  results[key + '_sel'] = idx;
  render();
}

function nextQ() {
  if (currentIdx < currentQuestions.length - 1) {
    currentIdx++;
    render();
  }
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    render();
  }
}

function updateStats() {
  const correct = Object.keys(results).filter(k => !k.includes('_') && results[k] === 'correct').length;
  const wrong = Object.keys(results).filter(k => !k.includes('_') && results[k] === 'wrong').length;
  document.getElementById('correctCount').textContent = correct + ' ✓';
  document.getElementById('wrongCount').textContent = wrong + ' ✗';
}

init();
</script>
